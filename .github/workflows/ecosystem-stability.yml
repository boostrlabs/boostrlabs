name: BOOSTR Ecosystem Stability

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'public/**'
      - 'scripts/ecosystem-stability.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.js'
      - '.github/workflows/ecosystem-stability.yml'
  pull_request:
    paths:
      - 'functions/**'
      - 'public/**'
      - 'scripts/ecosystem-stability.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.js'
      - '.github/workflows/ecosystem-stability.yml'

permissions:
  contents: read

jobs:
  stability:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ecosystem stability checks
        run: pnpm run stability:check

      - name: Build production bundle
        run: pnpm run build
