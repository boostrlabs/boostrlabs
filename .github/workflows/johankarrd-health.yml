name: Johankarrd Health

on:
  push:
    paths:
      - 'public/johankarrdbuildr/**'
      - 'functions/api/johankarrd/**'
      - 'functions/_lib/johankarrd-renderer.js'
      - 'scripts/patch-johankarrd-v60.mjs'
      - 'scripts/johankarrd-health.mjs'
      - 'scripts/johankarrd-core-tests.mjs'
      - 'scripts/johankarrd-backend-health.mjs'
      - 'scripts/johankarrd-dist-health.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/johankarrd-health.yml'
  pull_request:
    paths:
      - 'public/johankarrdbuildr/**'
      - 'functions/api/johankarrd/**'
      - 'functions/_lib/johankarrd-renderer.js'
      - 'scripts/patch-johankarrd-v60.mjs'
      - 'scripts/johankarrd-health.mjs'
      - 'scripts/johankarrd-core-tests.mjs'
      - 'scripts/johankarrd-backend-health.mjs'
      - 'scripts/johankarrd-dist-health.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read

concurrency:
  group: johankarrd-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@9.15.9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run deploy:check
