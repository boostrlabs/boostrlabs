name: BOOSTR PWA Health

on:
  push:
    branches:
      - pwa-pilot
    paths:
      - 'public/manifest.webmanifest'
      - 'public/service-worker.js'
      - 'public/pwa-register.js'
      - 'public/pwa.css'
      - 'public/offline.html'
      - 'public/_headers'
      - 'scripts/pwa-health.mjs'
      - 'vite.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pwa-health.yml'
  pull_request:
    paths:
      - 'public/manifest.webmanifest'
      - 'public/service-worker.js'
      - 'public/pwa-register.js'
      - 'public/pwa.css'
      - 'public/offline.html'
      - 'public/_headers'
      - 'scripts/pwa-health.mjs'
      - 'vite.config.js'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pwa-health.yml'

permissions:
  contents: read

concurrency:
  group: boostr-pwa-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run health:pwa
      - run: pnpm run stability:check
      - run: pnpm run build
      - name: Verify built PWA assets
        run: |
          test -f dist/manifest.webmanifest
          test -f dist/service-worker.js
          test -f dist/pwa-register.js
          test -f dist/pwa.css
          test -f dist/offline.html
          grep -q '/manifest.webmanifest' dist/index.html
          grep -q '/pwa-register.js' dist/index.html
          grep -q 'apple-mobile-web-app-capable' dist/index.html
          grep -q 'viewport-fit=cover' dist/index.html
