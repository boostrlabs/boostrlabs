name: OMNI JR Production Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: omni-jr-production-verification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-production:
    name: Verify OMNI JR production end to end
    if: github.head_ref == 'omni-production-verify'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BOOSTR_BASE_URL: https://boostrlabs.pages.dev
      OMNI_SMOKE_ATTEMPTS: 60
      OMNI_SMOKE_DELAY_MS: 10000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Wait for production and verify all OMNI JR routes
        shell: bash
        run: |
          set -o pipefail
          pnpm run health:omni-parking:live 2>&1 | tee omni-production-smoke.log
      - name: Upload production diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omni-production-smoke-${{ github.run_attempt }}
          path: omni-production-smoke.log
          if-no-files-found: warn
          retention-days: 7
