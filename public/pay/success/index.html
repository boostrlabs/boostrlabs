<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Pago BOOSTR</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><style>:root{--line:rgba(255,255,255,.14);--muted:rgba(255,255,255,.62);--green:#7dff9e;--gold:#feedb9;--red:#ff9292}*{box-sizing:border-box}body{margin:0;min-height:100dvh;background:radial-gradient(circle at 50% 0,rgba(125,255,158,.15),transparent 32%),#020202;color:#fff;font-family:Inter,Arial,sans-serif;display:grid;place-items:center;padding:16px}.card{width:min(100%,620px);border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.035));border-radius:34px;padding:24px;box-shadow:0 36px 120px rgba(0,0,0,.72)}img{width:130px}.tag{display:inline-flex;margin-top:28px;padding:8px 10px;border-radius:999px;border:1px solid rgba(125,255,158,.25);color:var(--green);font:900 10px ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase}h1{font-family:Arial Black,Arial,sans-serif;font-size:clamp(44px,10vw,76px);line-height:.9;letter-spacing:-.07em;margin:14px 0}.lead{color:var(--muted);line-height:1.5}.summary{display:grid;gap:9px;margin:20px 0}.summary div{display:flex;justify-content:space-between;gap:12px;border:1px solid var(--line);background:rgba(0,0,0,.25);padding:12px;border-radius:18px;color:var(--muted)}.summary b{color:#fff}.btn{display:inline-flex;min-height:50px;padding:0 18px;border-radius:999px;background:#fff;color:#000;text-decoration:none;align-items:center;font-weight:950}.error{color:var(--red)}</style></head>
<body><main class="card"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><span class="tag" id="tag">Verificando pago</span><h1 id="title">Confirmando...</h1><p class="lead" id="copy">BOOSTR está verificando el resultado directamente con Stripe.</p><div class="summary" id="summary" hidden><div><span>Estado</span><b id="state">—</b></div><div><span>Total</span><b id="amount">—</b></div><div><span>Correo</span><b id="email">—</b></div><div><span>Modo</span><b id="mode">—</b></div></div><a class="btn" href="/home">Volver a BOOSTR</a></main><script>const params=new URLSearchParams(location.search);const sessionId=params.get('session_id');function money(cents,currency='usd'){return new Intl.NumberFormat('es-US',{style:'currency',currency:String(currency).toUpperCase()}).format(Number(cents||0)/100)}async function verify(){try{if(!sessionId)throw new Error('Falta la sesión de Stripe');const res=await fetch('/api/public/stripe/session?session_id='+encodeURIComponent(sessionId),{cache:'no-store'});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;const p=data.payment;summary.hidden=false;state.textContent=p.status==='paid'?'PAGADO':String(p.status||'PENDIENTE').toUpperCase();amount.textContent=money(p.amount_total,p.currency);email.textContent=p.customer_email||'—';mode.textContent=String(p.mode||'test').toUpperCase();if(p.status==='paid'){tag.textContent='Pago confirmado';title.textContent='Pago recibido.';copy.textContent='Stripe confirmó el pago y BOOSTR lo registró dentro del workspace.'}else{tag.textContent='Pago pendiente';title.textContent='Aún procesando.';copy.textContent='Stripe todavía no marca este pago como completado.'}}catch(e){tag.textContent='No verificado';tag.classList.add('error');title.textContent='No pudimos confirmar.';copy.textContent=e?.message||e?.error||'No se pudo verificar el pago con Stripe.'}}verify();</script></body></html>
