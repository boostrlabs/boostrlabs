<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>BOOSTR Labs — Aceptar invitación</title>
  <meta name="description" content="Acepta una invitación privada y entra a tu sistema BOOSTR.">
  <link rel="icon" href="/assets/icons/09.-b-star-favicon.png">
  <style>
    :root{color-scheme:dark;--text:#f7f7f4;--muted:rgba(255,255,255,.58);--line:rgba(255,255,255,.14);--green:#76ffa8;--champagne:#feedb9}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#050505;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Arial,sans-serif}body{background:radial-gradient(circle at 82% 2%,rgba(95,128,255,.14),transparent 32%),radial-gradient(circle at 5% 95%,rgba(118,255,168,.07),transparent 30%),#050505}.shell{min-height:100dvh;display:grid;place-items:center;padding:max(18px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left))}.panel{width:min(100%,590px);position:relative;overflow:hidden;border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.035));border-radius:34px;padding:clamp(22px,5vw,34px);box-shadow:0 38px 120px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.09);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}.panel::after{content:"";position:absolute;width:260px;height:260px;right:-145px;top:-145px;border:1px solid rgba(255,255,255,.1);border-radius:50%;box-shadow:0 0 0 40px rgba(255,255,255,.015),0 0 0 80px rgba(255,255,255,.01)}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}.brand img{width:146px;max-width:48vw;max-height:50px;object-fit:contain;object-position:left center}.lang{min-width:44px;min-height:40px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);color:#fff;font-weight:900;cursor:pointer}.eyebrow{display:block;margin-top:26px;color:var(--champagne);font:900 10px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.18em}.panel h1{max-width:520px;margin:18px 0 12px;font-family:Arial Black,-apple-system,BlinkMacSystemFont,sans-serif;font-size:clamp(42px,8vw,66px);line-height:.91;letter-spacing:-.065em}.lead{max-width:470px;margin:0;color:var(--muted);font-size:15px;line-height:1.5}.form{display:grid;gap:12px;margin-top:26px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}.form input{width:100%;min-height:52px;border:1px solid var(--line);background:rgba(0,0,0,.3);border-radius:17px;color:#fff;padding:0 14px;font-size:15px;font-weight:800;outline:none}.form input:focus{border-color:rgba(118,255,168,.55);box-shadow:0 0 0 3px rgba(118,255,168,.08)}.note{border:1px solid rgba(118,255,168,.2);background:rgba(118,255,168,.055);border-radius:20px;padding:13px;color:rgba(255,255,255,.72);font-size:13px;line-height:1.45}.primary{min-height:52px;border:0;border-radius:999px;background:#fff;color:#050505;font-size:14px;font-weight:950;cursor:pointer}.primary:disabled{opacity:.55;cursor:not-allowed}.status{min-height:20px;color:var(--champagne);font-size:13px;font-weight:800;line-height:1.4}.login{margin:18px 0 0;color:var(--muted);font-size:13px}.login a{color:#fff;font-weight:900}.token-wrap[hidden]{display:none}@media(max-width:520px){.panel{border-radius:29px;padding:22px}.panel h1{font-size:48px}.shell{align-items:start;padding-top:max(18px,env(safe-area-inset-top))}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="top"><a class="brand" href="/"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR Labs"></a><button class="lang" id="langToggle" type="button" aria-label="Cambiar idioma">EN</button></div>
      <span class="eyebrow" data-i18n="eyebrow">INVITACIÓN PRIVADA</span>
      <h1 data-i18n="title">Tu espacio BOOSTR está listo.</h1>
      <p class="lead" data-i18n="lead">Crea tu clave y entra al sistema preparado para ti.</p>

      <form class="form" id="form" novalidate>
        <label class="token-wrap" id="tokenWrap" hidden><span data-i18n="tokenLabel">Código de invitación</span><input id="invite_token" autocomplete="one-time-code" autocapitalize="none" spellcheck="false" data-i18n-placeholder="tokenPlaceholder" placeholder="Pega tu código o enlace"></label>
        <label><span data-i18n="emailLabel">Correo</span><input id="email" type="email" autocomplete="email" inputmode="email" autocapitalize="none" spellcheck="false" required></label>
        <label><span data-i18n="passwordLabel">Crea tu clave</span><input id="password" type="password" autocomplete="new-password" required minlength="8" data-i18n-placeholder="passwordPlaceholder" placeholder="Mínimo 8 caracteres"></label>
        <label><span data-i18n="nameLabel">Tu nombre</span><input id="display_name" autocomplete="name" data-i18n-placeholder="namePlaceholder" placeholder="Nombre visible"></label>
        <div class="note" data-i18n="note">No necesitas ingresar información de pago.</div>
        <button class="primary" id="submitBtn" type="submit" data-i18n="submit">Aceptar invitación</button>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </form>
      <p class="login"><span data-i18n="accepted">¿Ya aceptaste?</span> <a href="/login/" data-i18n="login">Inicia sesión.</a></p>
    </section>
  </main>

  <script>
    (()=>{
      const translations={
        es:{eyebrow:'INVITACIÓN PRIVADA',title:'Tu espacio BOOSTR está listo.',lead:'Crea tu clave y entra al sistema preparado para ti.',tokenLabel:'Código de invitación',tokenPlaceholder:'Pega tu código o enlace',emailLabel:'Correo',passwordLabel:'Crea tu clave',passwordPlaceholder:'Mínimo 8 caracteres',nameLabel:'Tu nombre',namePlaceholder:'Nombre visible',note:'No necesitas ingresar información de pago.',submit:'Aceptar invitación',accepted:'¿Ya aceptaste?',login:'Inicia sesión.',accepting:'Aceptando invitación...',success:'Invitación aceptada. Abriendo BOOSTR...',missing:'Ingresa el código o abre el enlace original de invitación.',invalid:'No se pudo aceptar la invitación.'},
        en:{eyebrow:'PRIVATE INVITATION',title:'Your BOOSTR space is ready.',lead:'Create your password and enter the system prepared for you.',tokenLabel:'Invitation code',tokenPlaceholder:'Paste your code or invitation link',emailLabel:'Email',passwordLabel:'Create your password',passwordPlaceholder:'At least 8 characters',nameLabel:'Your name',namePlaceholder:'Display name',note:'No payment information is required.',submit:'Accept invitation',accepted:'Already accepted?',login:'Sign in.',accepting:'Accepting invitation...',success:'Invitation accepted. Opening BOOSTR...',missing:'Enter the code or open the original invitation link.',invalid:'The invitation could not be accepted.'}
      };
      const params=new URLSearchParams(location.search),tokenWrap=document.getElementById('tokenWrap'),tokenInput=document.getElementById('invite_token'),emailInput=document.getElementById('email'),passwordInput=document.getElementById('password'),nameInput=document.getElementById('display_name'),form=document.getElementById('form'),status=document.getElementById('status'),submitBtn=document.getElementById('submitBtn'),toggle=document.getElementById('langToggle');
      let queryToken=params.get('token')||'',storedLang='';try{storedLang=localStorage.getItem('boostr_lang')||''}catch{}let lang=['es','en'].includes(storedLang)?storedLang:((navigator.language||'').toLowerCase().startsWith('es')?'es':'en');
      emailInput.value=params.get('email')||'';if(!queryToken)tokenWrap.hidden=false;
      function text(){return translations[lang]}
      function applyLanguage(next){lang=['es','en'].includes(next)?next:'es';try{localStorage.setItem('boostr_lang',lang)}catch{}document.documentElement.lang=lang;toggle.textContent=lang==='es'?'EN':'ES';document.querySelectorAll('[data-i18n]').forEach(node=>{const value=text()[node.dataset.i18n];if(value)node.textContent=value});document.querySelectorAll('[data-i18n-placeholder]').forEach(node=>{const value=text()[node.dataset.i18nPlaceholder];if(value)node.placeholder=value})}
      function normalizeToken(value){const input=String(value||'').trim();if(!input)return'';try{const url=new URL(input);return url.searchParams.get('token')||input}catch{return input}}
      function safeDestination(value){if(typeof value!=='string'||!value.startsWith('/')||value.startsWith('//')||value.includes('\\'))return'/app/';return value}
      toggle.addEventListener('click',()=>applyLanguage(lang==='es'?'en':'es'));applyLanguage(lang);
      form.addEventListener('submit',async event=>{event.preventDefault();const token=normalizeToken(queryToken||tokenInput.value);if(!token){status.textContent=text().missing;tokenWrap.hidden=false;tokenInput.focus();return}if(!form.reportValidity())return;submitBtn.disabled=true;status.textContent=text().accepting;try{const response=await fetch('/api/invitations/accept',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({token,email:emailInput.value.trim(),password:passwordInput.value,display_name:nameInput.value.trim()})});const data=await response.json().catch(()=>({}));if(!response.ok||data.ok===false)throw data;if(data.token){try{localStorage.setItem('boostr_auth_token',data.token);localStorage.setItem('boostr_session',JSON.stringify({email:data.user?.email||emailInput.value.trim(),role:data.role||'client',workspace:data.active_workspace_id||data.active_workspace?.id||null,token:data.token}))}catch{}}status.textContent=text().success;setTimeout(()=>location.href=safeDestination(data.redirect||data.active_workspace?.dashboard_path||'/app/'),650)}catch(error){status.textContent=error?.message||error?.error||text().invalid;submitBtn.disabled=false}});
    })();
  </script>
</body>
</html>
