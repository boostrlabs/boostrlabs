<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Accept BOOSTR Invite</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.invite{min-height:100dvh;display:grid;place-items:center;padding:16px}.panel{width:min(100%,560px);border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border-radius:36px;padding:24px;box-shadow:0 38px 120px rgba(0,0,0,.7)}.panel img{width:128px;max-height:64px;object-fit:contain}.form{display:grid;gap:11px;margin-top:18px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}.form input{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.28);border-radius:18px;min-height:50px;color:#fff;padding:0 13px;font-weight:850}.status{min-height:18px;color:#feedb9;font-size:13px;font-weight:850}.note{border:1px solid rgba(125,255,158,.2);background:rgba(125,255,158,.055);border-radius:22px;padding:13px;color:rgba(255,255,255,.72);font-size:13px;line-height:1.45}</style></head><body><div class="ambient"></div><main class="invite"><section class="panel"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><span class="eyebrow">INVITE ACCEPTANCE</span><h1>Claim your BOOSTR workspace.</h1><p class="micro">Set your password and enter the Custom OS created from your audit.</p><form class="form" id="form"><label>Email<input id="email" type="email" required></label><label>Password<input id="password" type="password" required minlength="8" placeholder="8+ characters"></label><label>Display name<input id="display_name" placeholder="Your name"></label><div class="note">This accepts an invite token generated by BOOSTR Manager. No payment details are required.</div><button class="btn primary" type="submit">Accept invite</button><div class="status" id="status"></div></form><p class="micro"><a href="/login">Already accepted? Log in.</a></p></section></main><script>
const params=new URLSearchParams(location.search);const token=params.get('token')||'';email.value=params.get('email')||'';form.onsubmit=async e=>{e.preventDefault();status.textContent='Accepting invite...';try{const res=await fetch('/api/invitations/accept',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({token,email:email.value,password:password.value,display_name:display_name.value})});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;localStorage.setItem('boostr_auth_token',data.token);localStorage.setItem('boostr_session',JSON.stringify({email:data.user?.email,role:'client',workspace:data.active_workspace_id,token:data.token}));status.textContent='Invite accepted. Opening dashboard...';setTimeout(()=>location.href='/app',600)}catch(err){status.textContent=err?.message||err?.error||'Invite could not be accepted.'}};
</script></body></html>
