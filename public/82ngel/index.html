<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>82NGEL — Powered by BOOSTR Labs</title>
<meta name="description" content="82NGEL smart link and artist front door powered by BOOSTR Labs.">
<link rel="icon" href="/assets/link/82ngel/logo.png">
<link rel="stylesheet" href="/assets/boostr-mother/mother.css">
<style>
body{background:#050406;color:white}.artist-shell{min-height:100vh;padding:24px;display:grid;place-items:center;background:radial-gradient(circle at 20% 15%,rgba(255,23,23,.34),transparent 32%),radial-gradient(circle at 85% 10%,rgba(255,43,189,.2),transparent 28%),#050406}.artist-card{width:min(100%,980px);border-radius:42px;padding:28px;display:grid;grid-template-columns:1fr .9fr;gap:22px;align-items:center}.artist-logo{width:94px;height:94px;border-radius:28px;object-fit:contain;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);padding:12px}.artist-copy h1{font-size:clamp(58px,11vw,128px);line-height:.82;margin:18px 0 16px;letter-spacing:-.09em}.artist-copy p{color:rgba(255,255,255,.66);font-size:16px;line-height:1.55;max-width:560px}.artist-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}.artist-actions a{border-radius:999px;padding:13px 18px;text-decoration:none;color:white;border:1px solid rgba(255,255,255,.17);font-weight:900}.artist-actions .primary{background:#fff;color:#09090b}.visual{border-radius:34px;min-height:520px;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.82)),url('/assets/link/82ngel/bg-real.jpg') center/cover;border:1px solid rgba(255,255,255,.14);position:relative;overflow:hidden}.visual img{position:absolute;left:50%;bottom:0;transform:translateX(-50%);max-width:82%;max-height:92%;object-fit:contain;filter:drop-shadow(0 35px 70px rgba(0,0,0,.7))}.quick{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.quick a{border-radius:22px;padding:16px;text-decoration:none;color:white;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11)}.quick b{display:block;margin-bottom:6px}.quick span{color:rgba(255,255,255,.55);font-size:12px}@media(max-width:820px){.artist-shell{padding:12px}.artist-card{grid-template-columns:1fr;padding:18px;border-radius:30px}.visual{min-height:420px;order:-1}.quick{grid-template-columns:1fr}.artist-copy h1{font-size:64px}}
</style>
</head>
<body>
<main class="artist-shell">
  <section class="artist-card glass">
    <div class="artist-copy">
      <img class="artist-logo" src="/assets/link/82ngel/logo.png" alt="82NGEL">
      <h1>82NGEL</h1>
      <p>Artist smart link, store entry and creative workspace inside the BOOSTR Labs ecosystem.</p>
      <div class="artist-actions">
        <a class="primary" href="/82store">Open 82 Store</a>
        <a href="/app/82ngel">Open Artist OS</a>
        <a href="mailto:boostrlabs@gmail.com">Contact</a>
        <a href="/home">BOOSTR Home</a>
      </div>
      <div class="quick">
        <a href="/82store"><b>Store</b><span>Commerce frontend.</span></a>
        <a href="/app/82ngel"><b>Dashboard</b><span>Artist workspace preview.</span></a>
        <a href="/audit"><b>Audit</b><span>BOOSTR entry point.</span></a>
      </div>
    </div>
    <div class="visual"><img src="/assets/link/82ngel/girl-red.png" alt="82NGEL visual"></div>
  </section>
</main>
</body>
</html>
