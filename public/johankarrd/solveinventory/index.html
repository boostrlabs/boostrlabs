<style>
*{box-sizing:border-box}html{scroll-behavior:smooth;background:#000}body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;overflow-x:hidden}
.page{min-height:100svh;display:grid;place-items:center;background:#000;padding:20px}

.nav{position:fixed;right:16px;bottom:16px;z-index:5;display:flex;gap:8px;opacity:.32}.nav a{width:9px;height:9px;border-radius:50%;background:#fff;display:block}
.powered{position:fixed;left:0;right:0;bottom:10px;text-align:center;font:10px/1 Arial,sans-serif;color:rgba(255,255,255,.35);pointer-events:none;z-index:4}
@keyframes in{0%{opacity:0;filter:blur(14px);transform:translateY(14px) scale(.985)}100%{opacity:1;filter:blur(0);transform:none}}
@media(max-width:620px){.grid{width:88vw}.tile-car{height:76px}.tile-logo{width:128px}.hero-car{width:78vw}.home-title{width:70vw}.detail-car{width:84vw}}
