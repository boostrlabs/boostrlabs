<!doctype html><html lang="es" data-build="boostr-live-viewer-v1"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Live</title><style>:root{--bg:#050505;--panel:#101010;--line:rgba(255,255,255,.13);--muted:rgba(255,255,255,.62);--cyan:#78ecff;--gold:#feedb9;--green:#7dff9e}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(120,236,255,.11),transparent 28%),#050505;color:#fff;font-family:Inter,Arial,sans-serif}.top{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(5,5,5,.88);backdrop-filter:blur(18px);z-index:5}.top img{width:120px}.live-badge{border:1px solid rgba(255,80,90,.35);color:#ff8b92;border-radius:999px;padding:8px 11px;font-weight:950;font-size:11px}.layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;min-height:calc(100dvh - 70px)}.main{padding:14px}.viewer{aspect-ratio:16/9;background:#000;border:1px solid var(--line);border-radius:28px;overflow:hidden;display:grid;place-items:center}.viewer iframe{width:100%;height:100%;border:0}.placeholder{text-align:center;color:var(--muted);padding:24px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{border:1px solid var(--line);background:#111;color:#fff;border-radius:999px;padding:10px 14px;font-weight:900}.tab.active{background:#fff;color:#000}.info{border:1px solid var(--line);border-radius:24px;padding:18px;background:rgba(255,255,255,.04)}h1{margin:5px 0 8px;font-size:clamp(34px,6vw,64px);line-height:.92;letter-spacing:-.06em}.desc{color:var(--muted);line-height:1.5}.commerce{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.cta{border:0;border-radius:999px;padding:13px 18px;background:#fff;color:#000;font-weight:950;text-decoration:none}.side{border-left:1px solid var(--line);display:grid;grid-template-rows:auto 1fr auto;min-height:0}.side-head{padding:14px;border-bottom:1px solid var(--line)}.chat{padding:12px;overflow:auto;display:grid;align-content:start;gap:9px}.msg{border:1px solid var(--line);border-radius:16px;padding:10px;background:rgba(255,255,255,.035)}.msg b{font-size:12px}.msg small{color:var(--cyan);margin-left:6px}.msg p{margin:5px 0 0;color:rgba(255,255,255,.8);font-size:13px}.chat-form{padding:12px;border-top:1px solid var(--line);display:grid;gap:8px}.chat-form input{border:1px solid var(--line);background:#0c0c0c;color:#fff;border-radius:16px;min-height:45px;padding:0 12px}.send{border:0;border-radius:999px;min-height:45px;font-weight:950}.identity{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:900px){.layout{grid-template-columns:1fr}.side{border-left:0;border-top:1px solid var(--line);min-height:520px}.main{padding:9px}.viewer{border-radius:22px}}</style></head><body><header class="top"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><span class="live-badge">● BOOSTR LIVE</span></header><main class="layout"><section class="main"><div class="tabs" id="platformTabs"></div><div class="viewer" id="viewer"><div class="placeholder">Cargando BOOSTR Smart Viewer...</div></div><section class="info"><span id="workspace" style="color:var(--cyan);font-weight:950;font-size:11px"></span><h1 id="title">BOOSTR Live</h1><p class="desc" id="description"></p><div class="commerce" id="commerce"></div></section></section><aside class="side"><div class="side-head"><strong>BOOSTR CHAT</strong><div style="color:var(--muted);font-size:12px;margin-top:4px">Chat social separado de las acciones económicas.</div></div><div class="chat" id="chat"></div><form class="chat-form" id="chatForm"><div class="identity"><input id="publicName" maxlength="60" placeholder="Cómo quieres aparecer"><select id="identityMode"><option value="Invitado">Invitado</option><option value="Artista">Artista</option><option value="Productor">Productor</option><option value="Anónimo">Anónimo</option></select></div><input id="message" maxlength="280" required placeholder="Escribe en el chat"><button class="send" type="submit">Enviar</button></form></aside></main><script>const params=new URLSearchParams(location.search);const slug=params.get('room')||location.pathname.split('/').filter(Boolean)[1]||'';let room=null;const token=()=>localStorage.getItem('boostr_auth_token');function embed(platform,url){if(!url)return'';try{const u=new URL(url);if(platform==='youtube'){let id=u.searchParams.get('v');if(!id&&u.hostname.includes('youtu.be'))id=u.pathname.slice(1);if(!id&&u.pathname.includes('/live/'))id=u.pathname.split('/live/')[1];return id?`https://www.youtube.com/embed/${id}?autoplay=1`:''}if(platform==='twitch'){const channel=u.pathname.split('/').filter(Boolean)[0];return channel?`https://player.twitch.tv/?channel=${channel}&parent=${location.hostname}&autoplay=true`:''}if(platform==='kick')return url}catch{}return''}function platformUrls(){return{youtube:room.youtube_url,twitch:room.twitch_url,kick:room.kick_url}}function renderTabs(){const urls=platformUrls();platformTabs.innerHTML=Object.entries(urls).filter(([,u])=>u).map(([p])=>`<button class="tab ${p===room.primary_platform?'active':''}" data-p="${p}">${p.toUpperCase()}</button>`).join('');platformTabs.querySelectorAll('button').forEach(b=>b.onclick=()=>showPlatform(b.dataset.p));showPlatform(urls[room.primary_platform]?room.primary_platform:Object.keys(urls).find(k=>urls[k]))}function showPlatform(p){platformTabs.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.p===p));const url=platformUrls()[p];const src=embed(p,url);if(src)viewer.innerHTML=`<iframe allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen src="${src}"></iframe>`;else if(url)viewer.innerHTML=`<div class="placeholder"><h2>${p.toUpperCase()}</h2><p>Esta plataforma no permite embed automático todavía.</p><a class="cta" target="_blank" href="${url}">Abrir stream</a></div>`;else viewer.innerHTML='<div class="placeholder">No hay stream configurado.</div>'}function renderMessages(items){chat.innerHTML=(items||[]).map(m=>`<div class="msg"><b>${escapeHtml(m.public_name)}</b><small>${escapeHtml(m.role_label||'')}</small><p>${escapeHtml(m.body)}</p></div>`).join('');chat.scrollTop=chat.scrollHeight}function escapeHtml(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}async function load(){const r=await fetch('/api/public/live-rooms/'+encodeURIComponent(slug),{cache:'no-store'});const d=await r.json();if(!r.ok||d.ok===false)throw d;room=d.room;title.textContent=room.title;description.textContent=room.description||'Experiencia comercial en vivo impulsada por BOOSTR.';workspace.textContent=(room.workspace_name||'BOOSTR').toUpperCase();renderTabs();renderMessages(d.messages);commerce.innerHTML=room.auction_link_id?`<a class="cta" href="/pay/${room.auction_link_id}">Ver oferta</a>`:'<span style="color:var(--muted)">WATCH · TALK · ACT</span>'}async function refreshChat(){if(!slug)return;const r=await fetch('/api/public/live-rooms/'+encodeURIComponent(slug)+'/chat',{cache:'no-store'});const d=await r.json();if(d.ok)renderMessages(d.messages)}chatForm.onsubmit=async e=>{e.preventDefault();const name=identityMode.value==='Anónimo'?'Invitado anónimo':publicName.value.trim()||'Invitado';const r=await fetch('/api/public/live-rooms/'+encodeURIComponent(slug)+'/chat',{method:'POST',headers:{'Content-Type':'application/json',...(token()?{Authorization:'Bearer '+token()}: {})},body:JSON.stringify({public_name:name,role_label:identityMode.value,body:message.value.trim()})});const d=await r.json();if(r.ok&&d.ok){message.value='';await refreshChat()}};load().then(()=>setInterval(refreshChat,3000)).catch(e=>{viewer.innerHTML=`<div class="placeholder"><h2>Sala no disponible</h2><p>${escapeHtml(e.message||e.error||'No existe')}</p></div>`;chatForm.style.display='none'});</script></body></html>
