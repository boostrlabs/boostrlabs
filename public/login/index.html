<!doctype html><html lang="es" data-build="1.3.1"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#070b12"><meta name="boostr-theme" content="custom"><meta name="boostr-founder-access" content="Founder · CEO · Full system access"><title>BOOSTR</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="apple-touch-icon" href="/assets/icons/09.-b-star-favicon.png"><style>:root{color-scheme:dark;--line:rgba(255,255,255,.12);--blue:#38b9ff;--blue2:#4778ff}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}html{min-height:100%;background:#070b12}body{min-height:100dvh;margin:0;overflow-x:hidden;background:radial-gradient(circle at 78% 8%,rgba(56,185,255,.2),transparent 32%),linear-gradient(180deg,#0b111d,#05070b 75%);color:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}a{color:inherit;text-decoration:none}button,[contenteditable]{font:inherit}.screen{min-height:100dvh;width:min(620px,100%);margin:auto;padding:max(18px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));display:grid;place-items:center}.shell{width:100%;border:1px solid var(--line);border-radius:36px;background:linear-gradient(145deg,rgba(20,33,57,.92),rgba(8,13,22,.97));box-shadow:0 32px 100px rgba(0,0,0,.52);padding:clamp(24px,7vw,54px);display:grid;gap:30px}.brand{display:flex;justify-content:center}.brand img{width:min(330px,72vw);max-height:110px;object-fit:contain}.credentials{display:grid;gap:14px}.field{min-height:68px;border:1px solid rgba(255,255,255,.1);border-radius:22px;background:rgba(0,0,0,.24);display:grid;grid-template-columns:56px 1fr auto;align-items:center;overflow:hidden}.icon{width:56px;height:68px;display:grid;place-items:center;color:#6f7d92}.icon svg,.eye svg,.action svg,.back svg,.submit svg,.open svg{fill:none;stroke:currentColor;stroke-width:1.8}.icon svg{width:24px}.editor{min-height:68px;padding:22px 8px;outline:0;font-size:16px;line-height:24px;white-space:pre-wrap;overflow-wrap:anywhere;caret-color:var(--blue)}.editor:focus{background:rgba(56,185,255,.035)}.secret{-webkit-text-security:disc}.secret.revealed{-webkit-text-security:none}.eye{width:48px;height:48px;margin-right:10px;border:1px solid rgba(255,255,255,.1);border-radius:16px;background:rgba(255,255,255,.05);color:#9ba8bb;display:grid;place-items:center}.eye svg{width:22px}.submit{height:68px;border:0;border-radius:22px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;display:grid;place-items:center}.submit:disabled{opacity:.45}.submit svg{width:29px;stroke-width:2.2}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.action{height:54px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);display:grid;place-items:center;color:#8e9bb0}.action svg{width:22px}.back{position:fixed;top:max(14px,env(safe-area-inset-top));left:max(14px,env(safe-area-inset-left));width:48px;height:48px;border:1px solid var(--line);border-radius:17px;background:rgba(8,13,22,.82);display:grid;place-items:center;color:#aab6c8;z-index:5}.back svg{width:22px;stroke-width:2}.status{position:fixed;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}.session{display:none;place-items:center}.session.on{display:grid}.open{width:76px;height:76px;border-radius:26px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:grid;place-items:center}.open svg{width:30px;stroke:#fff;stroke-width:2.2}@media(max-width:520px){.screen{padding:8px}.shell{border-radius:30px;padding:24px 18px}.brand img{width:min(270px,72vw)}}</style></head><body><a class="back" href="/app/" aria-label="Volver"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></a><main class="screen"><section class="shell" id="loginState"><div class="brand"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR Labs"></div><div class="credentials" id="loginForm" role="group" aria-label="Credenciales BOOSTR" data-autofill-proof="contenteditable"><div class="field"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-5 4-7 8-7s7 2 8 7"/></svg></span><span id="boostrLoginIdentifier" class="editor" role="textbox" aria-label="Email, usuario o teléfono" contenteditable="plaintext-only" spellcheck="false"></span><span></span></div><div class="field"><span class="icon"><svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V7a4 4 0 018 0v3"/></svg></span><span id="boostrLoginSecret" class="editor secret" role="textbox" aria-label="Clave BOOSTR" contenteditable="plaintext-only" spellcheck="false"></span><button class="eye" type="button" id="showPass" aria-label="Mostrar clave"><svg viewBox="0 0 24 24"><path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.5"/></svg></button></div><button class="submit" type="button" id="submitBtn" aria-label="Entrar"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></div><nav class="actions"><a class="action" href="/accept-invite/" aria-label="Invitación"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></a><a class="action" href="/password-reset/" aria-label="Recuperar"><svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 101.5-4.7L4 9M4 4v5h5"/></svg></a><a class="action" href="/app/" aria-label="Servicios"><svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg></a></nav><div class="status" id="authStatus" role="status"></div></section><section class="shell session" id="sessionState"><div class="brand"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR Labs"></div><a class="open" id="openDashboard" href="/app/workspace/" aria-label="Abrir"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a><nav class="actions"><a class="action" href="/app/"><svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg></a><button class="action" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M10 5H5v14h5M14 8l4 4-4 4M9 12h9"/></svg></button><a class="action" href="/app/"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9h-6v-6H9v6H3z"/></svg></a></nav></section></main><script>const identifierField=document.getElementById('boostrLoginIdentifier'),passwordField=document.getElementById('boostrLoginSecret'),status=document.getElementById('authStatus'),submit=document.getElementById('submitBtn'),show=document.getElementById('showPass');const headers=()=>{const t=localStorage.getItem('boostr_auth_token');return t?{Authorization:'Bearer '+t}:{}};const systemSecretPattern=/^(?:(?:pk|sk|rk)_(?:live|test)_|whsec_|ghp_|github_pat_|xox[baprs]-|AIza|eyJ[A-Za-z0-9_-]{20,}\.)/i;const textOf=n=>String(n.textContent||'').replace(/\u00a0/g,' ').trim();const clean=n=>n.textContent=String(n.textContent||'').replace(/[\r\n]/g,'').slice(0,180);const looksLikeSecret=v=>{const c=String(v||'').replace(/\s+/g,'');return systemSecretPattern.test(c)||c.length>120};function safeNext(){const v=new URLSearchParams(location.search).get('next')||'';if(!v.startsWith('/')||v.startsWith('//')||v.includes('\\'))return'';return v}const requestedNext=safeNext();function destination(d){if(requestedNext)return requestedNext;if(d?.redirect&&d.redirect.startsWith('/')&&!d.redirect.startsWith('//'))return d.redirect;const e=String(d.user?.email||'').toLowerCase(),r=[d.role,d.user?.role,...(d.roles||[])].filter(Boolean).map(v=>String(v).toLowerCase());if(e==='janko@boostrlabs.com')return'/app/janko/';if(e==='johanka@boostrlabs.com')return'/app/johanka/';if(r.includes('admin'))return'/admin/';if(r.includes('manager'))return'/manager/';if(r.some(x=>['partner','owner','business_owner'].includes(x)))return'/partner-dashboard/';return'/app/workspace/'}function validIdentifier(v){return /@/.test(v)||/^\+?[0-9() .-]{7,20}$/.test(v)||/^[a-zA-Z0-9._-]{3,64}$/.test(v)}function saveSession(i,d){if(d.token)localStorage.setItem('boostr_auth_token',d.token);localStorage.setItem('boostr_session',JSON.stringify({email:d.user?.email||i,role:d.user?.role||d.role||'client',redirect:destination(d)}))}async function login(){const i=textOf(identifierField),p=textOf(passwordField);if(!i||!p||!validIdentifier(i)||looksLikeSecret(i)){identifierField.textContent='';status.textContent='invalid';identifierField.focus({preventScroll:true});return}submit.disabled=true;try{const r=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({identifier:i,password:p})}),d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw d;saveSession(i,d);location.replace(destination(d))}catch{status.textContent='error';submit.disabled=false}}async function detectSession(){if(new URLSearchParams(location.search).get('logout')==='1')return;try{const r=await fetch('/api/session',{headers:headers(),credentials:'same-origin',cache:'no-store'});if(!r.ok)return;const d=await r.json();if(!d?.ok&&!d?.user)return;loginState.style.display='none';sessionState.classList.add('on');openDashboard.href=destination(d)}catch{}}async function logout(){try{await fetch('/api/session',{method:'DELETE',headers:headers(),credentials:'same-origin'})}catch{}localStorage.removeItem('boostr_auth_token');localStorage.removeItem('boostr_session');location.replace('/login/?logout=1')}[identifierField,passwordField].forEach(f=>{f.addEventListener('input',()=>clean(f));f.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();f===identifierField?passwordField.focus():login()}})});show.onclick=()=>passwordField.classList.toggle('revealed');submit.onclick=login;logoutBtn.onclick=logout;document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});document.addEventListener('touchmove',e=>{if(e.touches&&e.touches.length>1)e.preventDefault()},{passive:false});detectSession();</script></body></html>
