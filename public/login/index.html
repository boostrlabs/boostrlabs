<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BOOSTR Login</title><meta name="description" content="BOOSTR Labs account access."><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.login-shell{min-height:100vh;display:grid;place-items:center;padding:28px;position:relative;z-index:1}.login-card{width:min(520px,100%);border-radius:34px;padding:28px}.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}.login-brand img{width:78px;max-height:40px;object-fit:contain}.login-card h1{font-family:Space Grotesk,Inter,sans-serif;font-size:clamp(42px,7vw,72px);line-height:.9;letter-spacing:-.075em;margin:0 0 12px}.auth-form{display:grid;gap:12px;margin-top:22px}.auth-form label{display:grid;gap:7px;color:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.11em;font-weight:900}.auth-form input,.auth-form select{min-height:52px;border-radius:17px;border:1px solid var(--line2);background:rgba(0,0,0,.28);color:white;padding:0 14px}.login-note{border:1px solid rgba(119,255,172,.2);background:rgba(119,255,172,.06);border-radius:20px;padding:13px;color:var(--muted);font-size:12px;line-height:1.45}.login-foot{margin-top:18px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.ghost-link{font-size:12px;color:var(--champagne);font-weight:900}</style></head><body><div class="ambient"></div><main class="login-shell"><section class="login-card glass"><a class="login-brand" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR Labs"><div><span class="eyebrow">BOOSTR Identity</span><strong>Account Access</strong></div></a><h1>Sign in.</h1><p class="micro">Access Manager OS, Partner OS, Client OS or Artist OS.</p><form class="auth-form" id="loginForm"><label>Email<input name="email" type="email" autocomplete="email" placeholder="you@company.com" required></label><label>Workspace role<select name="role" id="roleSelect"><option value="manager">Manager</option><option value="partner">Partner</option><option value="client">Client</option><option value="artist">Artist</option></select></label><button class="btn primary" type="submit">Continue</button><button class="btn" type="button" id="clearSession">Clear local session</button><div class="login-note" id="authStatus">Frontend preview only. Real authentication will be connected by backend.</div></form><div class="login-foot"><a class="ghost-link" href="/home">← Home</a><a class="ghost-link" href="/audit" target="_blank" rel="noopener noreferrer">Start Audit ↗</a></div></section><footer class="footer">POWERED BY <strong>BOOSTR LABS</strong> · Identity OS</footer></main><script>const routes={manager:'/manager',partner:'/partner-dashboard',client:'/app',artist:'/app/82ngel'};const roleSelect=document.getElementById('roleSelect');const email=document.querySelector('[name=email]');const status=document.getElementById('authStatus');function paint(){const s=JSON.parse(localStorage.getItem('boostr_session')||'null');if(s){email.value=s.email||'';roleSelect.value=s.role||'manager';status.textContent=`Local preview session active: ${s.email||'no email'} · ${s.role}.`}}loginForm.addEventListener('submit',e=>{e.preventDefault();const s={email:email.value.trim(),role:roleSelect.value,createdAt:new Date().toISOString()};localStorage.setItem('boostr_session',JSON.stringify(s));location.href=routes[s.role]||'/app'});clearSession.addEventListener('click',()=>{localStorage.removeItem('boostr_session');status.textContent='Local session cleared.';email.value=''});paint();</script></body></html>
