<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Verify BOOSTR Email</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.wrap{min-height:100dvh;display:grid;place-items:center;padding:16px}.panel{width:min(100%,560px);border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border-radius:36px;padding:24px;box-shadow:0 38px 120px rgba(0,0,0,.7)}.panel img{width:128px;max-height:64px;object-fit:contain}.form{display:grid;gap:11px;margin-top:18px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}.form input{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.28);border-radius:18px;min-height:50px;color:#fff;padding:0 13px;font-weight:850}.status,.debug{min-height:18px;color:#feedb9;font-size:13px;font-weight:850;word-break:break-all}</style></head><body><div class="ambient"></div><main class="wrap"><section class="panel"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><span class="eyebrow">EMAIL VERIFICATION</span><h1>Verify email.</h1><p class="micro">Confirm the email attached to your BOOSTR account.</p><form class="form" id="form"><label>Email<input id="email" type="email" required></label><button class="btn primary" type="submit" id="submit">Verify token</button><button class="btn" type="button" id="request">Prepare verification link</button><div class="status" id="status"></div><div class="debug" id="debug"></div></form><p class="micro"><a href="/app">Back to dashboard</a></p></section></main><script>
const params=new URLSearchParams(location.search);const token=params.get('token')||'';email.value=params.get('email')||'';form.onsubmit=async e=>{e.preventDefault();status.textContent='Verifying...';try{const res=await fetch('/api/email-verification/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,email:email.value})});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;status.textContent='Email verified.';setTimeout(()=>location.href='/app',700)}catch(err){status.textContent=err?.message||err?.error||'Verification failed.'}};request.onclick=async()=>{status.textContent='Preparing verification...';try{const t=localStorage.getItem('boostr_auth_token');const res=await fetch('/api/email-verification/request',{method:'POST',headers:t?{Authorization:'Bearer '+t}: {},credentials:'same-origin'});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;status.textContent=data.already_verified?'Already verified.':data.message||'Verification prepared.';debug.innerHTML=data.debug?.verification_url?`Debug link: <a href="${data.debug.verification_url}">${data.debug.verification_url}</a>`:''}catch(err){status.textContent=err?.message||err?.error||'Could not prepare verification.'}};
</script></body></html>
