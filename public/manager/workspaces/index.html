<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Workspaces</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.workspace-list{display:grid;gap:10px}.workspace-row{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:24px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px}.workspace-row h3{margin:0 0 6px}.workspace-row p{margin:0;color:var(--muted);font-size:12px}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.pill{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:6px 8px;font-size:10px;font-weight:950;color:#feedb9}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar input{border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.24);border-radius:999px;min-height:42px;color:#fff;padding:0 13px}.empty{border:1px dashed rgba(255,255,255,.18);border-radius:24px;padding:18px;color:var(--muted)}@media(max-width:760px){.workspace-row{grid-template-columns:1fr}.toolbar input{width:100%}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><nav class="icon-nav"><a href="/manager/leads">⌘</a><a class="active" href="/manager/workspaces">◫</a><a href="/app/products">◆</a><a href="/manager/payment-links">$</a></nav></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>Manager OS</span><strong>Workspaces</strong></div><div class="search" id="msg">Loading workspaces...</div><a class="bell" href="/manager/leads">←</a></header><section class="card glass"><div class="section-head"><div><span class="eyebrow">CLIENT OPERATIONS</span><h1>Workspace command view.</h1><p class="micro">See clients/workspaces with products, links, reservations, files, invoices and open cards.</p></div><a class="btn" href="/manager/leads">Leads</a></div><div class="toolbar"><input id="q" placeholder="Search workspace"><button class="btn primary" id="search">Search</button><button class="btn" id="refresh">Refresh</button></div></section><section class="card glass"><div class="section-head"><div><span class="eyebrow">WORKSPACES</span><h2 id="count">Workspaces</h2></div></div><div class="workspace-list" id="list"><div class="empty">Loading...</div></div></section><footer class="footer">POWERED BY BOOSTR LABS · Workspaces</footer></main></div><script>
function headers(){const t=localStorage.getItem('boostr_auth_token');return t?{Authorization:'Bearer '+t}:{}}async function load(){try{const qs=q.value.trim()?`?q=${encodeURIComponent(q.value.trim())}`:'';const res=await fetch('/api/manager/workspaces'+qs,{headers:headers(),credentials:'same-origin',cache:'no-store'});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;const rows=data.workspaces||[];count.textContent=`Workspaces · ${rows.length}`;msg.textContent='Backend workspaces loaded';list.innerHTML=rows.length?rows.map(w=>`<article class="workspace-row"><div><h3>${w.name}</h3><p>${w.owner_email||'No owner email'} · ${w.slug}</p><div class="pills"><span class="pill">${w.type}</span><span class="pill">users ${w.users_count||0}</span><span class="pill">cards ${w.open_cards_count||0}</span><span class="pill">products ${w.products_count||0}</span><span class="pill">links ${w.smart_links_count||0}</span><span class="pill">reservations ${w.reservations_count||0}</span><span class="pill">files ${w.files_count||0}</span><span class="pill">invoices ${w.invoices_count||0}</span></div></div><div class="toolbar"><a class="btn" href="/app/intelligence?workspace_id=${w.id}">Intel</a><a class="btn" href="/app/products?workspace_id=${w.id}">Products</a></div></article>`).join(''):'<div class="empty">No workspaces found.</div>'}catch(e){msg.textContent=e?.error==='missing_session'?'Login required':'Workspace manager unavailable';list.innerHTML='<div class="empty">Login as admin/manager, or /api/manager/workspaces is not ready.</div>'}}search.onclick=load;refresh.onclick=load;load();
</script><script src="/assets/boostr-mother/console.js"></script></body></html>
