<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BOOSTR Signal Inbox</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.table-card{overflow:auto}.lead-table{width:100%;border-collapse:separate;border-spacing:0 10px}.lead-table th{color:var(--soft);font-size:10px;text-transform:uppercase;letter-spacing:.14em;text-align:left;padding:0 12px 6px}.lead-table td{background:rgba(255,255,255,.055);border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:13px 12px;font-size:13px;vertical-align:top}.lead-table td:first-child{border-left:1px solid var(--line2);border-radius:16px 0 0 16px}.lead-table td:last-child{border-right:1px solid var(--line2);border-radius:0 16px 16px 0}.lead-table tr{cursor:pointer}.lead-table tr:hover td{background:rgba(255,255,255,.09)}.bridge-box,.toolbar,.detail-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.bridge-box{margin-top:16px}.bridge-box input,.toolbar input,.detail-card input,.detail-card textarea,.detail-card select{min-height:42px;border-radius:15px;border:1px solid var(--line2);background:rgba(0,0,0,.22);color:white;padding:0 12px}.detail-card textarea{width:100%;min-height:84px;padding:12px;resize:vertical}.badge{border:1px solid var(--line2);border-radius:999px;padding:6px 8px;font-size:10px;font-weight:900;color:var(--green);background:rgba(119,255,172,.08);display:inline-block}.badge.gold{color:var(--gold);background:rgba(255,211,110,.08);border-color:rgba(255,211,110,.22)}pre{white-space:pre-wrap;color:var(--muted);font-size:12px}.manager-layout{display:grid;grid-template-columns:1fr .44fr;gap:18px}.detail-card{position:sticky;top:24px;align-self:start}.detail-grid{display:grid;gap:10px}.mini-label{display:block;color:var(--soft);font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:900;margin:10px 0 6px}.empty-detail{color:var(--muted);font-size:13px}.status-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.status-tabs button{border:1px solid var(--line2);background:rgba(255,255,255,.06);color:var(--muted);border-radius:999px;padding:8px 10px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.status-tabs button.active{color:#06101b;background:linear-gradient(135deg,#f8fbff,#f6e4bd)}@media(max-width:980px){.manager-layout{grid-template-columns:1fr}.detail-card{position:relative;top:auto}}@media(max-width:700px){.lead-table{min-width:780px}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo-letter',textContent:'B'}))"></a><nav class="icon-nav"><a class="active" href="/manager" title="Manager">⌘</a><a href="/app" title="Client">◫</a><a href="/partner-dashboard" title="Partner">◇</a><a href="/audit" title="Audit">↯</a><a href="/modules" title="Modules">◌</a></nav><div class="utility"><a href="/login" title="Login">◎</a><a href="/ecosystem" title="Map">?</a></div></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>Manager OS</span><strong>Signal Inbox</strong></div><div class="search">Search signals, leads, modules...</div><a class="bell" href="/api/health" title="API health">●</a><a class="role-pill" href="/login"><div class="avatar"></div><div><b id="roleLabel">Admin</b><div class="micro">Manager</div></div></a></header><section class="card glass"><div class="section-head"><div><span class="chip live">Signal Engine</span><h1 style="margin-top:12px">Review. Route. Convert.</h1></div><a class="btn" href="/audit">Audit</a></div><div class="bridge-box"><input id="token" type="password" placeholder="Access token"><button class="btn primary" id="loadLeads">Leads</button><button class="btn" id="loadAudit">Audits</button><button class="btn" id="loadSummary">Summary</button></div><div class="status-tabs" id="statusTabs"><button class="active" data-status="">All</button><button data-status="new">New</button><button data-status="reviewing">Review</button><button data-status="qualified">Qualified</button><button data-status="contacted">Contacted</button><button data-status="proposal">Proposal</button><button data-status="won">Won</button><button data-status="lost">Lost</button></div><p class="micro" id="status" style="margin-top:12px"></p></section><section class="manager-layout"><section class="card glass table-card"><div class="section-head"><div><h2>Queue</h2><div class="micro" id="count">No data.</div></div><div class="toolbar"><input id="filter" placeholder="Filter"><input id="serverQ" placeholder="Server search"><button class="btn" id="serverSearch">Search</button></div></div><table class="lead-table"><thead><tr><th>Date</th><th>Contact</th><th>Business</th><th>Status</th><th>Signal</th></tr></thead><tbody id="rows"></tbody></table><pre id="raw"></pre></section><aside class="card glass detail-card"><div class="section-head"><div><span class="eyebrow">Detail</span><h3 id="detailTitle">Select</h3></div><span class="chip" id="detailType">None</span></div><div id="detailBody" class="empty-detail">Load. Select. Act.</div><div id="editBox" style="display:none"><label class="mini-label">Status</label><select id="detailStatus"><option>new</option><option>reviewing</option><option>contacted</option><option>qualified</option><option>proposal</option><option>won</option><option>lost</option><option>archived</option></select><label class="mini-label">Owner</label><input id="assignedTo" placeholder="owner"><label class="mini-label">Note</label><textarea id="note" placeholder="Internal note"></textarea><div class="detail-actions"><button class="btn primary" id="saveLead">Save</button><button class="btn" data-quick="reviewing">Review</button><button class="btn" data-quick="qualified">Qualified</button><button class="btn" data-quick="lost">Lost</button></div></div></aside></section><nav class="bottom-tabs glass"><a class="active" href="/manager">Manager</a><a href="/partner-dashboard">Partner</a><a href="/app">Client</a><a href="/audit">Audit</a><a href="/modules">Modules</a><a class="plus" href="/login">+</a></nav><footer class="footer">POWERED BY BOOSTR LABS · Signal Inbox</footer></main></div><script>const token=document.getElementById('token'),rows=document.getElementById('rows'),raw=document.getElementById('raw'),statusEl=document.getElementById('status'),count=document.getElementById('count'),filter=document.getElementById('filter'),serverQ=document.getElementById('serverQ');let lastRows=[],currentType='leads',currentStatus='',selected=null;const s=JSON.parse(localStorage.getItem('boostr_session')||'null');if(s){roleLabel.textContent=s.role+' preview'}function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function modules(value){try{return JSON.parse(value||'[]').join(', ')}catch{return value||''}}function contact(item){return item.contact_email||item.contact_phone||item.contact_raw||''}function goal(item){return modules(item.recommended_modules)||item.project_goal||item.stage||item.source||''}function requireAccess(){const value=token.value.trim();if(!value){statusEl.textContent='Access token required.';count.textContent='No data.';return null}return value}function render(list){rows.innerHTML=list.map(item=>`<tr data-id="${esc(item.id)}"><td>${esc(new Date(item.created_at).toLocaleString())}</td><td>${esc(item.contact_name||'No name')}<br><span class="micro">${esc(contact(item))}</span></td><td>${esc(item.business_name||'No business')}<br><span class="micro">${esc(item.industry||item.source||'')}</span></td><td><span class="badge ${item.status==='qualified'||item.status==='won'?'gold':''}">${esc(item.status||'new')}</span></td><td>${esc(goal(item))}</td></tr>`).join('');rows.querySelectorAll('tr').forEach(tr=>tr.addEventListener('click',()=>selectRow(tr.dataset.id)))}function selectRow(id){selected=lastRows.find(x=>x.id===id);if(!selected)return;detailTitle.textContent=selected.business_name||selected.contact_name||selected.id;detailType.textContent=currentType;detailBody.innerHTML=`<div class="detail-grid"><p class="micro"><b>Contact:</b> ${esc(selected.contact_name||'No name')} · ${esc(contact(selected)||'No contact')}</p><p class="micro"><b>Business:</b> ${esc(selected.business_name||'No business')} · ${esc(selected.industry||'')}</p><p class="micro"><b>Signal:</b> ${esc(goal(selected)||'No goal')}</p></div>`;editBox.style.display=currentType==='leads'?'block':'none';detailStatus.value=selected.status||'new';assignedTo.value=selected.assigned_to||'';note.value=''}async function load(type='leads'){currentType=type;selected=null;editBox.style.display='none';detailTitle.textContent='Select';detailType.textContent=type;detailBody.textContent='Loading...';rows.innerHTML='';raw.textContent='';count.textContent='Loading...';statusEl.textContent='';const value=requireAccess();if(!value)return;const params=new URLSearchParams({type,limit:'50'});if(currentStatus)params.set('status',currentStatus);if(serverQ.value.trim())params.set('q',serverQ.value.trim());const res=await fetch(`/api/leads?${params.toString()}`,{headers:{'X-Manager-Pin':value}});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok){statusEl.textContent=data.error||'Failed.';count.textContent='No data.';raw.textContent=JSON.stringify(data,null,2);detailBody.textContent='No selection.';return}if(type==='summary'){raw.textContent=JSON.stringify(data,null,2);lastRows=[];count.textContent='Summary.';detailBody.textContent='Summary loaded.';return}lastRows=data.rows||[];count.textContent=`${lastRows.length} loaded.`;detailBody.textContent='Select a row.';render(lastRows)}async function updateSelected(nextStatus){if(!selected||currentType!=='leads')return;const value=requireAccess();if(!value)return;const payload={status:nextStatus||detailStatus.value,assigned_to:assignedTo.value,note:note.value};const res=await fetch(`/api/leads/${encodeURIComponent(selected.id)}`,{method:'PATCH',headers:{'Content-Type':'application/json','X-Manager-Pin':value},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(!res.ok||!data.ok){statusEl.textContent=data.error||'Failed.';raw.textContent=JSON.stringify(data,null,2);return}statusEl.textContent=`Updated: ${data.status}.`;await load('leads')}filter.addEventListener('input',()=>{const q=filter.value.toLowerCase();render(lastRows.filter(x=>JSON.stringify(x).toLowerCase().includes(q))) });loadLeads.addEventListener('click',()=>load('leads'));loadAudit.addEventListener('click',()=>load('audit'));loadSummary.addEventListener('click',()=>load('summary'));serverSearch.addEventListener('click',()=>load(currentType==='audit'?'audit':'leads'));saveLead.addEventListener('click',()=>updateSelected());document.querySelectorAll('[data-quick]').forEach(btn=>btn.addEventListener('click',()=>updateSelected(btn.dataset.quick)));document.querySelectorAll('#statusTabs button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('#statusTabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentStatus=btn.dataset.status;load(currentType==='audit'?'audit':'leads')}));</script><script src="/assets/boostr-mother/console.js"></script></body></html>
