<!doctype html><html lang="es" data-build="boostr-live-v2"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Live</title><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>:root{--cyan:#78ecff;--green:#7dff9e}.shell{display:grid;grid-template-columns:.9fr 1.1fr;gap:16px}.panel{padding:20px}.form{display:grid;gap:13px}.field{display:grid;gap:7px}.field span{font:950 10px/1 ui-monospace;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.62)}.field input,.field select,.field textarea{width:100%;min-height:52px;border:1px solid rgba(255,255,255,.14);border-radius:18px;background:rgba(0,0,0,.28);color:#fff;padding:0 14px;font-size:16px;font-weight:800}.field textarea{padding-top:14px;min-height:100px}.hint{color:rgba(255,255,255,.52);font-size:12px}.platforms{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.platform{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.045);border-radius:18px;padding:13px;text-align:left;color:#fff;font-weight:950}.platform.active{border-color:rgba(120,236,255,.6);color:var(--cyan);background:rgba(120,236,255,.1)}.btn-main{min-height:58px;border:0;border-radius:999px;background:#fff;color:#000;font-weight:1000;font-size:16px}.rooms{display:grid;gap:10px}.room{border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:14px;background:rgba(255,255,255,.04)}.room h3{margin:0 0 6px}.room p{margin:0;color:var(--muted);font-size:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}@media(max-width:900px){.shell{grid-template-columns:1fr}.platforms{grid-template-columns:1fr}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><nav class="icon-nav"><a href="/home">⌂</a><a href="/manager/payment-links/">$</a><a class="active" href="/manager/live/">LIVE</a></nav></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>BOOSTR LIVE VIEWER</span><strong>Crear sala</strong></div><div class="search" id="msg">Leyendo sesión...</div><a class="bell" href="/manager">←</a></header><section class="shell"><section class="card glass panel"><span class="eyebrow">VIDEO EXTERNO · CONTROL INTERNO</span><h1>Crea una sala LIVE.</h1><p class="micro">Pega tus streams. BOOSTR añade chat, comercio y experiencia de sala.</p><form class="form" id="form"><label class="field"><span>Negocio / workspace</span><select id="workspace"></select></label><label class="field"><span>Nombre de la sala</span><input id="title" required placeholder="WESTDETRO Beat Auction Live"></label><label class="field"><span>Link personalizado del creador</span><input id="customSlug" required maxlength="80" placeholder="jankodiorr"></label><div class="hint">Tu sala será: <strong id="slugPreview">boostrlabs.com/live/jankodiorr</strong></div><label class="field"><span>Descripción</span><textarea id="description" placeholder="Qué ocurrirá durante el live."></textarea></label><div class="field"><span>Plataforma principal</span><div class="platforms" id="platforms"><button type="button" class="platform active" data-platform="youtube">YouTube</button><button type="button" class="platform" data-platform="twitch">Twitch</button><button type="button" class="platform" data-platform="kick">Kick</button></div></div><label class="field"><span>YouTube URL</span><input id="youtube" placeholder="https://youtube.com/watch?v=..."></label><label class="field"><span>Twitch URL</span><input id="twitch" placeholder="https://twitch.tv/canal"></label><label class="field"><span>Kick URL</span><input id="kick" placeholder="https://kick.com/canal"></label><label class="field"><span>Chat principal</span><select id="chatMode"><option value="boostr">BOOSTR Chat</option><option value="platform">Chat de plataforma</option></select></label><button class="btn-main" id="createBtn" type="submit">Crear BOOSTR Live</button></form></section><section class="card glass panel"><span class="eyebrow">SALAS</span><h2>BOOSTR Live Rooms</h2><div id="rooms" class="rooms"><div class="empty">Cargando...</div></div></section></section></main></div><script>const token=()=>localStorage.getItem('boostr_auth_token');const headers=()=>token()?{Authorization:'Bearer '+token()}:{};let primary='youtube',workspaces=[];async function api(path,opts={}){const r=await fetch(path,{...opts,headers:{...(opts.body?{'Content-Type':'application/json'}:{}),...headers()},credentials:'same-origin',body:opts.body?JSON.stringify(opts.body):undefined});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw d;return d}function setMsg(v){msg.textContent=v}function cleanSlug(v){return String(v||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,80)}customSlug.addEventListener('input',()=>{customSlug.value=cleanSlug(customSlug.value);slugPreview.textContent=location.host+'/live/'+(customSlug.value||'tu-nombre')});platforms.querySelectorAll('[data-platform]').forEach(b=>b.onclick=()=>{primary=b.dataset.platform;platforms.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x===b))});async function loadSession(){const d=await api('/api/workspace-os');workspaces=d.available_workspaces||[];workspace.innerHTML=workspaces.map(w=>`<option value="${w.id}">${w.name||w.slug} · ${w.role||'miembro'}</option>`).join('');if(d.workspace?.id)workspace.value=d.workspace.id;await loadRooms()}async function loadRooms(){if(!workspace.value)return;const d=await api('/api/live-rooms?workspace_id='+encodeURIComponent(workspace.value));const list=d.rooms||[];rooms.innerHTML=list.length?list.map(r=>`<article class="room"><h3>${r.title}</h3><p>${r.primary_platform.toUpperCase()} · ${r.status}</p><p>${location.host}/live/${r.slug}</p><div class="actions"><a class="btn primary" target="_blank" href="/live/${r.slug}">Abrir sala</a><button class="btn" onclick="navigator.clipboard.writeText(location.origin+'/live/${r.slug}')">Copiar</button></div></article>`).join(''):'<div class="empty">Todavía no hay salas LIVE.</div>';setMsg('BOOSTR Live listo')}workspace.onchange=loadRooms;form.onsubmit=async e=>{e.preventDefault();createBtn.disabled=true;createBtn.textContent='Creando...';try{const d=await api('/api/live-rooms',{method:'POST',body:{workspace_id:workspace.value,title:title.value,slug:customSlug.value,description:description.value,primary_platform:primary,youtube_url:youtube.value,twitch_url:twitch.value,kick_url:kick.value,chat_mode:chatMode.value}});location.href=d.room.public_url}catch(err){setMsg(err?.message||err?.error||'No se pudo crear la sala')}finally{createBtn.disabled=false;createBtn.textContent='Crear BOOSTR Live'}};loadSession().catch(e=>setMsg(e?.message||e?.error||'No se pudo leer la sesión'));</script></body></html>
