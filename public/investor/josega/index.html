<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Labs × Josega</title><meta name="description" content="BOOSTR Labs investor brief para Josega."><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><style>:root{--bg:#000;--fg:#f7f7f4;--muted:rgba(255,255,255,.63);--line:rgba(255,255,255,.16);--green:#58ff91;--gold:#feedb9;--red:#ff193f}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{scroll-behavior:smooth}body{margin:0;min-height:100%;background:radial-gradient(circle at 72% 0,rgba(254,237,185,.13),transparent 30%),radial-gradient(circle at 14% 88%,rgba(88,255,145,.09),transparent 28%),#000;color:var(--fg);font-family:Inter,Arial,Helvetica,sans-serif;overflow:hidden}.app{height:100dvh;width:100vw;display:grid;place-items:center;padding:10px}.frame{width:min(100%,460px);height:calc(100dvh - 20px);border:1px solid rgba(255,255,255,.22);border-radius:34px;background:rgba(0,0,0,.9);box-shadow:0 40px 120px rgba(0,0,0,.86),inset 0 1px 0 rgba(255,255,255,.12);position:relative;overflow:hidden}.code{position:absolute;inset:0;opacity:.06;font:800 11px/1.7 ui-monospace,Menlo,monospace;color:var(--green);white-space:pre;animation:fall 18s linear infinite;pointer-events:none}@keyframes fall{from{transform:translateY(-30%)}to{transform:translateY(18%)}}.inner{height:100%;display:flex;flex-direction:column;padding:17px 15px 12px;position:relative}.header{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;background:#090909;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.name{font-size:11px;letter-spacing:.26em;font-weight:950;color:var(--gold)}.sub{font:700 10px/1.2 ui-monospace,Menlo,monospace;color:var(--green)}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;color:#fff;font-size:10px;font-weight:950;letter-spacing:.12em;padding:8px 10px}.progress{margin:15px 0 8px}.pmeta{display:flex;justify-content:space-between;color:var(--muted);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em}.track{height:5px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:8px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold),#79c7ff);transition:.35s}.stage{flex:1;min-height:0;overflow:auto;padding:10px 1px 10px;animation:in .25s ease both}@keyframes in{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}.kicker{font:900 10px/1 ui-monospace,Menlo,monospace;color:var(--green);letter-spacing:.18em;margin:14px 0 11px;text-transform:uppercase}h1,h2{font-family:Arial Black,Arial,sans-serif;letter-spacing:-.08em;margin:0 0 12px;line-height:.86}h1{font-size:clamp(42px,13vw,64px)}h2{font-size:clamp(34px,10vw,48px)}p{margin:0;color:var(--muted);line-height:1.43;font-size:14px}.lead{font-size:15px;color:rgba(255,255,255,.76)}.matrix{border:1px solid rgba(255,25,63,.38);background:linear-gradient(145deg,rgba(255,25,63,.12),rgba(0,0,0,.38));box-shadow:0 0 42px rgba(255,25,63,.14),inset 0 1px 0 rgba(255,255,255,.08);border-radius:28px;padding:15px;margin-top:14px}.matrix b{display:block;color:var(--red);font-family:Arial Black,Arial,sans-serif;font-size:clamp(25px,8vw,40px);line-height:.88;letter-spacing:-.07em;text-transform:uppercase}.console{font:800 11px/1.55 ui-monospace,Menlo,monospace;color:rgba(88,255,145,.92);border:1px solid rgba(88,255,145,.18);background:rgba(88,255,145,.035);border-radius:20px;padding:12px;margin-top:15px;white-space:pre-wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}.choice{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;color:#fff;text-align:left;padding:12px;min-height:66px;font-weight:850;font-size:13px;line-height:1.22}.choice span{display:block;color:var(--green);font:900 10px/1 ui-monospace,Menlo,monospace;margin-bottom:7px}.full{grid-column:1/-1}.actions{display:flex;gap:10px;margin-top:auto;padding-top:12px}.nav{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;min-height:50px;font-weight:950;cursor:pointer}.nav.next{background:#fff;color:#000;border-color:#fff}.nav.red{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 32px rgba(255,25,63,.28)}.gold{color:var(--gold)}.green{color:var(--green)}a{color:inherit;text-decoration:none}@media(max-width:390px){.app{padding:7px}.frame{height:calc(100dvh - 14px);border-radius:30px}.inner{padding:14px 12px 11px}.grid{grid-template-columns:1fr}h1{font-size:40px}}</style></head><body><div class="app"><main class="frame"><div class="code">boostr.init()\nlead.capture()\ncrm.sync()\nhuman.review=true\nai.engine=internal\nmodules.custom=true\nprofit.signal++\n\n</div><div class="inner"><header class="header"><div class="brand"><div class="logo"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></div><div><div class="name">BOOSTR LABS</div><div class="sub">INVESTOR ENGINE</div></div></div><div class="pill">JOSEGA</div></header><div class="progress"><div class="pmeta"><span id="label">DISCOVERY</span><span id="count">1/7</span></div><div class="track"><div class="bar" id="bar"></div></div></div><section class="stage" id="stage"></section><div class="actions"><button class="nav" id="back">Atrás</button><button class="nav next" id="next">Siguiente</button></div></div></main></div><script>const slides=[{k:'PRIVATE BRIEF',h:'Josega, esto es BOOSTR.',p:'Un laboratorio tecnológico que convierte negocios con talento, producto o audiencia en sistemas más organizados, más vendibles y más rentables.',x:'$ boostr --boot josega\nhuman_review: enabled\nai_engine: internal\nobjective: leads → sales → profit'},{k:'THE PROBLEM',h:'No es solo tener negocio. Es tener estructura.',p:'La tecnología permitió que cualquiera convierta una habilidad o producto en negocio. Pero no le dio automáticamente procesos, dirección, marketing, ventas, datos y seguimiento.'},{k:'SIMPLE MATH',h:'Buen producto → audiencia → leads → ventas.',p:'BOOSTR trabaja en las herramientas que hacen esa cadena más clara: atraer interesados, cerrar mejor, ahorrar tiempo y reducir caos.'},{k:'FEATURES',h:'Lo que BOOSTR suma.',features:['Website premium','Landing pages','Smart links','Lead capture','CRM simple','Follow-up automático','Checkout / pagos','Dashboards','Portales privados','Rewards / VIP','Custom OS','AI interna']},{k:'CUSTOM OS',h:'No pagas por módulos inútiles.',p:'Muchas apps son cool, pero si tienen 50 módulos y tu negocio usa 5, estás pagando complejidad. BOOSTR activa lo que realmente aplica a tu modelo.'},{k:'WHY BOOSTR',h:'IA interna. Experiencia humana.',p:'La IA trabaja dentro de BOOSTR, pero el partner no recibe una experiencia genérica. Las recomendaciones nacen de evaluación humana real, ajustada al negocio.'},{k:'THE PUNCHLINE',h:'Los científicos viven en la mente de JANKO.',p:'JANKO puso a Claude, Claude Code, ChatGPT, Codex, Copilot y Gemini a trabajar juntos. Cada IA funciona como un empleado distinto. El humano no desaparece: se multiplica.',red:true}];let i=0;const stage=document.getElementById('stage'),bar=document.getElementById('bar'),count=document.getElementById('count'),label=document.getElementById('label'),back=document.getElementById('back'),next=document.getElementById('next');function render(){const s=slides[i];label.textContent=s.k;count.textContent=(i+1)+'/'+slides.length;bar.style.width=((i+1)/slides.length*100)+'%';next.textContent=i===slides.length-1?'Enviar a Josega':'Siguiente';back.style.visibility=i?'visible':'hidden';let body='<div class="kicker">'+s.k+'</div><h1>'+s.h+'</h1>'+(s.p?'<p class="lead">'+s.p+'</p>':'');if(s.x)body+='<div class="console">'+s.x+'</div>';if(s.features)body+='<div class="grid">'+s.features.map((f,n)=>'<div class="choice"><span>'+String(n+1).padStart(2,'0')+'</span>'+f+'</div>').join('')+'</div>';if(s.red)body+='<div class="matrix"><b>BOOSTR no promete magia. Promete sistema.</b><p>Más interesados. Mejor conversión. Menos caos. Más claridad. Más ventas.</p></div>';stage.innerHTML=body;stage.scrollTop=0}back.onclick=()=>{if(i>0){i--;render()}};next.onclick=()=>{if(i<slides.length-1){i++;render()}else{location.href='/'}};render();</script></body></html>
