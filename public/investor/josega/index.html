<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Labs × Josega</title><meta name="description" content="BOOSTR Labs investor brief para Josega."><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><style>:root{--fg:#f7f7f4;--muted:rgba(255,255,255,.63);--line:rgba(255,255,255,.16);--green:#58ff91;--gold:#feedb9;--red:#ff193f}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100%;background:radial-gradient(circle at 72% 0,rgba(254,237,185,.13),transparent 30%),radial-gradient(circle at 14% 88%,rgba(88,255,145,.09),transparent 28%),#000;color:var(--fg);font-family:Inter,Arial,Helvetica,sans-serif;overflow:hidden}.app{height:100dvh;width:100vw;display:grid;place-items:center;padding:10px}.frame{width:min(100%,460px);height:calc(100dvh - 20px);border:1px solid rgba(255,255,255,.22);border-radius:34px;background:rgba(0,0,0,.9);box-shadow:0 40px 120px rgba(0,0,0,.86),inset 0 1px 0 rgba(255,255,255,.12);position:relative;overflow:hidden}.code{position:absolute;inset:0;opacity:.055;font:800 11px/1.7 ui-monospace,Menlo,monospace;color:var(--green);white-space:pre;animation:fall 18s linear infinite;pointer-events:none}@keyframes fall{from{transform:translateY(-30%)}to{transform:translateY(18%)}}.inner{height:100%;display:flex;flex-direction:column;padding:17px 15px 12px;position:relative}.header{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;background:#090909;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.name{font-size:11px;letter-spacing:.26em;font-weight:950;color:var(--gold)}.sub{font:700 10px/1.2 ui-monospace,Menlo,monospace;color:var(--green)}.pill{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;color:#fff;font-size:10px;font-weight:950;letter-spacing:.12em;padding:8px 10px}.progress{margin:15px 0 8px}.pmeta{display:flex;justify-content:space-between;color:var(--muted);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em}.track{height:5px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:8px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold),#79c7ff);transition:.35s}.stage{flex:1;min-height:0;overflow:auto;padding:10px 1px;animation:in .25s ease both}@keyframes in{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}.kicker{font:900 10px/1 ui-monospace,Menlo,monospace;color:var(--green);letter-spacing:.18em;margin:14px 0 11px;text-transform:uppercase}h1{font-family:Arial Black,Arial,sans-serif;letter-spacing:-.08em;margin:0 0 12px;line-height:.86;font-size:clamp(40px,12.5vw,62px)}p{margin:0;color:var(--muted);line-height:1.43;font-size:14px}.lead{font-size:15px;color:rgba(255,255,255,.76)}.matrix{border:1px solid rgba(255,25,63,.38);background:linear-gradient(145deg,rgba(255,25,63,.12),rgba(0,0,0,.38));box-shadow:0 0 42px rgba(255,25,63,.14),inset 0 1px 0 rgba(255,255,255,.08);border-radius:28px;padding:15px;margin-top:14px}.matrix b{display:block;color:var(--red);font-family:Arial Black,Arial,sans-serif;font-size:clamp(24px,7.4vw,38px);line-height:.88;letter-spacing:-.07em;text-transform:uppercase}.console{font:800 11px/1.55 ui-monospace,Menlo,monospace;color:rgba(88,255,145,.92);border:1px solid rgba(88,255,145,.18);background:rgba(88,255,145,.035);border-radius:20px;padding:12px;margin-top:15px;white-space:pre-wrap;min-height:88px}.cursor{display:inline-block;width:7px;height:14px;background:var(--green);vertical-align:-2px;animation:blink .85s infinite}@keyframes blink{50%{opacity:0}}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}.choice{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;color:#fff;text-align:left;padding:12px;min-height:66px;font-weight:850;font-size:13px;line-height:1.22}.choice span{display:block;color:var(--green);font:900 10px/1 ui-monospace,Menlo,monospace;margin-bottom:7px}.actions{display:flex;gap:10px;margin-top:auto;padding-top:12px}.nav{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;min-height:50px;font-weight:950;cursor:pointer}.nav.next{background:#fff;color:#000;border-color:#fff}@media(max-width:390px){.app{padding:7px}.frame{height:calc(100dvh - 14px);border-radius:30px}.inner{padding:14px 12px 11px}.grid{grid-template-columns:1fr}h1{font-size:38px}}</style></head><body><div class="app"><main class="frame"><div class="code">boostr.init()\nlead.capture()\ncrm.sync()\nhuman.review=true\nai.engine=internal\nmodules.custom=true\nprofit.signal++\n\n</div><div class="inner"><header class="header"><div class="brand"><div class="logo"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></div><div><div class="name">BOOSTR LABS</div><div class="sub">INVESTOR ENGINE</div></div></div><div class="pill">JOSEGA</div></header><div class="progress"><div class="pmeta"><span id="label">DISCOVERY</span><span id="count">1/10</span></div><div class="track"><div class="bar" id="bar"></div></div></div><section class="stage" id="stage"></section><div class="actions"><button class="nav" id="back">Atrás</button><button class="nav next" id="next">Siguiente</button></div></div></main></div><script>const slides=[{k:'BOOSTR LABS',h:'Josega, te explico BOOSTR en humano.',p:'En pocas palabras, somos un laboratorio de científicos de la tecnología que un día se despertaron pensando… ¿por qué la frase “soy mi propio jefe” comenzó a dar cringe de un momento a otro?'},{k:'THE CRINGE',h:'La razón es simple.',p:'La mayoría de los que lo dicen, sin importar cuánto dinero estén ganando, podría ganar MÁS. Podría trabajar MEJOR. Podría tener más estructura.'},{k:'NO ES SOLO DINERO',h:'Ser “tu propio jefe” no es un tema económico.',p:'Es un tema de estructura, dirección y marketing. Si el negocio genera dinero pero vive en caos, todavía le falta sistema.'},{k:'LA CULPA',h:'¿La culpa de que dé cringe decirlo?',p:'La misma tecnología. Evolucionó tan rápido que dejó que muchas personas convirtieran su talento, habilidad o producto en un NEGOCIO… pero no les trajo debajo del brazo la estructura interna de una empresa.'},{k:'AQUÍ APARECE BOOSTR',h:'BOOSTR Labs entra ahí.',p:'Un laboratorio virtual tecnológico que le da a una empresa todos los boost que necesita para lograr sus objetivos: conseguir más INTERESADOS en su producto y mejorar el ratio de conversión de esos interesados en VENTAS.'},{k:'PROFIT',h:'Ventas = profit.',p:'Toda empresa necesita producir dinero. Ese es el principio económico como tal. Nadie abre una empresa para perder plata. Eso debería ser implícito, pero a veces hay que decirlo.'},{k:'SIMPLE MATH',h:'Los business owners se complican.',p:'Y en realidad es tan simple:',x:'buen producto/servicio >>> audiencia\naudiencia >>> más leads\nherramientas para cerrar más fácil >>> MÁS ventas'},{k:'FEATURES',h:'¿Cuáles son esas herramientas?',p:'BOOSTR Labs las tiene dentro de su ecosistema. No todas para todo el mundo. Las correctas para el negocio correcto.',features:['Website premium','Landing pages','Smart links','Lead capture','CRM simple','Follow-up automático','Checkout / pagos','Dashboards','Portales privados','Rewards / VIP','Custom OS','AI interna']},{k:'NO ES UNA APP GENÉRICA',h:'Aquí está la diferencia.',p:'Hay muchas apps cool, sí. Pero si sus módulos no tienen aplicación en tu modelo de negocio, el módulo es inútil. BOOSTR no te llena de cosas que no vas a usar. Te arma una experiencia con palabras, interfaz y módulos adaptados a lo que haces, vendes u ofreces.'},{k:'PUNCHLINE',h:'Y sí… los científicos existen.',p:'Honestamente, existen todos en la mente del founder/developer/designer/etc: JANKO. JANKO puso a Claude, Claude Code, ChatGPT, Codex, Copilot y Gemini a trabajar juntos, todos al mismo tiempo retroalimentándose, mientras él ejecutaba, creaba flujos, brainstormings, frontend y backend. Cada IA era un empleado. O varios a la vez.',red:true}];let i=0,typeTimer=null;const stage=document.getElementById('stage'),bar=document.getElementById('bar'),count=document.getElementById('count'),label=document.getElementById('label'),back=document.getElementById('back'),next=document.getElementById('next');function typeCode(text){clearTimeout(typeTimer);const el=document.getElementById('type');if(!el)return;let n=0;function tick(){el.textContent=text.slice(0,n++);if(n<=text.length)typeTimer=setTimeout(tick,42)}tick()}function render(){clearTimeout(typeTimer);const s=slides[i];label.textContent=s.k;count.textContent=(i+1)+'/'+slides.length;bar.style.width=((i+1)/slides.length*100)+'%';next.textContent=i===slides.length-1?'Cerrar':'Siguiente';back.style.visibility=i?'visible':'hidden';let body='<div class="kicker">'+s.k+'</div><h1>'+s.h+'</h1>'+(s.p?'<p class="lead">'+s.p+'</p>':'');if(s.x)body+='<div class="console"><span id="type"></span><span class="cursor"></span></div>';if(s.features)body+='<div class="grid">'+s.features.map((f,n)=>'<div class="choice"><span>'+String(n+1).padStart(2,'0')+'</span>'+f+'</div>').join('')+'</div>';if(s.red)body+='<div class="matrix"><b>La IA no reemplazó al humano. Multiplicó al founder.</b><p>Ese es el laboratorio detrás de BOOSTR Labs.</p></div>';stage.innerHTML=body;stage.scrollTop=0;if(s.x)typeCode(s.x)}back.onclick=()=>{if(i>0){i--;render()}};next.onclick=()=>{if(i<slides.length-1){i++;render()}else{location.href='/'}};render();</script></body></html>
