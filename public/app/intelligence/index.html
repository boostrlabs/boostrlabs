<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>BOOSTR Intelligence</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.intel{display:grid;grid-template-columns:.76fr 1.24fr;gap:18px}.score-ring{width:150px;height:150px;border-radius:44px;border:1px solid rgba(254,237,185,.22);display:grid;place-items:center;font:950 58px/1 Arial Black,Arial;color:#feedb9;background:rgba(254,237,185,.05)}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mini{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:20px;padding:12px}.mini span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:950}.mini b{font-size:26px}.rec-list{display:grid;gap:10px}.rec{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:24px;padding:14px}.rec h3{margin:0 0 6px}.rec p{margin:0;color:var(--muted);font-size:13px;line-height:1.4}.rec .row{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:12px}.pill{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:6px 8px;font-size:10px;font-weight:950;color:#feedb9}.empty{border:1px dashed rgba(255,255,255,.18);border-radius:24px;padding:18px;color:var(--muted)}@media(max-width:940px){.intel{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr 1fr}.score-ring{width:100%;height:110px}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><nav class="icon-nav"><a href="/app">◫</a><a class="active" href="/app/intelligence">↯</a><a href="/app/products">◆</a><a href="/manager/payment-links">$</a><a href="/app/files">▣</a></nav></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>Custom OS</span><strong>Intelligence Engine</strong></div><div class="search" id="msg">Loading workspace signals...</div><a class="bell" href="/app">←</a></header><section class="intel"><section class="card glass"><span class="eyebrow">WORKSPACE HEALTH</span><h1>Next to BOOST.</h1><p class="micro">Rule-based V1. Reads audit, products, Smart Links, reservations, cards, files and invoices.</p><div class="score-ring" id="score">--</div><div class="metric-grid" id="metrics"></div><button class="btn primary" id="run" style="margin-top:14px">Create action cards</button><p class="micro" id="runStatus"></p></section><section class="card glass"><div class="section-head"><div><span class="eyebrow">RECOMMENDATIONS</span><h2 id="count">Recommendations</h2></div><a class="btn" href="/app">Dashboard</a></div><div class="rec-list" id="list"><div class="empty">Loading...</div></div></section></section><footer class="footer">POWERED BY BOOSTR LABS · Intelligence</footer></main></div><script>
function headers(){const t=localStorage.getItem('boostr_auth_token');return t?{Authorization:'Bearer '+t}:{}}async function load(){try{const res=await fetch('/api/insights/summary',{headers:headers(),credentials:'same-origin',cache:'no-store'});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;const i=data.intelligence;score.textContent=i.score;msg.textContent='Workspace intelligence loaded';metrics.innerHTML=Object.entries(i.totals).slice(0,9).map(([k,v])=>`<div class="mini"><span>${k.replaceAll('_',' ')}</span><b>${v}</b></div>`).join('');count.textContent=`Recommendations · ${i.recommendations.length}`;list.innerHTML=i.recommendations.length?i.recommendations.map(r=>`<article class="rec"><h3>${r.title}</h3><p>${r.summary}</p><div class="row"><span class="pill">${r.reason}</span><a class="btn" href="${r.action_url}">${r.action_label}</a></div></article>`).join(''):'<div class="empty">No urgent recommendations. The workspace has the basics covered.</div>'}catch(e){msg.textContent=e?.error==='missing_session'?'Login required':'Intelligence unavailable';list.innerHTML='<div class="empty">Login required, or /api/insights/summary is not ready.</div>'}}run.onclick=async()=>{runStatus.textContent='Creating cards...';try{const res=await fetch('/api/insights/run',{method:'POST',headers:headers(),credentials:'same-origin'});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;runStatus.textContent=`Cards created: ${data.cards_created}`;await load()}catch(e){runStatus.textContent=e?.message||e?.error||'Run failed'}};load();
</script><script src="/assets/boostr-mother/console.js"></script></body></html>
