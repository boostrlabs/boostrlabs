<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dashboard Invoices</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.billing{display:grid;grid-template-columns:.76fr 1.24fr;gap:18px}.form{display:grid;gap:10px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.11em;text-transform:uppercase}.form input,.form select{border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.28);color:#fff;border-radius:18px;min-height:48px;padding:0 13px;font-weight:850}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:grid;gap:10px}.invoice{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:24px;padding:14px}.invoice h3{margin:0 0 6px}.invoice p{margin:0;color:var(--muted);font-size:12px}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.pill{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:6px 8px;font-size:10px;font-weight:950;color:#feedb9}.empty{border:1px dashed rgba(255,255,255,.18);border-radius:24px;padding:18px;color:var(--muted)}@media(max-width:900px){.billing{grid-template-columns:1fr}.two{grid-template-columns:1fr}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><nav class="icon-nav"><a href="/app">◫</a><a href="/app/orders">□</a><a href="/app/files">▣</a><a class="active" href="/app/invoices">$</a></nav></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>Dashboard</span><strong>Invoices</strong></div><div class="search" id="msg">Loading invoices...</div><a class="bell" href="/app">←</a></header><section class="billing"><section class="card glass"><span class="eyebrow">BILLING VIEW</span><h1>Manual invoices before Stripe.</h1><p class="micro">Create invoice records for reservations and services. No card is charged.</p><form class="form" id="form"><label>Customer name<input id="customer_name" placeholder="Client / buyer"></label><label>Customer email<input id="customer_email" type="email" placeholder="client@email.com"></label><div class="two"><label>Amount cents<input id="amount_cents" inputmode="numeric" placeholder="15000"></label><label>Currency<input id="currency" value="USD" maxlength="3"></label></div><div class="two"><label>Status<select id="status"><option value="draft">Draft</option><option value="sent">Sent</option><option value="paid_later">Paid later</option></select></label><label>Due at<input id="due_at" type="date"></label></div><button class="btn primary" type="submit">Create invoice</button></form></section><section class="card glass"><div class="section-head"><div><span class="eyebrow">WORKSPACE INVOICES</span><h2 id="count">Invoices</h2></div><a class="btn" href="/app/files">Files</a></div><div class="list" id="list"><div class="empty">Loading...</div></div></section></section><footer class="footer">POWERED BY BOOSTR LABS · Dashboard Invoices</footer></main></div><script>
function headers(){const t=localStorage.getItem('boostr_auth_token');return t?{Authorization:'Bearer '+t}:{}}function money(c,cur='USD'){return new Intl.NumberFormat('en-US',{style:'currency',currency:cur}).format(Number(c||0)/100)}async function api(path,opts={}){const res=await fetch(path,{...opts,headers:{...(opts.body?{'Content-Type':'application/json'}:{}),...headers()},credentials:'same-origin',body:opts.body?JSON.stringify(opts.body):undefined});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;return data}async function load(){try{const data=await api('/api/invoices');const rows=data.invoices||[];count.textContent=`Invoices · ${rows.length}`;msg.textContent='Backend invoices loaded';list.innerHTML=rows.length?rows.map(i=>`<article class="invoice"><h3>${i.invoice_number||i.id}</h3><p>${i.customer_name||i.customer_email||'No customer'} · ${money(i.amount_cents,i.currency)}</p><div class="pills"><span class="pill">${i.status}</span><span class="pill">${i.currency}</span><span class="pill">${i.due_at||'no due date'}</span></div></article>`).join(''):'<div class="empty">No invoices yet. Create the first manual invoice draft.</div>'}catch(e){msg.textContent=e?.error==='missing_session'?'Login required':'Invoices backend unavailable';list.innerHTML='<div class="empty">Login required, or /api/invoices is not ready.</div>'}}form.onsubmit=async e=>{e.preventDefault();try{await api('/api/invoices',{method:'POST',body:{customer_name:customer_name.value,customer_email:customer_email.value,amount_cents:Number(amount_cents.value||0),currency:currency.value,status:status.value,due_at:due_at.value,metadata:{source:'invoices_ui'}}});form.reset();currency.value='USD';await load()}catch(err){msg.textContent=err?.message||err?.error||'Invoice save failed'}};load();
</script><script src="/assets/boostr-mother/console.js"></script></body></html>
