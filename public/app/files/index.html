<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Dashboard Files</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.vault{display:grid;grid-template-columns:.76fr 1.24fr;gap:18px}.form{display:grid;gap:10px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.11em;text-transform:uppercase}.form input,.form select{border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.28);color:#fff;border-radius:18px;min-height:48px;padding:0 13px;font-weight:850}.list{display:grid;gap:10px}.file{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.045);border-radius:24px;padding:14px}.file h3{margin:0 0 6px}.file p{margin:0;color:var(--muted);font-size:12px}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.pill{border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:6px 8px;font-size:10px;font-weight:950;color:#feedb9}.empty{border:1px dashed rgba(255,255,255,.18);border-radius:24px;padding:18px;color:var(--muted)}@media(max-width:900px){.vault{grid-template-columns:1fr}}</style></head><body><div class="ambient"></div><div class="os"><aside class="sidebar glass"><a class="logo-mark" href="/home"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><nav class="icon-nav"><a href="/app">◫</a><a href="/app/products">◆</a><a href="/app/invoices">$</a><a class="active" href="/app/files">▣</a></nav></aside><main class="main"><header class="topbar glass"><div class="greeting"><span>Dashboard</span><strong>Files</strong></div><div class="search" id="msg">Loading files...</div><a class="bell" href="/app">←</a></header><section class="vault"><section class="card glass"><span class="eyebrow">DELIVERY VAULT</span><h1>Files without chaos.</h1><p class="micro">Store file links, deliverables, proof, contracts and assets as workspace records.</p><form class="form" id="form"><label>Title<input id="title" required placeholder="Final master / contract / proof"></label><label>URL<input id="file_url" placeholder="https://..."></label><label>Type<select id="file_type"><option>link</option><option>document</option><option>image</option><option>audio</option><option>video</option><option>contract</option><option>deliverable</option><option>proof</option><option>other</option></select></label><label>Visibility<select id="visibility"><option value="workspace">Workspace</option><option value="private">Private</option><option value="client_visible">Client visible</option><option value="public_link">Public link</option></select></label><button class="btn primary" type="submit">Add file record</button></form></section><section class="card glass"><div class="section-head"><div><span class="eyebrow">WORKSPACE FILES</span><h2 id="count">Files</h2></div><a class="btn" href="/app/invoices">Invoices</a></div><div class="list" id="list"><div class="empty">Loading...</div></div></section></section><footer class="footer">POWERED BY BOOSTR LABS · Dashboard Files</footer></main></div><script>
function headers(){const t=localStorage.getItem('boostr_auth_token');return t?{Authorization:'Bearer '+t}:{}}async function api(path,opts={}){const res=await fetch(path,{...opts,headers:{...(opts.body?{'Content-Type':'application/json'}:{}),...headers()},credentials:'same-origin',body:opts.body?JSON.stringify(opts.body):undefined});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;return data}async function load(){try{const data=await api('/api/files');const files=data.files||[];count.textContent=`Files · ${files.length}`;msg.textContent='Backend files loaded';list.innerHTML=files.length?files.map(f=>`<article class="file"><h3>${f.title}</h3><p>${f.file_url?`<a href="${f.file_url}" target="_blank">${f.file_url}</a>`:'No URL attached.'}</p><div class="pills"><span class="pill">${f.file_type}</span><span class="pill">${f.visibility}</span><span class="pill">${f.related_type||'workspace'}</span></div></article>`).join(''):'<div class="empty">No files yet. Add a link/deliverable record.</div>'}catch(e){msg.textContent=e?.error==='missing_session'?'Login required':'Files backend unavailable';list.innerHTML='<div class="empty">Login required, or /api/files is not ready.</div>'}}form.onsubmit=async e=>{e.preventDefault();try{await api('/api/files',{method:'POST',body:{title:title.value,file_url:file_url.value,file_type:file_type.value,visibility:visibility.value,metadata:{source:'files_ui'}}});form.reset();await load()}catch(err){msg.textContent=err?.message||err?.error||'File save failed'}};load();
</script><script src="/assets/boostr-mother/console.js"></script></body></html>
