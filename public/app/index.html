ent:space-between}.member[hidden]{display:none}.member img{width:170px}.member-open{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,var(--blue2),var(--blue));display:grid;place-items:center;font-size:26px}.section{padding:24px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.section-head img{width:155px}.count{width:11px;height:11px;border-radius:50%;background:var(--green)}.services{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.service-card{min-height:220px;border:1px solid rgba(255,255,255,.09);border-radius:25px;background:rgba(255,255,255,.035);padding:20px;display:flex;flex-direction:column}.service-card.disabled{opacity:.35}.service-icon{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;background:rgba(56,185,255,.1);font-size:34px}.service-brand{margin-top:auto;display:flex;align-items:center;justify-content:space-between}.service-brand img{max-width:145px;max-height:42px}.service-open{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue2),var(--blue))}.dock{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(330px,calc(100% - 28px));min-height:72px;border:1px solid var(--line);border-radius:28px;background:rgba(8,13,22,.9);backdrop-filter:blur(24px);padding:8px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.dock a{border-radius:21px;display:grid;place-items:center;color:#8e9bb0;font-size:20px}.dock a.active{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff}@media(max-width:680px){.top{grid-template-columns:1fr auto}.search{grid-column:1/-1;grid-row:2}.services{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><a class="brand" href="/app/"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></a><input class="search" type="search" placeholder="⌕" aria-label="Buscar"><a class="account" id="top t?{Authorization:`Bearer ${t}`}:{}};function d(s){const e=String(s.user?.email||'').toLowerCase(),r=[s.role,s.user?.role,...(s.roles||[])].filter(Boolean).map(v=>String(v).toLowerCase());if(s.redirect&&s.redirect.startsWith('/')&&!s.redirect.startsWith('//'))return s.redirect;if(e==='janko@boostrlabs.com')return'/app/janko/';if(e==='johanka@boostrlabs.com')return'/app/johanka/';if(r.includes('admin'))return'/admin/';if(r.includes('manager'))return'/manager/';if(r.some(x=>['partner','owner','business_owner'].includes(x)))return'/partner-dashboard/';return'/app/workspace/'}async function loadSession(){try{const r=await fetch('/api/session',{headers:h(),credentials:'same-origin',cache:'no-store'});if(!r.ok)return;const s=await r.json();if(!s?.ok&&!s?.user)return;accessPanel.hidden=true;memberPanel.hidden=false;continueButton.href=d(s);topAccount.href=d(s)}catch{}}document.querySelector('.search')?.addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();document.querySelectorAll('[data-search-item]').forEach(i=>i.style.display=!q||i.getAttribute('aria-label').toLowerCase().includes(q)?'':'none')});document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});document.addEventListener('touchmove',e=>{if(e.touches&&e.touches.length>1)e.preventDefault()},{passive:false});loadSession();</script></body></html>
