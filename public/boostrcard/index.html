<style>
:root{--accent:#74ff9e;--muted:rgba(255,255,255,.66);--gold:#f4d58a}*{box-sizing:border-box}html,body{margin:0;background:#020503;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;overflow-x:hidden}body{min-height:100dvh;background:radial-gradient(circle at 14% 10%,rgba(116,255,158,.18),transparent 34%),radial-gradient(circle at 88% 22%,rgba(255,64,90,.12),transparent 30%),#020503}.layout{display:grid;gap:16px;padding:14px 12px calc(130px + env(safe-area-inset-bottom));min-height:100dvh}.panel{border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(255,255,255,.11),rgba(255,255,255,.035));border-radius:28px;padding:16px;box-shadow:0 30px 110px rgba(0,0,0,.62);backdrop-filter:blur(20px)}.builder{order:1}.preview{order:2;display:grid;gap:14px;justify-items:center;margin-bottom:calc(80px + env(safe-area-inset-bottom))}.brand{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.brand img{width:126px}.lang{display:flex;gap:5px;border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.32);border-radius:999px;padding:4px}.lang button{border:0;background:transparent;color:rgba(255,255,255,.64);font-size:10px;font-weight:950;border-radius:999px;padding:8px 10px}.lang button.active{background:rgba(255,255,255,.17);color:#fff}.chip{display:inline-flex;border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);background:color-mix(in srgb,var(--accent) 8%,transparent);border-radius:999px;padding:7px 10px;color:var(--accent);font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}.title{font-size:clamp(42px,11vw,76px);line-height:.85;margin:10px 0 12px;letter-spacing:-.08em;font-weight:950}.sub,.hint{color:var(--muted);font-size:13.5px;line-height:1.52;margin:0}.terminal{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--accent);font-size:11px;line-height:1.55;border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);background:rgba(0,0,0,.32);border-radius:18px;padding:10px 12px;margin:14px 0}.terminal b{color:#fff}.steps{display:flex;gap:7px;margin:14px 0}.steps i{height:7px;flex:1;border-radius:999px;background:rgba(255,255,255,.13)}.steps i.active{background:linear-gradient(90deg,var(--accent),var(--gold))}.question{display:grid;gap:12px}.question h2{font-size:24px;letter-spacing:-.035em;margin:0}.options{display:grid;gap:9px}.option{border:1px solid rgba(255,255,255,.13);background:rgba(0,0,0,.28);border-radius:20px;padding:13px;text-align:left;color:#fff;font-weight:950;font-size:15px}.option small{display:block;color:var(--muted);font-weight:650;margin-top:5px;line-height:1.35}.option.selected{border-color:var(--accent);box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 20%,transparent),0 14px 40px color-mix(in srgb,var(--accent) 9%,transparent)}.grid{display:grid;gap:10px}.field{display:grid;gap:8px}.field span,.range span{font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:rgba(255,255,255,.62);font-weight:950}.field input,.field select{width:100%;min-width:0;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.34);color:#fff;border-radius:18px;min-height:52px;padding:0 13px;font-weight:900;font-size:16px}.field input[type=file]{padding:13px;overflow:hidden}.field input[type=color]{padding:5px}.controls{display:grid;gap:10px}.range{border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:10px;background:rgba(0,0,0,.2)}.range span{display:flex;justify-content:space-between;margin-bottom:8px}.range input{width:100%;accent-color:var(--accent)}.actions,.download{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}.btn{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);color:#fff;border-radius:20px;min-height:54px;padding:0 16px;font-weight:950;font-size:15px}.btn.primary{background:#e9f0ff;color:#05070d}.btn.accent{background:linear-gradient(135deg,var(--accent),rgba(244,213,138,.95));color:#020503}.preview-head{width:100%;display:grid;gap:8px}.preview-head h2{font-size:36px;margin:0}.card-stage{width:100%;max-width:640px;aspect-ratio:1080/1440;display:grid;place-items:center;border-radius:18px;overflow:hidden;background:#050807}.card-stage img{display:block;width:100%;height:100%;object-fit:contain}.desktop-stats{display:none;grid-template-columns:repeat(3,1fr);gap:9px;width:100%}.stat{border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.045);border-radius:18px;padding:11px}.stat b{display:block;font-size:22px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.11em;font-weight:950}.status{min-height:18px;color:var(--accent);font-size:12px;font-weight:850;text-align:center}.jump{display:block}@media(min-width:720px){.grid,.controls,.actions,.download{grid-template-columns:1fr 1fr}.desktop-stats{display:grid}}@media(min-width:980px){.layout{padding:18px;grid-template-columns:minmax(340px,510px) minmax(400px,700px);align-items:start}.builder{position:sticky;top:18px}.preview{margin-bottom:0}.jump{display:none}}
</style>
</head>
<body>
<main class="layout">
<section class="panel builder"><div class="brand"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><div class="lang"><button id="esBtn" class="active" type="button">ES</button><button id="enBtn" type="button">EN</button></div></div><span class="chip">BOOSTR CARD V7</span><h1 class="title" id="title"></h1><p class="sub" id="intro"></p><div class="terminal" id="terminal"></div><div class="steps" id="steps"></div><div class="question" id="question"></div><div class="actions"><button class="btn" id="back" type="button">Back</button><button class="btn primary" id="next" type="button">Next</button></div><button class="btn jump" id="jump" type="button">Ver preview</button></section>

</main>
<script>
const I={es:{title:'Crea tu card.',intro:'Primero construyes la identidad. Después ves la preview y guardas el PNG. Nada se guarda.',preview:'La foto queda detrás de los datos de la card y encima del fondo.',world:'¿Qué mundo representa?',profile:'¿Qué perfil te describe mejor?',skill:'¿Cuál es tu mejor skill?',improve:'¿Qué quieres mejorar?',color:'Color y energía visual.',final:'Finaliza la identidad.',multi:'Puedes escoger más de uno.',back:'Back',next:'Next',generate:'Generate',jump:'Ver preview',save:'Guardar PNG',boost:'Boost stats',ready:'Card lista.',saved:'PNG generado.',name:'Nombre en la card',role:'Posición',tag:'Título corto',country:'País',photo:'Foto opcional',accent:'Color principal',finish:'Intensidad visual',zoom:'Zoom',x:'Mover X',y:'Mover Y',glow:'Glow'},en:{title:'Build your card.',intro:'Build the identity first. Then preview and save the PNG. Nothing is stored.',preview:'The photo sits behind the card data and above the background.',world:'What world does it represent?',profile:'Which profile describes you best?',skill:'What is your best skill?',improve:'What do you want to improve?',color:'Color and visual energy.',final:'Finalize identity.',multi:'You can choose more than one.',back:'Back',next:'Next',generate:'Generate',jump:'View preview',save:'Save PNG',boost:'Boost stats',ready:'Card ready.',saved:'PNG generated.',name:'Name on card',role:'Position',tag:'Short title',country:'Country',photo:'Optional portrait',accent:'Main color',finish:'Visual intensity',zoom:'Zoom',x:'Move X',y:'Move Y',glow:'Glow'}};
const state={lang:'es',step:0,industries:['tech'],profiles:['founder'],skills:['vision','systems'],improve:['ops'],theme:'matrix',accent:'#74ff9e',finish:'premium',name:'JANKO',role:'BLD',tagline:'READY TO LAUNCH',country:'VE',photo:'',zoom:112,xpos:0,ypos:0,glow:70};
const opts={industries:[['tech','Tech / Startup','Apps, SaaS, dashboards y productos digitales.'],['auto','Auto / Dealer','Leads, deals, inventario y ventas.'],['music','Música / Artista','Smart links, fan passport, drops y catálogo creativo.'],['beauty','Beauty / Personal brand','Reservas, servicios, clientes y reputación.'],['food','Food / Local business','Menú, pedidos, fidelidad y presencia digital.'],['creator','Creator / Influencer','Audiencia, links, monetización y comunidad.']],profiles:[['founder','Founder / Dueño','Visión, dirección, riesgo y decisiones.'],['builder','Builder / Developer','Producto, lógica, automatización o backend.'],['seller','Seller / Closer','Atención, leads, ofertas y dinero.'],['creative','Creative / Artist','Identidad, estética, contenido y cultura.'],['operator','Operator / Manager','Procesos, agenda, equipo y ejecución diaria.']],skills:[['vision','Visión','Ver el producto completo antes de construirlo.'],['systems','Sistemas','Conectar módulos, roles, datos y acciones.'],['build','Build / Ejecución','Hacer que la idea exista.'],['brand','Marca / estética','Hacer que algo se vea premium y propio.'],['sales','Ventas','Convertir atención en oportunidad.'],['ai','AI leverage','Usar IA como equipo y multiplicador.']],improve:[['ops','Operación','Orden, seguimiento, procesos y consistencia.'],['delivery','Delivery','Cumplir, documentar y cerrar ciclos.'],['content','Contenido','Publicar, explicar y mantener presencia.'],['cashflow','Cashflow','Ofertas, pagos, reservas e invoices.'],['qa','QA / Detalle','Probar, pulir y corregir.']]};
const labels={VIS:'Vision',SYS:'Systems',BLD:'Build',UXD:'UX Direction',BRD:'Brand',LDR:'Leadership'},industryLabels={tech:'BOOSTR LABS',auto:'SOLVE AUTO',music:'WESTDETRO',beauty:'BEAUTY OS',food:'LOCAL OS',creator:'CREATOR OS'},countryMap={VE:['#ffd700','#0033a0','#cf142b','VZLA'],US:['#b22234','#fff','#3c3b6e','USA'],PR:['#ed0000','#fff','#0050f0','PR'],DO:['#002d62','#fff','#ce1126','DOM'],CO:['#fcd116','#003893','#ce1126','COL'],MX:['#006847','#fff','#ce1126','MEX'],GLOBAL:['#74ff9e','#111','#f4d58a','GLB']};
function T(k){return I[state.lang][k]||k}function key(){return ['industries','profiles','skills','improve','color','final'][state.step]}function renderQuestion(){const k=key();steps.innerHTML=Array.from({length:6}).map((_,i)=>`<i class='${i<=state.step?'active':''}'></i>`).join('');back.textContent=T('back');next.textContent=state.step===5?T('generate'):T('next');if(k==='color')question.innerHTML=`<h2>${T('color')}</h2><div class='options'>${[['matrix','#74ff9e','Matrix Green'],['cosmic','#62d5ff','Cosmic Blue'],['gold','#f4d58a','Black Gold'],['red','#ff405a','WESTDETRO Red']].map(x=>`<button class='option ${state.theme===x[0]?'selected':''}' type='button' data-theme='${x[0]}' data-color='${x[1]}'>${x[2]}<small>${x[1]}</small></button>`).join('')}</div><div class='grid'><label class='field'><span>${T('accent')}</span><input id='accent' type='color' value='${state.accent}'></label><label class='field'><span>${T('finish')}</span><select id='finish'><option value='clean' ${state.finish==='clean'?'selected':''}>Clean</option><option value='premium' ${state.finish==='premium'?'selected':''}>Premium</option><option value='heavy' ${state.finish==='heavy'?'selected':''}>Heavy glow</option></select></label></div>`;else if(k==='final')question.innerHTML=`<h2>${T('final')}</h2><div class='grid'><label class='field'><span>${T('name')}</span><input id='cardName' maxlength='18' value='${state.name}'></label><label class='field'><span>${T('role')}</span><select id='cardRole'>${['BLD·Builder','FND·Founder','OWN·Owner','CEO·CEO','CRT·Creator','ART·Artist','PRD·Producer','DIR·Director','DSG·Designer','DEV·Developer','ARC·Architect','SLR·Seller','OPR·Operator','MGR·Manager','VIP·VIP'].map(v=>{const [a,b]=v.split('·');return `<option value='${a}' ${state.role===a?'selected':''}>${a} · ${b}</option>`}).join('')}</select></label><label class='field'><span>${T('tag')}</span><input id='tagline' maxlength='24' value='${state.tagline}'></label><label class='field'><span>${T('country')}</span><select id='country'>${['VE','US','PR','DO','CO','MX','GLOBAL'].map(c=>`<option value='${c}' ${state.country===c?'selected':''}>${c}</option>`).join('')}</select></label></div><label class='field'><span>${T('photo')}</span><input id='photo' type='file' accept='image/*'></label><div class='controls'>${[['zoom',80,190],['xpos',-160,160],['ypos',-190,190],['glow',20,100]].map(r=>`<label class='range'><span><b>${T(r[0]==='xpos'?'x':r[0]==='ypos'?'y':r[0])}</b><em id='${r[0]}Val'>${state[r[0]]}${r[0]==='zoom'?'%':''}</em></span><input id='${r[0]}' type='range' min='${r[1]}' max='${r[2]}' value='${state[r[0]]}'></label>`).join('')}</div>`;else{const title={industries:'world',profiles:'profile',skills:'skill',improve:'improve'}[k];question.innerHTML=`<h2>${T(title)}</h2><p class='hint'>${T('multi')}</p><div class='options multi' data-name='${k}' data-max='${k==='skills'?4:3}'>${opts[k].map(o=>`<button class='option ${state[k].includes(o[0])?'selected':''}' type='button' data-value='${o[0]}'>${o[1]}<small>${o[2]}</small></button>`).join('')}</div>`}wire()}
function wire(){question.querySelectorAll('.multi').forEach(g=>g.onclick=e=>{const b=e.target.closest('.option');if(!b)return;const n=g.dataset.name,max=+g.dataset.max,sel=[...g.querySelectorAll('.selected')];if(b.classList.contains('selected')&&sel.length>1)b.classList.remove('selected');else if(!b.classList.contains('selected')&&sel.length<max)b.classList.add('selected');state[n]=[...g.querySelectorAll('.selected')].map(x=>x.dataset.value);render()});question.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{state.theme=b.dataset.theme;state.accent=b.dataset.color;document.documentElement.style.setProperty('--accent',safeAccent(state.accent));renderQuestion();render()});['cardName','cardRole','country','tagline','accent','finish','zoom','xpos','ypos','glow'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.oninput=()=>{state[id==='cardName'?'name':id]=['zoom','xpos','ypos','glow'].includes(id)?+el.value:el.value;if(id==='accent')document.documentElement.style.setProperty('--accent',safeAccent(state.accent));if(id==='finish'){state.glow={clean:40,premium:70,heavy:100}[state.finish];renderQuestion()}render()}});const p=document.getElementById('photo');if(p)p.onchange=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.photo=r.result;render()};r.readAsDataURL(f)}}
function setLang(l){state.lang=l;document.documentElement.lang=l;esBtn.classList.toggle('active',l==='es');enBtn.classList.toggle('active',l==='en');title.textContent=T('title');intro.textContent=T('intro');previewSub.textContent=T('preview');jump.textContent=T('jump');downloadPng.textContent=T('save');reroll.textContent=T('boost');renderQuestion();render()}esBtn.onclick=()=>setLang('es');enBtn.onclick=()=>setLang('en');back.onclick=()=>{state.step=Math.max(0,state.step-1);renderQuestion();render()};next.onclick=()=>{if(state.step<5){state.step++;renderQuestion();render()}else status.textContent=T('ready')};jump.onclick=()=>preview.scrollIntoView({behavior:'smooth',block:'start'});reroll.onclick=()=>{const all=['vision','systems','build','brand','sales','ai'];state.skills=all.sort(()=>Math.random()-.5).slice(0,3);renderQuestion();render()};
function add(s,o){for(const k in o)s[k]+=o[k]}function stats(){const s={VIS:82,SYS:82,BLD:82,UXD:82,BRD:82,LDR:82};const maps={industries:{tech:{SYS:5,BLD:5,VIS:2},auto:{LDR:5,SYS:3,BLD:2},music:{BRD:6,VIS:4,UXD:3},beauty:{BRD:5,UXD:5,LDR:2},food:{SYS:4,LDR:4,BLD:2},creator:{BRD:5,VIS:4,UXD:4}},profiles:{founder:{VIS:6,LDR:6,BRD:2},builder:{BLD:6,SYS:4,UXD:1},seller:{LDR:5,BRD:3,SYS:2},creative:{BRD:6,UXD:5,VIS:2},operator:{SYS:6,BLD:3,LDR:4}},skills:{vision:{VIS:8},systems:{SYS:8},build:{BLD:8,SYS:2},brand:{BRD:8,UXD:2},sales:{LDR:7,BRD:2},ai:{SYS:4,BLD:4,VIS:3}},improve:{ops:{SYS:-2},delivery:{BLD:-2},content:{BRD:-2,UXD:-1},cashflow:{LDR:-2,SYS:-1},qa:{SYS:-1,BLD:-1}}};['industries','profiles','skills','improve'].forEach(g=>state[g].forEach(v=>add(s,maps[g][v]||{})));Object.keys(s).forEach(k=>s[k]=Math.max(50,Math.min(99,s[k])));return s}function overall(s){return Math.round(Object.values(s).reduce((a,b)=>a+b,0)/6)}function lum(hex){const h=String(hex).replace('#','');return .2126*(parseInt(h.slice(0,2),16)||0)+.7152*(parseInt(h.slice(2,4),16)||0)+.0722*(parseInt(h.slice(4,6),16)||0)}function safeAccent(hex){return lum(hex)<95?'#f4d58a':hex}function esc(x){return String(x||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function flag(){const f=countryMap[state.country]||countryMap.VE;return `<rect width='112' height='54' rx='7' fill='#111'/><rect x='4' y='4' width='104' height='15' fill='${f[0]}'/><rect x='4' y='19' width='104' height='15' fill='${f[1]}'/><rect x='4' y='34' width='104' height='16' fill='${f[2]}'/><text x='56' y='35' text-anchor='middle' font-size='13' fill='white' font-family='Arial' font-weight='900'>${f[3]}</text>`}

function buildSvg(){const s=stats(),ov=overall(s),user=state.accent,accent=safeAccent(user),name=esc(state.name.toUpperCase()).slice(0,18),industry=state.industries.map(v=>industryLabels[v]).filter(Boolean).slice(0,2).join(' + ')||'BOOSTR OS',profile=state.profiles.join(' / ').toUpperCase(),heavy={clean:.72,premium:1,heavy:1.45}[state.finish]||1,g=(state.glow/70)*heavy,tag=esc(state.tagline.toUpperCase()).slice(0,24),keys=['VIS','SYS','BLD','UXD','BRD','LDR'];return `<svg xmlns='http://www.w3.org/2000/svg' width='1080' height='1440' viewBox='0 0 1080 1440'><defs><radialGradient id='bg' cx='50%' cy='35%' r='70%'><stop stop-color='${user}' stop-opacity='${.16*g}'/><stop offset='.35' stop-color='#101713'/><stop offset='1' stop-color='#010201'/></radialGradient><linearGradient id='edge' x1='0' y1='0' x2='1' y2='1'><stop stop-color='#fff'/><stop offset='.22' stop-color='${accent}'/><stop offset='.52' stop-color='#151515'/><stop offset='.78' stop-color='${accent}'/><stop offset='1' stop-color='#fff'/></linearGradient><linearGradient id='sil'><stop stop-color='#101312'/><stop offset='1' stop-color='#050605'/></linearGradient><linearGradient id='photoShade' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='#000' stop-opacity='.03'/><stop offset='55%' stop-color='#000' stop-opacity='.12'/><stop offset='100%' stop-color='#000' stop-opacity='.3'/></linearGradient><filter id='shadow'><feDropShadow dx='0' dy='28' stdDeviation='32' flood-color='#000' flood-opacity='.85'/></filter><filter id='glow'><feDropShadow dx='0' dy='0' stdDeviation='${9*g}' flood-color='${accent}' flood-opacity='.75'/></filter></defs><rect width='1080' height='1440' fill='#010201'/><rect width='1080' height='1440' fill='url(#bg)'/><g opacity='${.22*heavy}'>${Array.from({length:82}).map((_,i)=>`<circle cx='${(i*137)%1080}' cy='${(i*271)%1440}' r='${(i%3)+1}' fill='${i%2?accent:'#fff'}' opacity='${.22+(i%5)*.1}'/>`).join('')}</g><g id='base-frame' filter='url(#shadow)'><path d='M118 170 L360 96 L540 7 function render(){terminal.innerHTML=`<b>&gt; boostr.card.v7</b><br>${state.lang==='es'?'mundos':'worlds'}=${state.industries.join('+')}<br>${state.lang==='es'?'skills':'skills'}=${state.skills.join('+')} · PNG`;document.documentElement.style.setProperty('--accent',safeAccent(state.accent));back.textContent=T('back');next.textContent=state.step===5?T('generate'):T('next');const svg=buildSvg();cardPreview.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);cardPreview.dataset.svg=svg;const s=stats();desktopStats.innerHTML=Object.entries(s).map(([k,v])=>`<div class='stat'><b>${v}</b><span>${k} · ${labels[k]}</span></div>`).join('')}
