<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Reset BOOSTR Password</title><link rel="icon" href="/assets/icons/09.-b-star-favicon.png"><link rel="stylesheet" href="/assets/boostr-mother/mother.css"><style>.wrap{min-height:100dvh;display:grid;place-items:center;padding:16px}.panel{width:min(100%,560px);border:1px solid rgba(255,255,255,.14);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border-radius:36px;padding:24px;box-shadow:0 38px 120px rgba(0,0,0,.7)}.panel img{width:128px;max-height:64px;object-fit:contain}.form{display:grid;gap:11px;margin-top:18px}.form label{display:grid;gap:7px;color:rgba(255,255,255,.62);font-size:10px;font-weight:950;letter-spacing:.12em;text-transform:uppercase}.form input{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.28);border-radius:18px;min-height:50px;color:#fff;padding:0 13px;font-weight:850}.status{min-height:18px;color:#feedb9;font-size:13px;font-weight:850}.hidden{display:none}.debug{word-break:break-all;color:#feedb9;font-size:12px}</style></head><body><div class="ambient"></div><main class="wrap"><section class="panel"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"><span class="eyebrow">ACCOUNT RECOVERY</span><h1>Reset password.</h1><p class="micro">Request a reset link or set a new password if you already have a token.</p><form class="form" id="requestForm"><label>Email<input id="requestEmail" type="email" required></label><button class="btn primary" type="submit">Prepare reset link</button><div class="status" id="requestStatus"></div><div class="debug" id="debug"></div></form><form class="form hidden" id="confirmForm"><label>Email<input id="email" type="email" required></label><label>New password<input id="password" type="password" required minlength="8"></label><button class="btn primary" type="submit">Set new password</button><div class="status" id="confirmStatus"></div></form><p class="micro"><a href="/login">Back to login</a></p></section></main><script>
const params=new URLSearchParams(location.search);const token=params.get('token')||'';if(params.get('email')){requestEmail.value=params.get('email');email.value=params.get('email')}if(token){requestForm.classList.add('hidden');confirmForm.classList.remove('hidden')}requestForm.onsubmit=async e=>{e.preventDefault();requestStatus.textContent='Preparing reset...';try{const res=await fetch('/api/password-reset/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:requestEmail.value})});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;requestStatus.textContent=data.message||'Reset prepared.';debug.innerHTML=data.debug?.reset_url?`Debug link: <a href="${data.debug.reset_url}">${data.debug.reset_url}</a>`:''}catch(err){requestStatus.textContent=err?.message||err?.error||'Could not request reset.'}};confirmForm.onsubmit=async e=>{e.preventDefault();confirmStatus.textContent='Setting password...';try{const res=await fetch('/api/password-reset/confirm',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({token,email:email.value,password:password.value})});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw data;localStorage.setItem('boostr_auth_token',data.token);localStorage.setItem('boostr_session',JSON.stringify({email:data.user?.email,workspace:data.active_workspace_id,token:data.token}));confirmStatus.textContent='Password reset. Opening dashboard...';setTimeout(()=>location.href='/app',700)}catch(err){confirmStatus.textContent=err?.message||err?.error||'Reset failed.'}};
</script></body></html>
