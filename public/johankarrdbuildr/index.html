*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;color:#fff;font-family:Inter,Arial,sans-serif}button,input,select,textarea{font:inherit}.app{height:100%;display:grid;grid-template-rows:58px 1fr;background:radial-gradient(circle at 10% 0,rgba(254,237,185,.12),transparent 34%),linear-gradient(135deg,#050505,#111621 55%,#050505)}.top{display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.7);backdrop-filter:blur(14px)}.brand{display:flex;gap:10px;align-items:center}.mark{width:34px;height:34px;border-radius:12px;background:#feedb9;color:#061f3d;display:grid;place-items:center;font-weight:1000;letter-spacing:-.08em}.brand small{display:block;color:#feedb9;font:900 10px/1 Arial;letter-spacing:.12em}.brand strong{display:block;font-size:16px}.actions{display:flex;gap:8px;align-items:center}.btn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:9px 12px;font:900 11px/1 Arial;text-decoration:none;cursor:pointer}.btn.gold{background:#feedb9;color:#061f3d}.grid{min-height:0;display:grid;grid-template-columns:300px 1fr 320px;gap:12px;padding:12px}.panel{min-height:0;overflow:auto;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);border-radius:22px;padding:14px;box-shadow:0 18px 36px rgba(0,0,0,.28)}.panel h2{margin:0 0 10px;font-size:14px}.field{display:grid;gap:6px;margin:0 0 10px}.field label{font:900 10px/1 Arial;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em}.field input,.field textarea,.field select{width:100%;border:1px solid rgba(255,255,255,.12);background:#07090d;color:#fff;border-radius:12px;padding:10px;outline:none}.field textarea{min-height:90px;resize:vertical}.list{display:grid;gap:8px}.item{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);border-radius:14px;padding:10px;cursor:pointer}.item.active{border-color:#feedb9;background:rgba(254,237,185,.1)}.item b{display:block;font-size:13px}.item span{display:block;color:rgba(255,255,255,.5);font-size:11px;margin-top:3px}.preview-wrap{min-height:0;display:grid;place-items:center;border:1px solid rgba(255,255,255,.1);background:#111;border-radius:24px;padding:18px;overflow:hidden}.phone{width:390px;max-width:100%;height:720px;max-height:100%;border-radius:34px;border:10px solid #050505;background:#000;box-shadow:0 30px 80px rgba(0,0,0,.7);overflow:hidden}.phone iframe{width:100%;height:100%;border:0;background:#000}.tabs{display:flex;gap:8px;margin-bottom:12px}.tabs button{flex:1}.asset-row{display:grid;grid-template-columns:52px 1fr;gap:9px;align-items:center}.thumb{width:52px;height:52px;border-radius:10px;background:#111;object-fit:contain}.hint{color:rgba(255,255,255,.45);font-size:12px;line-height:1.35}.codebox{height:150px;font-family:monospace;font-size:11px}.footer-note{position:fixed;left:14px;bottom:8px;color:rgba(255,255,255,.28);font-size:10px;pointer-events:none}@media(max-width:1050px){.grid{grid-template-columns:260px 1fr}.right{display:none}}@media(max-width:760px){.grid{grid-template-columns:1fr}.left{display:none}.top{gap:8px}.brand strong{font-size:13px}.actions .hide-sm{display:none}.phone{height:calc(100vh - 110px);border-width:6px;border-radius:22px}}
</style></head><body><main class="app"><header class="top"><div class="brand"><div class="mark">J</div><div><small>JOHANKA OS</small><strong>Johankarrd BUILDR</strong></div></div><div class="actions"><button class="btn" onclick="newSite()">New</button><button class="btn" onclick="saveLocal()">Save Draft</button><button class="btn gold" onclick="downloadHtml()">Export HTML</button><a class="btn hide-sm" href="/johankarrd/">Carrds</a></div></header><section class="grid"><aside class="panel left"><h2>Pages</h2><div class="field"><label>Current Carrd</label><select id="siteSelect" onchange="selectSite(this.value)"></select></div><div class="list" id="sectionList"></div><p class="hint">Este módulo ya es propio de Johanka. Edita secciones tipo Carrd, previsualiza en vivo y exporta HTML. El guardado real a GitHub/Cloudflare se conecta después.</p></aside><section class="preview-wrap"><div class="phone"><iframe id="preview" title="Preview"></iframe></div></section><aside class="panel right"><h2>Edit</h2><div class="tabs"><button class="btn" onclick="setMode('content')">Content</button><button class="btn" onclick="setMode('style')">Style</button></div><div id="editor"></div><h2>Export preview</h2><textarea id="code" class="codebox" readonly></textarea></aside></section></main><div class="footer-note">Powered by BOOSTR Labs</div><script>
const A='/assets/johankarrd/';
let state={sites:{},current:'cafe',section:'home'},mode='content';
const defaults={cafe:{name:'Café del Mar',theme:'cafe',bg:'linear-gradient(142deg,#0a203d 0%,#2b4e72 57%,#a8b3b5 100%)',accent:'#feedb9',card:'#062040',sections:[{id:'home',label:'Home',items:[{type:'logo',src:A+'cafedelmar/logofull.png'},{type:'image',src:A+'cafedelmar/image04.jpg'},{type:'image',src:A+'cafedelmar/image16.jpg'}]},{id:'menu',label:'Menu',items:[{type:'title',text:'DRINKS'},{type:'image',src:A+'cafedelmar/image06.jpg'},{type:'title',text:'HOT DRINKS'},{type:'image',src:A+'cafedelmar/image18.jpg'},{type:'title',text:'FAVORITES'},{type:'image',src:A+'cafedelmar/image09.jpg'}]},{id:'contact',label:'Contacto',items:[{type:'logo',src:A+'cafedelmar/logofull.png'},{type:'links',links:[['MAIL','mailto:'],['INSTA','#'],['ORDER','#'],['TIKTOK','#']]}]},{id:'gallery',label:'Gallery',items:[{type:'logo',src:A+'cafedelmar/image01.png'},{type:'gallery',imgs:[A+'cafedelmar/3299c2ea.jpg',A+'cafedelmar/2791d0e1.jpg',A+'cafedelmar/46493ee7.jpg',A+'cafedelmar/image17.jpg',A+'cafedelmar/image21.jpg',A+'cafedelmar/image18.jpg']}]}]},inventory:{name:'SOLVE Inventory',theme:'inventory',bg:'#000',accent:'#fff',card:'#000',sections:[{id:'MORE',label:'Home',items:[{type:'image',src:A+'solveinventory/camaro.png',link:'#inter'},{type:'logo',src:A+'solveinventory/inventory.jpg'},{type:'grid',tiles:[['Toyota',A+'solveinventory/supra.png',A+'solveinventory/toyota.jpg','#toyota'],['Honda',A+'solveinventory/typer.png',A+'solveinventory/honda.jpg','#honda'],['CDJR',A+'solveinventory/challengersrt.png',A+'solveinventory/cdjr.jpg','#cdjr'],['Hyundai',A+'solveinventory/elantra.png',A+'solveinventory/hyundai.jpg','#hyundai']]}]},{id:'inter',label:'International Cars',dealer:'https://www.internationalcarsusa.com/',items:[{type:'logo',src:A+'solveinventory/internationalcars.jpg'},{type:'logo',src:A+'solveinventory/camarotitle.jpg'},{type:'image',src:A+'solveinventory/camaro.png',link:'https://www.internationalcarsusa.com/'}]},{id:'toyota',label:'Toyota',dealer:'https://www.toyotaofhollywood.com/',items:[{type:'logo',src:A+'solveinventory/toyota.jpg'},{type:'logo',src:A+'solveinventory/GR86TITLE.jpg'},{type:'image',src:A+'solveinventory/supra.png',link:'https://www.toyotaofhollywood.com/'}]},{id:'honda',label:'Honda',dealer:'https://www.hondaofaventura.com/searchused.aspx',items:[{type:'logo',src:A+'solveinventory/honda.jpg'},{type:'logo',src:A+'solveinventory/typertitle.jpg'},{type:'image',src:A+'solveinventory/typer.png',link:'https://www.hondaofaventura.com/searchused.aspx'}]},{id:'cdjr',label:'CDJR',dealer:'https://www.brickellchryslerdodgejeepram.com/',items:[{type:'logo',src:A+'solveinventory/cdjr.jpg'},{type:'logo',src:A+'solveinventory/challengersrttitle.jpg'},{type:'image',src:A+'solveinventory/challengersrt.png',link:'https://www.brickellchryslerdodgejeepram.com/'}]},{id:'hyundai',label:'Hyundai',dealer:'https://www.rickcasehyundaidavie.com',items:[{type:'logo',src:A+'solveinventory/hyundai.jpg'},{type:'logo',src:A+'solveinventory/elantratitle.jpg'},{type:'image',src:A+'solveinventory/elantra.png',link:'https://www.rickcasehyundaidavie.com'}]}]}};
function load(){state.sites=JSON.parse(localStorage.getItem('johankarrd-buildr')||'null')||structuredClone(defaults);renderAll()}function saveLocal(){localStorage.setItem('johankarrd-buildr',JSON.stringify(state.sites));alert('Draft saved in this browser.')}function site(){return state.sites[state.current]}function sec(){return site().sections.find(s=>s.id===state.section)||site().sections[0]}function selectSite(k){state.current=k;state.section=site().sections[0].id;renderAll()}function selectSection(id){state.section=id;renderAll()}function setMode(m){mode=m;renderEditor()}function renderAll(){renderSelect();renderSections();renderEditor();renderPreview()}function renderSelect(){siteSelect.innerHTML=Object.keys(state.sites).map(k=>`<option value="${k}" ${k===state.current?'selected':''}>${state.sites[k].name}</option>`).join('')}function renderSections(){sectionList.innerHTML=site().sections.map(s=>`<div class="item ${s.id===state.section?'active':''}" onclick="selectSection('${s.id}')"><b>${s.label}</b><span>#${s.id}</span></div>`).join('')}function input(label,val,on){return `<div class="field"><label>${label}</label><input value="${escAttr(val||'')}" oninput="${on}(this.value)"></div>`}function renderEditor(){let s=sec(), h=''; if(mode==='style'){h+=input('Site Name',site().name,'editName');h+=input('Background',site().bg,'editBg');h+=input('Accent',site().accent,'editAccent');h+=input('Card',site().card,'editCard');}else{h+=input('Section label',s.label,'editSectionLabel');h+=input('Hash ID',s.id,'editSectionId'); if(s.dealer!==undefined)h+=input('Dealer URL',s.dealer,'editDealer'); s.items.forEach((it,i)=>{h+=`<div class="item"><b>${it.type}</b>`; if(it.src)h+=`<div class="asset-row"><img class="thumb" src="${it.src}"><input value="${escAttr(it.src)}" oninput="editItem(${i},'src',this.value)"></div>`; if(it.text!==undefined)h+=input('Text',it.text,`v=>editItem(${i},'text',v)`); if(it.link!==undefined)h+=input('Link',it.link,`v=>editItem(${i},'link',v)`); if(it.links)h+=`<textarea oninput="editLinks(${i},this.value)">${it.links.map(x=>x.join('|')).join('\n')}</textarea>`; if(it.imgs)h+=`<textarea oninput="editImgs(${i},this.value)">${it.imgs.join('\n')}</textarea>`; h+='</div>'})} editor.innerHTML=h}function editName(v){site().name=v;renderPreview();renderSelect()}function editBg(v){site().bg=v;renderPreview()}function editAccent(v){site().accent=v;renderPreview()}function editCard(v){site().card=v;renderPreview()}function editSectionLabel(v){sec().label=v;renderPreview();renderSections()}function editSectionId(v){sec().id=v;state.section=v;renderPreview();renderSections()}function editDealer(v){sec().dealer=v;renderPreview()}function editItem(i,k,v){sec().items[i][k]=v;renderPreview()}function editLinks(i,v){sec().items[i].links=v.split('\n').map(x=>x.split('|'));renderPreview()}function editImgs(i,v){sec().items[i].imgs=v.split('\n').filter(Boolean);renderPreview()}function newSite(){let name=prompt('New Johankarrd name?');if(!name)return;let k=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');state.sites[k]=structuredClone(defaults.cafe);state.sites[k].name=name;state.current=k;state.section='home';renderAll()}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function escAttr(s){return esc(s).replace(/"/g,'&quot;')}function itemHtml(it){if(it.type==='title')return `<div class="title">${esc(it.text)}</div>`;if(it.type==='logo')return `<img class="logo" src="${it.src}">`;if(it.type==='image'){let im=`<img class="shot" src="${it.src}">`;return it.link?`<a href="${it.link}">${im}</a>`:im}if(it.type==='links')return `<div class="links">${it.links.map(l=>`<a href="${l[1]||'#'}">${esc(l[0])}</a>`).join('')}</div>`;if(it.type==='gallery')return `<div class="gallery">${it.imgs.map(src=>`<img src="${src}">`).join('')}</div>`;if(it.type==='grid')return `<div class="cargrid">${it.tiles.map(t=>`<a href="${t[3]}"><img src="${t[1]}"><img src="${t[2]}"></a>`).join('')}</div>`;return ''}function buildHtml(){let st=site();let sections=st.sections.map(s=>`<section class="page" id="${s.id}"><div class="card">${s.items.map(itemHtml).join('')}</div></section>`).join('');let nav=st.sections.map(s=>`<a href="#${s.id}">${esc(s.label)}</a>`).join('');return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(st.name)}</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{background:${st.bg};color:${st.accent};font-family:Arial,sans-serif}.nav{position:fixed;top:28px;left:50%;transform:translateX(-50%);z-index:9;display:flex;gap:18px}.nav a{color:${st.accent};font:bold 10px Arial;text-transform:uppercase}.page{position:fixed;inset:0;display:grid;place-items:center;opacity:0;pointer-events:none;filter:blur(10px);transform:scale(.99);transition:1.5s}.page.active{opacity:1;pointer-events:auto;filter:blur(0);transform:none}.card{width:min(88vw,260px);max-height:86vh;overflow:hidden;border-radius:20px;background:${st.card};padding:14px;display:grid;gap:9px;place-items:center;box-shadow:0 20px 38px rgba(0,0,0,.42)}img{display:block;max-width:100%;height:auto}.logo{max-height:84px;object-fit:contain}.shot{border-radius:8px}.title{font:1000 34px/.85 Arial;text-align:center;text-transform:uppercase}.links{background:#feedb9;color:#061f3d;border-radius:12px;padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.links a{color:#061f3d;text-align:center;font:900 10px Arial;text-decoration:none}.gallery{display:grid;grid-template-columns:1fr 1fr;gap:7px}.gallery img{aspect-ratio:1/1;object-fit:cover;border-radius:6px}.cargrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cargrid a{display:grid;place-items:center}.powered{position:fixed;bottom:10px;left:0;right:0;text-align:center;color:rgba(255,255,255,.36);font:10px Arial}</style></head><body><nav class="nav">${nav}</nav>${sections}<div class="powered">Powered by BOOSTR Labs</div><script>const ids=${JSON.stringify(st.sections.map(s=>s.id))};function show(){let id=location.hash.slice(1)||ids[0];document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===id));}addEventListener('hashchange',show);show();<\/script></body></html>`}function renderPreview(){let html=buildHtml();preview.srcdoc=html;code.value=html}function downloadHtml(){let blob=new Blob([buildHtml()],{type:'text/html'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(site().name||'johankarrd').toLowerCase().replace(/[^a-z0-9]+/g,'-')+'.html';a.click();URL.revokeObjectURL(a.href)}load();
</script></body></html>
