<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOOSTR Audit</title>
<meta name="description" content="BOOSTR Audit lead qualification and diagnosis.">
<link rel="icon" href="/assets/icons/09.-b-star-favicon.png">
<style>
:root{--bg:#000;--fg:#f7f7f4;--muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.16);--green:#58ff91;--gold:#feedb9;--panel:rgba(255,255,255,.055)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:var(--fg);font-family:Inter,Arial,Helvetica,sans-serif}body{background:radial-gradient(circle at 78% 0,rgba(254,237,185,.14),transparent 30%),radial-gradient(circle at 15% 88%,rgba(88,255,145,.08),transparent 28%),#000}.wrap{min-height:100vh;display:grid;place-items:center;padding:18px}.phone{width:min(100%,470px);min-height:calc(100vh - 36px);border:1px solid var(--line);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.025));box-shadow:0 40px 120px rgba(0,0,0,.86);overflow:hidden;position:relative}.phone:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% -10%,rgba(255,255,255,.16),transparent 25%)}.inner{position:relative;padding:18px;display:flex;flex-direction:column;gap:16px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:45px;height:45px;border-radius:16px;background:#080808;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.brand b{display:block;font-size:11px;letter-spacing:.28em;color:var(--gold)}.brand span{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--green)}.lang{border:1px solid var(--line);background:rgba(255,255,255,.05);color:white;border-radius:999px;padding:8px 10px;font-size:11px;font-weight:900}.hero{padding:14px 0 4px}.chip{display:inline-flex;border:1px solid rgba(88,255,145,.24);background:rgba(88,255,145,.08);color:var(--green);border-radius:999px;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.14em;font-weight:950}h1{font-family:Arial Black,Arial,sans-serif;font-size:clamp(46px,14vw,72px);line-height:.86;letter-spacing:-.08em;margin:14px 0 10px}.lead{color:var(--muted);font-size:15px;line-height:1.42;margin:0}.form{display:grid;gap:11px;margin-top:6px}label{display:grid;gap:7px;color:rgba(255,255,255,.72);font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.34);color:white;border-radius:18px;min-height:48px;padding:12px 13px;font:600 14px/1.35 Arial,Helvetica,sans-serif;outline:none}textarea{min-height:98px;resize:vertical}select option{background:#080808}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.checks label{display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:12px;color:white;border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:10px}.checks input{width:16px;height:16px;min-height:0}.actions{display:flex;gap:10px;margin-top:4px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;border-radius:999px;min-height:50px;padding:0 16px;font-weight:950;cursor:pointer}.btn.primary{flex:1;background:white;color:#000;border-color:white}.status{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:20px;padding:12px;color:var(--muted);font-size:13px;line-height:1.4}.status.ok{border-color:rgba(88,255,145,.28);background:rgba(88,255,145,.07);color:#bcffd5}.status.err{border-color:rgba(255,90,90,.3);background:rgba(255,90,90,.07);color:#ffd0d0}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.links a{color:var(--gold);text-decoration:none;font-size:12px;font-weight:900}@media(max-width:420px){.wrap{padding:8px}.phone{border-radius:30px;min-height:calc(100vh - 16px)}.inner{padding:15px}.grid,.checks{grid-template-columns:1fr}h1{font-size:46px}}
</style>
</head>
<body>
<main class="wrap">
<section class="phone"><div class="inner">
  <header class="top"><div class="brand"><div class="logo"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR" onerror="this.replaceWith(Object.assign(document.createElement('b'),{textContent:'B'}))"></div><div><b>BOOSTR LABS</b><span>AUDIT ENGINE</span></div></div><button class="lang" id="lang" type="button">ES</button></header>
  <section class="hero"><span class="chip">Ready for leads</span><h1 id="title">FREE BOOSTR Audit</h1><p class="lead" id="lead">Cuéntanos qué vendes, dónde se tranca y qué sistema necesitas. Esto crea un lead real para revisión de BOOSTR Manager.</p></section>
  <form class="form" id="auditForm">
    <div class="grid"><label><span id="lName">Nombre</span><input name="name" autocomplete="name" required></label><label><span id="lContact">Contacto</span><input name="contact" placeholder="Instagram, WhatsApp, email" required></label></div>
    <label><span id="lBusiness">Negocio / proyecto</span><input name="business" required></label>
    <div class="grid"><label><span id="lIndustry">Industria</span><select name="industry"><option>Artist / Creator</option><option>Beauty / Local Service</option><option>Automotive</option><option>Commerce / Store</option><option>Other Business</option></select></label><label><span id="lStage">Etapa</span><select name="stage"><option>Idea / starting</option><option>Already operating</option><option>Making money</option><option>Scaling</option></select></label></div>
    <label><span id="lProblem">Dónde se tranca</span><textarea name="problem" required placeholder="Ej: pierdo leads en DM, no tengo forma clara de cobrar, mi página no convierte..."></textarea></label>
    <label><span id="lGoal">Qué quieres lograr</span><textarea name="goal" required placeholder="Ej: más bookings, tienda, smart link, dashboard, CRM, automatización..."></textarea></label>
    <div class="checks" aria-label="Modules">
      <label><input type="checkbox" name="modules" value="Website"> Website</label>
      <label><input type="checkbox" name="modules" value="Smart Link"> Smart Link</label>
      <label><input type="checkbox" name="modules" value="Store"> Store</label>
      <label><input type="checkbox" name="modules" value="Dashboard / CRM"> Dashboard / CRM</label>
    </div>
    <div class="actions"><button class="btn primary" type="submit" id="submitBtn">Enviar Audit</button><button class="btn" type="reset" id="resetBtn">Reset</button></div>
    <div class="status" id="status" hidden></div>
  </form>
  <div class="links"><a href="/home">Home</a><a href="/manager/leads">Manager Leads</a><a href="/82store">82 Store</a><a href="/portfolio">Portfolio</a></div>
</div></section>
</main>
<script>
const copy={es:{lang:'ES',title:'FREE BOOSTR Audit',lead:'Cuéntanos qué vendes, dónde se tranca y qué sistema necesitas. Esto crea un lead real para revisión de BOOSTR Manager.',name:'Nombre',contact:'Contacto',business:'Negocio / proyecto',industry:'Industria',stage:'Etapa',problem:'Dónde se tranca',goal:'Qué quieres lograr',send:'Enviar Audit',reset:'Reset',sending:'Enviando...',ok:'Audit enviado. BOOSTR Manager ya puede revisarlo si la base de datos está conectada.',fail:'El Audit se completó, pero no se pudo guardar. Toma screenshot o contacta a BOOSTR.'},en:{lang:'EN',title:'FREE BOOSTR Audit',lead:'Tell us what you sell, where it gets stuck, and what system you need. This creates a real lead for BOOSTR Manager review.',name:'Name',contact:'Contact',business:'Business / project',industry:'Industry',stage:'Stage',problem:'Where it gets stuck',goal:'What you want to achieve',send:'Send Audit',reset:'Reset',sending:'Sending...',ok:'Audit sent. BOOSTR Manager can review it if the database is connected.',fail:'Audit completed, but it could not be stored. Screenshot this page or contact BOOSTR.'}};
let current='es';
function t(){return copy[current]}
function paint(){lang.textContent=t().lang;title.textContent=t().title;lead.textContent=t().lead;lName.textContent=t().name;lContact.textContent=t().contact;lBusiness.textContent=t().business;lIndustry.textContent=t().industry;lStage.textContent=t().stage;lProblem.textContent=t().problem;lGoal.textContent=t().goal;submitBtn.textContent=t().send;resetBtn.textContent=t().reset}
lang.addEventListener('click',()=>{current=current==='es'?'en':'es';paint()});
function setStatus(text,type){status.hidden=false;status.className='status '+(type||'');status.textContent=text}
auditForm.addEventListener('submit',async(e)=>{e.preventDefault();submitBtn.disabled=true;setStatus(t().sending);const fd=new FormData(auditForm);const modules=fd.getAll('modules');const payload={source:'boostr-audit',formKind:'audit',language:current,name:fd.get('name'),contact:fd.get('contact'),business:fd.get('business'),industry:fd.get('industry'),stage:fd.get('stage'),signals:modules.length+3,answers:{identity:[fd.get('industry')],stage:fd.get('stage'),friction:[fd.get('problem')],future:[fd.get('goal')],assets:modules,contact:fd.get('contact')},recommended_modules:modules,pageUrl:location.href,submittedAt:new Date().toISOString()};try{const res=await fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const data=await res.json().catch(()=>({}));if(res.ok&&data.ok){setStatus(t().ok,'ok');auditForm.reset()}else{setStatus(data.message||data.error||t().fail,'err')}}catch(err){setStatus(t().fail,'err')}finally{submitBtn.disabled=false}});
paint();
</script>
</body>
</html>
