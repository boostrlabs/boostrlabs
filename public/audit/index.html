<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOOSTR Audit</title>
<meta name="description" content="BOOSTR Audit interactivo para diagnosticar negocio, marca o artista.">
<link rel="icon" href="/assets/icons/09.-b-star-favicon.png">
<style>
:root{--bg:#000;--fg:#f7f7f4;--muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.16);--green:#58ff91;--gold:#feedb9;--warn:#eaff6d;--accent:#f4f4f4;--soft:rgba(255,255,255,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#000;color:var(--fg);font-family:Inter,Arial,Helvetica,sans-serif;overflow:hidden}body{background:radial-gradient(circle at 72% 0,rgba(254,237,185,.13),transparent 30%),radial-gradient(circle at 14% 88%,rgba(88,255,145,.08),transparent 28%),#000}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(88,255,145,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(88,255,145,.035) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.app{height:100dvh;width:100vw;display:grid;place-items:center;padding:10px}.frame{width:min(100%,430px);height:calc(100dvh - 20px);border:1px solid rgba(255,255,255,.22);border-radius:34px;background:rgba(0,0,0,.86);box-shadow:0 40px 120px rgba(0,0,0,.86),inset 0 1px 0 rgba(255,255,255,.12);position:relative;overflow:hidden}.frame:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% -8%,rgba(255,255,255,.16),transparent 24%)}.inner{height:100%;position:relative;display:flex;flex-direction:column;padding:17px 15px 12px}.header{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;background:#090909;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.name{font-size:11px;letter-spacing:.26em;font-weight:950;color:var(--gold)}.sub{font:700 10px/1.2 ui-monospace,Menlo,monospace;color:var(--green)}.lang{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;color:#fff;font-size:10px;font-weight:950;letter-spacing:.12em;padding:8px 10px}.progress{margin:15px 0 8px;opacity:0;transform:translateY(-5px);transition:.25s}.progress.on{opacity:1;transform:none}.pmeta{display:flex;justify-content:space-between;color:var(--muted);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em}.track{height:5px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:8px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold),#79c7ff);transition:.35s}.stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;animation:in .28s ease both}@keyframes in{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}.kicker{font:900 10px/1 ui-monospace,Menlo,monospace;color:var(--green);letter-spacing:.18em;margin-bottom:11px;text-transform:uppercase}h1,h2{font-family:Arial Black,Arial,sans-serif;letter-spacing:-.08em;margin:0 0 12px}h1{font-size:clamp(45px,14vw,68px);line-height:.84}h2{font-size:clamp(34px,10vw,50px);line-height:.9}.lead{margin:0;color:var(--muted);line-height:1.43;font-size:15px}.grid{display:grid;gap:9px;margin-top:16px;max-height:48dvh;overflow:auto;padding-bottom:55px}.grid.two{grid-template-columns:1fr 1fr}.choice,.langBtn{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;color:#fff;text-align:left;padding:12px;min-height:58px;font-weight:850;font-size:13px;line-height:1.22;cursor:pointer}.choice small{display:block;color:var(--muted);font-weight:600;margin-top:6px}.choice.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);box-shadow:0 0 28px color-mix(in srgb,var(--accent) 17%,transparent)}.langBtn{text-align:center;min-height:86px;font-size:18px}.textarea{margin-top:16px;width:100%;min-height:140px;border:1px solid var(--line);border-radius:22px;background:rgba(0,0,0,.34);color:white;padding:13px;font:700 14px/1.4 Arial;resize:none}.actions{display:flex;gap:10px;margin-top:auto;padding-top:12px}.nav{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;min-height:50px;font-weight:950;cursor:pointer}.nav.next{background:#fff;color:#000;border-color:#fff}.nav:disabled{opacity:.35}.console{font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.45;color:rgba(88,255,145,.92);border:1px solid rgba(88,255,145,.18);background:rgba(88,255,145,.035);border-radius:20px;padding:12px;margin-top:15px;min-height:124px;white-space:pre-wrap}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}.stat{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:22px;padding:12px}.stat b{font-family:Arial Black,Arial;font-size:31px;letter-spacing:-.07em}.stat span{display:block;color:var(--muted);font-size:11px}.alert{border:1px solid rgba(234,255,109,.22);background:rgba(234,255,109,.04);border-radius:20px;padding:12px;margin-top:9px}.alert b{color:var(--warn);font:900 11px/1 ui-monospace,Menlo,monospace;letter-spacing:.12em}.line{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:12.7px;line-height:1.32}.line:last-child{border:0}.mods{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.mod{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;padding:8px 9px;font-size:11px;font-weight:850}.cta{border:1px solid rgba(88,255,145,.25);background:rgba(88,255,145,.06);border-radius:22px;padding:12px;margin-top:10px;font-size:12.8px;line-height:1.35}.cta b{color:var(--green)}@media(max-width:390px){.app{padding:7px}.frame{height:calc(100dvh - 14px);border-radius:30px}.inner{padding:14px 12px 11px}h1{font-size:42px}h2{font-size:31px}.choice{font-size:12px;padding:10px}.grid{max-height:46dvh}.nav{min-height:46px}}
</style>
</head>
<body>
<div class="app"><main class="frame" id="frame"><div class="inner">
<header class="header"><div class="brand"><div class="logo"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR" onerror="this.replaceWith(Object.assign(document.createElement('b'),{textContent:'B'}))"></div><div><div class="name">BOOSTR LABS</div><div class="sub">AUDIT ENGINE</div></div></div><button class="lang" id="langPill" type="button">LANG</button></header>
<div class="progress" id="progress"><div class="pmeta"><span>DISCOVERY</span><span id="disc">0</span></div><div class="track"><div class="bar" id="bar"></div></div></div>
<section class="stage" id="stage"></section>
</div></main></div>
<script>
const $=id=>document.getElementById(id),stage=$('stage'),frame=$('frame'),progress=$('progress'),bar=$('bar'),disc=$('disc'),langPill=$('langPill');
const state={lang:null,step:0,accent:'#f4f4f4',answers:{},signals:0,sent:false};
const txt={
es:{back:'Atrás',next:'Siguiente',start:'Iniciar Audit',copy:'Copiar resumen',restart:'Reiniciar',signals:'señales',langTitle:'Primero, idioma.',langLead:'La experiencia completa se mantiene en el idioma que elijas.',colorTitle:'Elige un color.',colorLead:'Este acento acompaña tu diagnóstico.',introTitle:'FREE BOOSTR Audit',introLead:'BOOSTR escanea cómo funciona tu negocio hoy y detecta áreas donde podrías operar, vender o crecer mejor.',identityTitle:'¿Qué eres hoy?',identityLead:'Selecciona lo que ya forma parte de tu realidad actual.',futureTitle:'¿Qué quieres construir después?',futureLead:'Elige nuevas direcciones que todavía quieres desarrollar.',moneyTitle:'¿Qué ya genera dinero?',moneyLead:'Marca solo lo que ya te ha dejado dinero o clientes reales.',futureMoneyTitle:'¿Qué te gustaría monetizar?',futureMoneyLead:'Elige nuevas fuentes de ingreso posibles.',assetsTitle:'¿Qué material ya tienes?',assetsLead:'Logo, fotos, videos, página, forma de cobrar y pruebas reales.',stageTitle:'¿Qué tan real es esto hoy?',stageLead:'No es para juzgar. Es para saber qué infraestructura tiene sentido.',frictionTitle:'¿Dónde se tranca?',frictionLead:'Marca las fallas más honestas. Aquí empieza el diagnóstico.',trafficTitle:'Si mañana llegan 100 personas nuevas...',trafficLead:'¿Qué pasaría con esa atención?',contactTitle:'¿Dónde revisamos tu negocio?',contactLead:'Un BOOSTR Manager te contactará pronto con el próximo paso.',finalTitle:'Audit enviado.',finalLead:'Recibimos tus señales. Pronto serás contactado por BOOSTR para revisar cómo reparar estas fallas.',placeholder:'Instagram, WhatsApp, email o link principal',alerts:'Alertas iniciales detectadas',modules:'Módulos que podrían reparar esto',cta:'Para saber exactamente cómo reparar estas fallas y qué infraestructura recomendamos, espera el contacto de BOOSTR.',ids:['🎤 Artista','🎛️ Productor','🥁 Beatmaker','📱 Creador','👕 Marca de ropa','💈 Barbero','💅 Beauty','🚗 Autos','🍽️ Restaurante','📸 Foto/video','🎨 Diseñador','🧰 Servicios','🚀 Founder','✨ Otro'],money:['🎵 Música','🥁 Beats','🧾 Servicios','📅 Bookings','📱 Contenido','📦 Productos','👕 Ropa','⭐ Club/Membresía','🧠 Consultoría','💸 Comisiones','🎓 Cursos','🌱 Nada aún'],assets:[['🎯 Logo','Logo usable'],['🎨 Identidad visual','Colores, fuente, estilo'],['📷 Fotos','Fotos reales/producto'],['🎬 Videos','Contenido vendible'],['🌐 Página web','Página o landing actual'],['💳 Forma de cobrar','Pago online, Zelle, Stripe, etc.'],['🔗 Dominio','Dominio propio'],['🧾 Portfolio','Trabajo visible'],['⭐ Testimonios','Prueba de clientes'],['📦 Catálogo','Lista clara de ofertas']],stages:['💼 Trabajo y esto es paralelo','📈 Ya paga parte de mi vida','🏠 Vivo de esto','🚀 Estoy creciendo rápido','💰 Tengo dinero pero falta estructura','❓ No estoy seguro'],frictions:['❓ Demasiadas preguntas antes de pagar','💳 Cobrar no es limpio/fácil','👀 Audiencia pero pocas ventas','🧩 No sé qué ofrecer','⏳ Todo depende de mí','📩 Se pierden oportunidades en DM','🎭 La marca no se ve bien','📊 No sé qué funciona','🔁 Necesito ingreso recurrente','🎬 Necesito dirección de contenido'],traffic:['✅ Podrían comprar sin preguntar','💬 Me escribirían para preguntar','🌀 No sabrían qué hacer','📉 Perdería muchas oportunidades','❓ No estoy seguro']},
en:{back:'Back',next:'Next',start:'Start Audit',copy:'Copy summary',restart:'Restart',signals:'signals',langTitle:'First, language.',langLead:'The full experience stays in the language you choose.',colorTitle:'Choose a color.',colorLead:'This accent follows your diagnosis.',introTitle:'FREE BOOSTR Audit',introLead:'BOOSTR scans how your business works today and detects where it could operate, sell or grow better.',identityTitle:'What are you today?',identityLead:'Select what is already part of your current reality.',futureTitle:'What do you want to build next?',futureLead:'Choose new directions you still want to develop.',moneyTitle:'What already makes money?',moneyLead:'Mark only what has already produced money or real clients.',futureMoneyTitle:'What would you like to monetize?',futureMoneyLead:'Choose possible new income paths.',assetsTitle:'What material do you already have?',assetsLead:'Logo, photos, videos, page, payment method and real proof.',stageTitle:'How real is this today?',stageLead:'This is not judgment. It tells us what infrastructure makes sense.',frictionTitle:'Where does it get stuck?',frictionLead:'Select the most honest weak points. This is where diagnosis starts.',trafficTitle:'If 100 new people arrive tomorrow...',trafficLead:'What would happen with that attention?',contactTitle:'Where should we review your business?',contactLead:'A BOOSTR Manager will contact you soon with the next step.',finalTitle:'Audit sent.',finalLead:'We received your signals. BOOSTR will contact you soon to review how to repair these gaps.',placeholder:'Instagram, WhatsApp, email or main link',alerts:'Initial alerts detected',modules:'Modules that could repair this',cta:'To know exactly how to repair these gaps and what infrastructure we recommend, wait for BOOSTR to contact you.',ids:['🎤 Artist','🎛️ Producer','🥁 Beatmaker','📱 Creator','👕 Clothing brand','💈 Barber','💅 Beauty','🚗 Automotive','🍽️ Restaurant','📸 Photo/video','🎨 Designer','🧰 Services','🚀 Founder','✨ Other'],money:['🎵 Music','🥁 Beats','🧾 Services','📅 Bookings','📱 Content','📦 Products','👕 Clothing','⭐ Club/Membership','🧠 Consulting','💸 Commissions','🎓 Courses','🌱 Nothing yet'],assets:[['🎯 Logo','Usable logo'],['🎨 Visual identity','Colors, font, style'],['📷 Photos','Real/product photos'],['🎬 Videos','Sellable content'],['🌐 Website','Current page/landing'],['💳 Payment method','Online pay, Zelle, Stripe, etc.'],['🔗 Domain','Own domain'],['🧾 Portfolio','Visible work/cases'],['⭐ Testimonials','Client proof'],['📦 Catalog','Clear list of offers']],stages:['💼 I work and this is on the side','📈 It pays part of my life','🏠 I live from this','🚀 I am growing fast','💰 I have money but need structure','❓ I am not sure'],frictions:['❓ Too many questions before paying','💳 Charging is not clean/easy','👀 Audience but low sales','🧩 I do not know what to offer','⏳ Everything depends on me','📩 Opportunities get lost in DM','🎭 My brand does not look right','📊 I do not know what works','🔁 I need recurring income','🎬 I need content direction'],traffic:['✅ They could buy without asking','💬 They would message to ask','🌀 They would not know what to do','📉 I would lose many opportunities','❓ Not sure']}}
const steps=['language','color','intro','identity','future','money','futureMoney','assets','stage','friction','traffic','analysis','contact','final'];
function T(){return txt[state.lang||'es']}function upd(){document.documentElement.lang=state.lang||'es';document.documentElement.style.setProperty('--accent',state.accent);document.documentElement.style.setProperty('--soft',state.accent+'22');progress.classList.toggle('on',state.step>=3&&steps[state.step]!='final');bar.style.width=Math.min(100,Math.max(0,(state.step-2)/(steps.length-4)*100))+'%';disc.textContent=state.signals+' '+T().signals;langPill.textContent=state.lang?(state.lang=='es'?'ES':'EN'):'LANG'}
function render(){upd();stage.innerHTML='';let s=steps[state.step];if(s=='language')language();else if(s=='color')color();else if(s=='intro')intro();else if(s=='analysis')analysis();else if(s=='contact')contact();else if(s=='final')final();else choice(s)}
function language(){stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${txt.es.langTitle}</h2><p class="lead">${txt.es.langLead}</p><div class="grid two"><button class="langBtn" onclick="state.lang='es';state.step++;render()">Español</button><button class="langBtn" onclick="state.lang='en';state.step++;render()">English</button></div>`}
function color(){let colors=['#f4f4f4','#ff7aa8','#79c7ff','#58ff91','#b98cff','#ffb66b','#ff5050','#ffe76b'];stage.innerHTML=`<div class="kicker">VISUAL MODE</div><h2>${T().colorTitle}</h2><p class="lead">${T().colorLead}</p><div class="grid two">${colors.map(c=>`<button class="choice" style="border-color:${c};min-height:62px" data-v="${c}" onclick="one(this)"><b style="color:${c}">●</b> ${c}</button>`).join('')}</div>`;nav()}
function intro(){stage.innerHTML=`<div class="kicker">BOOSTR LABS</div><h1>${T().introTitle}</h1><p class="lead">${T().introLead}</p>`;type(['INITIALIZING BOOSTR AUDIT ENGINE...','BUILDING DISCOVERY PATH...','CALIBRATING BUSINESS SCAN...','WARNING: WE MAY BOOST YOUR BUSINESS.'],()=>nav(false,T().start))}
function choice(key){let map={identity:T().ids,future:T().ids,money:T().money,futureMoney:T().money,assets:T().assets,stage:T().stages,friction:T().frictions,traffic:T().traffic};let title=T()[key+'Title'],lead=T()[key+'Lead'],arr=map[key];if(key=='future')arr=arr.filter(x=>!(state.answers.identity||[]).includes(x));if(key=='futureMoney')arr=arr.filter(x=>!(state.answers.money||[]).includes(x));stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${title}</h2><p class="lead">${lead}</p>`;if(key=='assets'){stage.innerHTML+=`<div class="grid two">${arr.map(a=>`<button class="choice" data-v="${a[0]}" onclick="tog(this)"><b>${a[0]}</b><small>${a[1]}</small></button>`).join('')}</div>`}else{let single=['stage','traffic'].includes(key);stage.innerHTML+=`<div class="grid">${arr.map(x=>`<button class="choice" data-v="${x}" onclick="${single?'one':'tog'}(this)">${x}</button>`).join('')}</div>`}nav()}
function analysis(){stage.innerHTML=`<div class="kicker">DIAGNOSIS</div><h2>${state.lang=='es'?'Leyendo señales.':'Reading signals.'}</h2><p class="lead">${state.lang=='es'?'BOOSTR está conectando identidad, dinero, material, fricción y tráfico.':'BOOSTR is connecting identity, money, material, friction and traffic.'}</p>`;type(['SCAN: IDENTITY','SCAN: MONEY PATHS','SCAN: FRICTION','SCAN: CONVERSION RISK','STATUS: HUMAN REVIEW NEEDED'],()=>nav(false))}
function contact(){stage.innerHTML=`<div class="kicker">HUMAN REVIEW</div><h2>${T().contactTitle}</h2><p class="lead">${T().contactLead}</p><textarea class="textarea" id="free" placeholder="${T().placeholder}">${state.answers.contact||''}</textarea>`;nav()}
function final(){let r=results();stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${T().finalTitle}</h2><p class="lead">${T().finalLead}</p><div class="stats"><div class="stat"><b>${state.signals}</b><span>${T().signals}</span></div><div class="stat"><b>${Object.keys(state.answers).length}</b><span>${state.lang=='es'?'bloques leídos':'blocks read'}</span></div></div><div class="alert"><b>${T().alerts}</b>${r.alerts.map(x=>`<div class="line"><span>${x[0]}</span><span>${x[1]}</span></div>`).join('')}</div><div class="mods">${r.mods.map(m=>`<span class="mod">${m}</span>`).join('')}</div><div class="cta"><b>${state.lang=='es'?'Serás contactado pronto.':'You will be contacted soon.'}</b> ${T().cta}</div>`;sendAudit(r);type(['AUDIT STATUS: COMPLETE','ALERTS: DETECTED','REPAIR PREVIEW: LOCKED','HUMAN REVIEW: REQUIRED'],()=>{let a=document.createElement('div');a.className='actions';a.innerHTML=`<button class="nav" onclick="location.reload()">${T().restart}</button><button class="nav next" onclick="copy()">${T().copy}</button>`;stage.append(a)})}
function nav(back=true,label){let a=document.createElement('div');a.className='actions';a.innerHTML=`<button class="nav" ${state.step==0||!back?'disabled':''} onclick="state.step--;render()">${T().back}</button><button class="nav next" onclick="next()">${label||T().next}</button>`;stage.append(a)}
function next(){collect();if(state.step<steps.length-1){state.step++;render()}}function collect(){let key=steps[state.step];if(key=='contact'){state.answers.contact=$('free').value;return}let vals=[...stage.querySelectorAll('.sel')].map(x=>x.dataset.v);if(key=='color'){if(vals[0])state.accent=vals[0];state.answers.color=vals[0]||state.accent;return}if(['identity','future','money','futureMoney','assets','friction'].includes(key)){state.answers[key]=vals;if(vals.length)state.signals=Math.min(24,state.signals+Math.max(1,Math.ceil(vals.length/2)));return}if(['stage','traffic'].includes(key)){state.answers[key]=vals[0]||'';if(vals.length)state.signals=Math.min(24,state.signals+1)}}
function tog(el){el.classList.toggle('sel')}function one(el){[...el.parentElement.children].forEach(x=>x.classList.remove('sel'));el.classList.add('sel')}
function type(lines,done){let c=document.createElement('div');c.className='console';stage.append(c);let i=0,j=0,out='';function tick(){if(i>=lines.length){done&&setTimeout(done,400);return}let line=lines[i];if(j<line.length){out+=line[j++];c.textContent=out;setTimeout(tick,28+Math.random()*36)}else{out+='\n';i++;j=0;setTimeout(tick,250)}}tick()}
function add(arr,e,t){arr.push([e,t])}function results(){let a=state.answers,al=[],mods=new Set(['BOOSTR Review']);let fr=(a.friction||[]).join(' '),fu=(a.futureMoney||[]).join(' '),assets=a.assets||[],traffic=a.traffic||'';if(/preguntas|questions|DM/i.test(fr)){add(al,'💬',state.lang=='es'?'Tu venta depende demasiado de conversaciones manuales.':'Your sale depends too much on manual conversations.');mods.add('Smart Link')}if(/cobrar|Charging|payment/i.test(fr)){add(al,'💳',state.lang=='es'?'El cobro puede estar agregando fricción antes del cierre.':'Payment may be adding friction before close.');mods.add('Smart Payment Link')}if(/audiencia|Audience/i.test(fr)){add(al,'👀',state.lang=='es'?'Hay atención, pero no necesariamente conversión.':'There is attention, but not necessarily conversion.');mods.add('Conversion CTA')}if(/Club|recurrente|recurring|Membresía/i.test(fu+fr)){add(al,'⭐',state.lang=='es'?'Existe posible oportunidad de ingreso recurrente.':'There may be a recurring income opportunity.');mods.add('Membership')}if(!assets.some(x=>/Logo/i.test(x))||!assets.some(x=>/Identidad|Visual/i.test(x))){add(al,'🎨',state.lang=='es'?'La marca puede necesitar material visual más claro antes de escalar.':'The brand may need clearer visual material before scaling.');mods.add('Brand Assets')}if(/perder|lose|No sabrían|not know/i.test(traffic)){add(al,'⚠️',state.lang=='es'?'Si llega tráfico nuevo, parte de esa atención podría perderse.':'If new traffic arrives, part of that attention could be lost.');mods.add('Lead Capture')}while(al.length<3){add(al,'🧩',state.lang=='es'?'Hay señales suficientes para revisión personalizada.':'There are enough signals for personalized review.');mods.add('Custom OS')}return{alerts:al.slice(0,5),mods:[...mods].slice(0,8)}}
async function sendAudit(r){if(state.sent)return;state.sent=true;let payload={source:'boostr-audit-v5',formKind:'audit',language:state.lang||'es',name:'BOOSTR Audit applicant',contact:state.answers.contact||'',business:'BOOSTR Audit',industry:(state.answers.identity||[]).join(', '),stage:state.answers.stage||'',signals:state.signals,answers:state.answers,recommended_modules:r.mods,pageUrl:location.href,submittedAt:new Date().toISOString()};try{await fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}catch(e){console.warn('audit_save_failed')}}
function copy(){navigator.clipboard.writeText('BOOSTR AUDIT V5\n'+JSON.stringify(state.answers,null,2)).then(()=>alert(state.lang=='es'?'Copiado':'Copied'))}
langPill.addEventListener('click',()=>{state.lang=state.lang=='es'?'en':'es';render()});render();
</script>
</body>
</html>
