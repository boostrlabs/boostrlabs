<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOOSTR Audit</title>
<meta name="description" content="BOOSTR Audit con acceso por clave secreta y diagnóstico interactivo.">
<link rel="icon" href="/assets/icons/09.-b-star-favicon.png">
<style>
:root{--bg:#000;--fg:#f7f7f4;--muted:rgba(255,255,255,.62);--line:rgba(255,255,255,.16);--green:#58ff91;--gold:#feedb9;--accent:#f4f4f4;--soft:rgba(255,255,255,.1)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#000;color:var(--fg);font-family:Inter,Arial,Helvetica,sans-serif;overflow:hidden}body{background:radial-gradient(circle at 72% 0,rgba(254,237,185,.13),transparent 30%),radial-gradient(circle at 14% 88%,rgba(88,255,145,.08),transparent 28%),#000}.app{height:100dvh;width:100vw;display:grid;place-items:center;padding:10px}.frame{width:min(100%,440px);height:calc(100dvh - 20px);border:1px solid rgba(255,255,255,.22);border-radius:34px;background:rgba(0,0,0,.88);box-shadow:0 40px 120px rgba(0,0,0,.86),inset 0 1px 0 rgba(255,255,255,.12);position:relative;overflow:hidden}.inner{height:100%;position:relative;display:flex;flex-direction:column;padding:17px 15px 12px}.header{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:15px;background:#090909;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.name{font-size:11px;letter-spacing:.26em;font-weight:950;color:var(--gold)}.sub{font:700 10px/1.2 ui-monospace,Menlo,monospace;color:var(--green)}.lang{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;color:#fff;font-size:10px;font-weight:950;letter-spacing:.12em;padding:8px 10px}.progress{margin:15px 0 8px;opacity:0;transform:translateY(-5px);transition:.25s}.progress.on{opacity:1;transform:none}.pmeta{display:flex;justify-content:space-between;color:var(--muted);font:800 10px/1 ui-monospace,Menlo,monospace;letter-spacing:.1em}.track{height:5px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:8px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold),#79c7ff);transition:.35s}.stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;animation:in .28s ease both}@keyframes in{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}.kicker{font:900 10px/1 ui-monospace,Menlo,monospace;color:var(--green);letter-spacing:.18em;margin-bottom:11px;text-transform:uppercase}h1,h2{font-family:Arial Black,Arial,sans-serif;letter-spacing:-.08em;margin:0 0 12px}h1{font-size:clamp(42px,13vw,64px);line-height:.84}h2{font-size:clamp(32px,10vw,48px);line-height:.9}.lead{margin:0;color:var(--muted);line-height:1.43;font-size:14px}.grid{display:grid;gap:9px;margin-top:16px;max-height:46dvh;overflow:auto;padding-bottom:56px}.grid.two{grid-template-columns:1fr 1fr}.choice,.langBtn{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;color:#fff;text-align:left;padding:12px;min-height:58px;font-weight:850;font-size:13px;line-height:1.22;cursor:pointer}.choice small{display:block;color:var(--muted);font-weight:600;margin-top:6px}.choice.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}.langBtn{text-align:center;min-height:78px;font-size:18px}.input,.textarea{margin-top:12px;width:100%;border:1px solid var(--line);border-radius:20px;background:rgba(0,0,0,.34);color:white;padding:0 13px;font:800 14px Arial;outline:0}.input{min-height:50px}.textarea{min-height:120px;padding-top:13px;resize:none;line-height:1.4}.tiny{font-size:9.5px;color:rgba(255,255,255,.38);line-height:1.3;margin-top:7px}.actions{display:flex;gap:10px;margin-top:auto;padding-top:12px}.nav{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;min-height:50px;font-weight:950;cursor:pointer}.nav.next{background:#fff;color:#000;border-color:#fff}.nav:disabled{opacity:.35}.unlock{border:1px solid rgba(254,237,185,.28);background:rgba(254,237,185,.06);border-radius:24px;padding:14px;margin-top:14px}.console{font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.45;color:rgba(88,255,145,.92);border:1px solid rgba(88,255,145,.18);background:rgba(88,255,145,.035);border-radius:20px;padding:12px;margin-top:15px;min-height:112px;white-space:pre-wrap}.mods{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.mod{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:999px;padding:8px 9px;font-size:11px;font-weight:850}.cta{border:1px solid rgba(88,255,145,.25);background:rgba(88,255,145,.06);border-radius:22px;padding:12px;margin-top:10px;font-size:12.8px;line-height:1.35}.cta b{color:var(--green)}@media(max-width:390px){.app{padding:7px}.frame{height:calc(100dvh - 14px);border-radius:30px}.inner{padding:14px 12px 11px}h1{font-size:40px}h2{font-size:30px}.choice{font-size:12px;padding:10px}.grid{max-height:44dvh}.nav{min-height:46px}}
</style>
</head>
<body>
<div class="app"><main class="frame"><div class="inner"><header class="header"><div class="brand"><div class="logo"><img src="/assets/logos/boostr-logo-nav.png" alt="BOOSTR"></div><div><div class="name">BOOSTR LABS</div><div class="sub">AUDIT ENGINE</div></div></div><button class="lang" id="langPill">LANG</button></header><div class="progress" id="progress"><div class="pmeta"><span>DISCOVERY</span><span id="disc">0</span></div><div class="track"><div class="bar" id="bar"></div></div></div><section class="stage" id="stage"></section></div></main></div>
<script>
const $=id=>document.getElementById(id),stage=$('stage'),progress=$('progress'),bar=$('bar'),disc=$('disc'),langPill=$('langPill');let lang=localStorage.getItem('boostr_lang')||((navigator.language||'').startsWith('es')?'es':'en');const state={step:0,accent:'#f4f4f4',answers:{},signals:0,secret:'',codeValid:false,sent:false};
const T={es:{back:'Atrás',next:'Siguiente',start:'Iniciar Audit',signup:'Crear cuenta BOOSTR',langTitle:'Primero, idioma.',langLead:'La experiencia completa se mantiene en el idioma que elijas.',entryTitle:'Elige color e idioma.',entryLead:'Aquí también puedes entrar una clave secreta si la tienes.',secretLabel:'Si conoces la clave secreta BOOSTR, escríbela aquí.',secretPlaceholder:'Clave secreta BOOSTR',secretTiny:'Si no sabes de qué estoy hablando, no te preocupes. Solo avanza sin colocar nada.',unlockTitle:'Felicidades. Activaste el Cheat BOOSTR Code.',unlockLead:'Puedes saltar la auditoría/pre-aprobación y crear tu cuenta BOOSTR ahora.',invalid:'No se desbloqueó el código. Puedes continuar el Audit normalmente.',down:'Code check unavailable. Continue Audit normally.',introTitle:'FREE BOOSTR Audit',introLead:'BOOSTR escanea cómo funciona tu negocio hoy y detecta áreas donde podrías operar, vender o crecer mejor.',identityTitle:'¿Qué eres hoy?',moneyTitle:'¿Qué ya genera dinero?',assetsTitle:'¿Qué material ya tienes?',frictionTitle:'¿Dónde se tranca?',contactTitle:'¿Dónde revisamos tu negocio?',finalTitle:'Audit enviado.',finalLead:'Recibimos tus señales. Pronto serás contactado por BOOSTR.',placeholder:'Instagram, WhatsApp, email o link principal',ids:['🎤 Artista','🎛️ Productor','🥁 Beatmaker','📱 Creador','👕 Marca','💈 Barbero','💅 Beauty','🚗 Autos','🍽️ Restaurante','🚀 Founder'],money:['🎵 Música','🥁 Beats','🧾 Servicios','📅 Bookings','📦 Productos','👕 Ropa','⭐ Membresía','💸 Comisiones','🌱 Nada aún'],assets:['🎯 Logo','🎨 Identidad visual','📷 Fotos','🎬 Videos','🌐 Página web','💳 Forma de cobrar','🔗 Dominio','⭐ Testimonios'],frictions:['💳 Cobrar no es limpio/fácil','📩 Se pierden oportunidades en DM','👀 Audiencia pero pocas ventas','🧩 No sé qué ofrecer','⏳ Todo depende de mí','📊 No sé qué funciona','🎬 Necesito dirección de contenido']},en:{back:'Back',next:'Next',start:'Start Audit',signup:'Create BOOSTR account',langTitle:'First, language.',langLead:'The full experience stays in the language you choose.',entryTitle:'Choose color and language.',entryLead:'You can also enter a secret code here if you have one.',secretLabel:'If you know the secret BOOSTR code, enter it here.',secretPlaceholder:'Secret BOOSTR code',secretTiny:'If you do not know what this means, do not worry. Just continue without entering anything.',unlockTitle:'Cheat BOOSTR Code unlocked.',unlockLead:'You can skip the business audit/pre-approval and create your BOOSTR account now.',invalid:'Code not unlocked. You can continue the Audit normally.',down:'Code check unavailable. Continue Audit normally.',introTitle:'FREE BOOSTR Audit',introLead:'BOOSTR scans how your business works today and detects where it could operate, sell or grow better.',identityTitle:'What are you today?',moneyTitle:'What already makes money?',assetsTitle:'What material do you already have?',frictionTitle:'Where does it get stuck?',contactTitle:'Where should we review your business?',finalTitle:'Audit sent.',finalLead:'We received your signals. BOOSTR will contact you soon.',placeholder:'Instagram, WhatsApp, email or main link',ids:['🎤 Artist','🎛️ Producer','🥁 Beatmaker','📱 Creator','👕 Brand','💈 Barber','💅 Beauty','🚗 Automotive','🍽️ Restaurant','🚀 Founder'],money:['🎵 Music','🥁 Beats','🧾 Services','📅 Bookings','📦 Products','👕 Clothing','⭐ Membership','💸 Commissions','🌱 Nothing yet'],assets:['🎯 Logo','🎨 Visual identity','📷 Photos','🎬 Videos','🌐 Website','💳 Payment method','🔗 Domain','⭐ Testimonials'],frictions:['💳 Payment is not clean/easy','📩 Opportunities get lost in DM','👀 Audience but low sales','🧩 I do not know what to offer','⏳ Everything depends on me','📊 I do not know what works','🎬 I need content direction']}};const t=()=>T[lang];
function setLang(l){lang=l;localStorage.setItem('boostr_lang',l);document.documentElement.lang=l;langPill.textContent=l.toUpperCase();render()}langPill.onclick=()=>setLang(lang==='en'?'es':'en');
function choices(key,items,two=false){return `<div class="grid ${two?'two':''}">${items.map(x=>`<button class="choice ${state.answers[key]?.includes(x)?'sel':''}" data-key="${key}" data-val="${x}">${x}</button>`).join('')}</div>`}
function shell(k,h,lead,body){stage.innerHTML=`<div class="kicker">${k}</div><h1>${h}</h1><p class="lead">${lead||''}</p>${body||''}<div class="actions"><button class="nav" id="back">${t().back}</button><button class="nav next" id="next">${state.step===steps.length-1?t().start:t().next}</button></div>`;document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{const k=b.dataset.key,v=b.dataset.val;state.answers[k]=state.answers[k]||[];state.answers[k]=state.answers[k].includes(v)?state.answers[k].filter(x=>x!==v):[...state.answers[k],v];b.classList.toggle('sel')});$('back').onclick=()=>{if(state.step>0){state.step--;render()}};$('next').onclick=next}
async function validateCode(){if(!state.secret)return false;try{const r=await fetch('/api/invite-codes/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:state.secret,source:'audit_entry'})});const d=await r.json().catch(()=>({}));if(r.ok&&d.valid){state.codeValid=true;sessionStorage.setItem('boostr_secret_code',state.secret);return true}state.codeMsg=t().invalid;return false}catch{state.codeMsg=t().down;return false}}
const steps=[()=>{progress.classList.remove('on');stage.innerHTML=`<div class="kicker">BOOSTR ACCESS</div><h1>${t().entryTitle}</h1><p class="lead">${t().entryLead}</p><div class="grid two"><button class="langBtn" onclick="setLang('es')">ES</button><button class="langBtn" onclick="setLang('en')">EN</button></div><div class="unlock"><div class="kicker">${t().secretLabel}</div><input class="input" id="secret" value="${state.secret}" placeholder="${t().secretPlaceholder}"><p class="tiny">${t().secretTiny}</p><p class="tiny" id="codeMsg">${state.codeMsg||''}</p></div><div class="actions"><button class="nav next" id="continueBtn">${t().next}</button></div>`;$('secret').oninput=e=>state.secret=e.target.value.trim();$('continueBtn').onclick=async()=>{if(state.secret){$('codeMsg').textContent=lang==='es'?'Validando...':'Checking...';if(await validateCode()){renderUnlock();return}}state.step=1;render()}},()=>shell('BOOSTR AUDIT',t().introTitle,t().introLead,''),()=>shell('IDENTITY',t().identityTitle,'',choices('identity',t().ids,true)),()=>shell('MONEY',t().moneyTitle,'',choices('money',t().money,true)),()=>shell('ASSETS',t().assetsTitle,'',choices('assets',t().assets,true)),()=>shell('FRICTION',t().frictionTitle,'',choices('friction',t().frictions,false)),()=>{stage.innerHTML=`<div class="kicker">CONTACT</div><h1>${t().contactTitle}</h1><p class="lead">${lang==='es'?'Un BOOSTR Manager te contactará con el próximo paso.':'A BOOSTR Manager will contact you with the next step.'}</p><textarea class="textarea" id="contact" placeholder="${t().placeholder}">${state.answers.contact||''}</textarea><div class="actions"><button class="nav" id="back">${t().back}</button><button class="nav next" id="send">${t().start}</button></div>`;$('contact').oninput=e=>state.answers.contact=e.target.value;$('back').onclick=()=>{state.step--;render()};$('send').onclick=submitAudit}];
function renderUnlock(){stage.innerHTML=`<div class="kicker">UNLOCKED</div><h1>${t().unlockTitle}</h1><p class="lead">${t().unlockLead}</p><div class="console">BOOSTR_CODE=VALID\nPATH=BYPASS_AUDIT\nNEXT=SIGNUP</div><div class="actions"><button class="nav" id="auditAnyway">${t().start}</button><button class="nav next" id="goSignup">${t().signup}</button></div>`;$('auditAnyway').onclick=()=>{state.step=1;render()};$('goSignup').onclick=()=>{location.href='/signup?secret='+encodeURIComponent(state.secret)}}
function render(){langPill.textContent=lang.toUpperCase();bar.style.width=(state.step/(steps.length-1))*100+'%';disc.textContent=state.step;progress.classList.toggle('on',state.step>0);steps[state.step]()}async function next(){if(state.step<steps.length-1){state.step++;render()}else submitAudit()}
async function submitAudit(){if(state.sent)return;state.sent=true;const payload={source:'boostr-audit',formKind:'audit',language:lang,contact:state.answers.contact||'',answers:state.answers,signals:Object.values(state.answers).flat().length,pageUrl:location.href,submittedAt:new Date().toISOString()};stage.innerHTML=`<div class="kicker">SENDING</div><h1>${lang==='es'?'Procesando.':'Processing.'}</h1><div class="console">BOOSTR Audit Engine\nSaving signals...\nCreating lead...</div>`;try{await fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})}catch{}stage.innerHTML=`<div class="kicker">DONE</div><h1>${t().finalTitle}</h1><p class="lead">${t().finalLead}</p><div class="mods"><span class="mod">BOOSTR Audit</span><span class="mod">Leads</span><span class="mod">Dashboard</span><span class="mod">Smart Payment Link</span></div><div class="cta"><b>Next:</b> ${lang==='es'?'espera contacto o crea una cuenta si tienes acceso.':'wait for contact or create an account if you have access.'}</div><div class="actions"><button class="nav" onclick="location.reload()">Restart</button><button class="nav next" onclick="location.href='/signup'">${t().signup}</button></div>`}
setLang(lang);
</script>
</body>
</html>
