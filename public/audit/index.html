<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>BOOSTR Audit V5</title>
<style>
:root{
  --fg:#f7f7f4;--muted:rgba(255,255,255,.60);--line:rgba(255,255,255,.16);
  --green:#58ff91;--warn:#eaff6d;--pink:#ffced8;--accent:#f4f4f4;--accentSoft:rgba(255,255,255,.14);
  --rainbow:linear-gradient(90deg,#ff4fd8,#ff7a00,#fff04a,#39ff8a,#37caff,#925cff);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#000;color:var(--fg);font-family:Arial,Helvetica,sans-serif;overflow:hidden}
body{background:radial-gradient(circle at 70% 0%,rgba(255,255,255,.04),transparent 26%),radial-gradient(circle at 25% 84%,rgba(88,255,145,.055),transparent 22%),#000}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(rgba(88,255,145,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(88,255,145,.035) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}
body:after{content:"";position:fixed;inset:0;pointer-events:none;opacity:.13;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 260 260' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{height:100dvh;width:100vw;display:flex;align-items:center;justify-content:center;padding:10px}
.frame{width:min(100%,430px);height:calc(100dvh - 20px);border:1px solid rgba(255,255,255,.22);border-radius:34px;background:rgba(0,0,0,.86);position:relative;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.12)}
.frame:before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% -10%,rgba(255,255,255,.16),transparent 22%),radial-gradient(circle at 100% 25%,var(--accentSoft),transparent 36%)}
.frame.rainbow{border-color:rgba(255,255,255,.28);--accent:#fff;--accentSoft:rgba(255,255,255,.08)}
.frame.rainbow:before{background:radial-gradient(circle at 35% -8%,rgba(255,79,216,.18),transparent 23%),radial-gradient(circle at 95% 18%,rgba(0,200,255,.16),transparent 25%),radial-gradient(circle at 20% 92%,rgba(57,255,138,.13),transparent 25%)}
.inner{height:100%;position:relative;display:flex;flex-direction:column;padding:16px 14px 12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex:0 0 auto}
.brand{display:flex;align-items:center;gap:10px}
.logoBox{width:43px;height:43px;border-radius:15px;background:#050505;border:1px solid rgba(255,255,255,.20);display:grid;place-items:center;overflow:hidden}
.logoBox img{width:100%;height:100%;object-fit:cover}
.logoFallback{font-weight:1000;font-size:27px;color:#fff}
.name{font-size:11px;letter-spacing:.30em;font-weight:900;color:var(--pink);white-space:nowrap}
.rainbow .name,.rainbowText{background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px;color:var(--green);letter-spacing:.08em;margin-top:3px}
.lang{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);border-radius:999px;color:rgba(255,255,255,.65);font-size:11px;padding:7px 9px}
.progress{display:none;margin-bottom:9px;flex:0 0 auto}.progress.on{display:block}
.pmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;margin-bottom:7px}
.track{height:4px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#fff,var(--accent),var(--green));transition:.5s ease}
.stage{flex:1;min-height:0;display:flex;flex-direction:column;animation:enter .3s ease both}
@keyframes enter{from{opacity:0;transform:translateY(10px);filter:blur(7px)}to{opacity:1;transform:none;filter:none}}
.kicker{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--green);font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin:3px 0 9px}
h1,h2{margin:0;line-height:.9;letter-spacing:-.075em;font-weight:950;font-family:Arial Black,Arial,Helvetica,sans-serif}
h1{font-size:clamp(42px,14vw,64px)}h2{font-size:clamp(31px,10.2vw,47px)}
.lead{color:rgba(255,255,255,.70);font-size:15px;line-height:1.34;margin:11px 0 0}
.console{margin-top:14px;min-height:126px;border:1px solid rgba(88,255,145,.28);border-radius:22px;background:rgba(0,16,7,.44);padding:14px 13px;font:650 11.3px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--green);box-shadow:0 0 70px rgba(88,255,145,.07),inset 0 0 30px rgba(88,255,145,.04);position:relative;overflow:hidden}
.console:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(88,255,145,.045) 1px,transparent 1px);background-size:100% 19px;pointer-events:none}.console .warn{color:var(--warn)}.typed:after{content:"_";animation:blink .8s infinite}@keyframes blink{50%{opacity:0}}
.options{margin-top:13px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px;overflow:auto;max-height:45dvh;padding-bottom:52px;scrollbar-width:none}.options::-webkit-scrollbar{display:none}
.opt{border:1px solid rgba(255,255,255,.15);background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));color:#fff;border-radius:18px;min-height:38px;padding:8px 10px;font-size:12.5px;font-weight:850;display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:.14s ease;user-select:none}
.opt.long{border-radius:19px;min-height:44px;font-size:12.5px}.opt:active{transform:scale(.97)}
.opt.sel{border-color:color-mix(in srgb,var(--accent) 65%, white 15%);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 18%,transparent),rgba(255,255,255,.04));box-shadow:0 0 32px color-mix(in srgb,var(--accent) 17%,transparent)}
.rainbow .opt.sel{border-color:rgba(255,255,255,.35);background:linear-gradient(135deg,rgba(255,79,216,.16),rgba(57,255,138,.10),rgba(55,202,255,.14))}
.colorDot{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,.35);display:block}
.textarea{width:100%;min-height:110px;margin-top:14px;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:rgba(255,255,255,.04);color:#fff;font-size:15px;padding:13px;resize:none;outline:none}
.actions{flex:0 0 auto;display:flex;justify-content:space-between;gap:10px;padding-top:10px;margin-top:auto;background:linear-gradient(180deg,transparent,rgba(0,0,0,.94) 36%,#000)}
.nav{border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.055);color:#fff;font-size:14px;font-weight:950;min-height:48px;padding:0 17px}.next{background:#fff;color:#000;border:0;box-shadow:0 13px 42px rgba(255,255,255,.13)}.nav:disabled{opacity:.35}
.langGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.langBtn{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.045);border-radius:24px;min-height:86px;color:#fff;font-weight:950;font-size:17px}
.assetGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px;overflow:auto;max-height:45dvh;padding-bottom:52px}
.asset{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);border-radius:18px;padding:10px;min-height:72px;font-size:12.5px;font-weight:850;display:flex;flex-direction:column;gap:7px}.asset small{color:var(--muted);font-size:10px;font-weight:600}.asset.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}.stat{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);border-radius:22px;padding:12px;min-height:76px}.stat b{font-family:Arial Black,Arial;font-size:30px;letter-spacing:-.07em}.stat span{display:block;color:var(--muted);font-size:11px;margin-top:4px}
.alert{border:1px solid rgba(234,255,109,.22);background:rgba(234,255,109,.04);border-radius:20px;padding:12px;margin-top:9px}.alert b{color:var(--warn);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;letter-spacing:.12em}.line{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:12.7px;line-height:1.32}.line:last-child{border-bottom:0}
.modules{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.mod{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.045);border-radius:999px;padding:8px 9px;font-size:11px;font-weight:850}
.cta{border:1px solid rgba(88,255,145,.25);background:rgba(88,255,145,.06);border-radius:22px;padding:12px;margin-top:10px;font-size:12.8px;line-height:1.35}.cta b{color:var(--green)}
@media(max-width:390px){.app{padding:7px}.frame{height:calc(100dvh - 14px);border-radius:30px}.inner{padding:14px 12px 11px}.logoBox{width:38px;height:38px;border-radius:13px}.name{font-size:10px}.sub{font-size:9.5px}.lang{font-size:10px;padding:6px 8px}h1{font-size:42px}h2{font-size:31px}.lead{font-size:14.3px}.options,.assetGrid{max-height:44dvh}.opt{font-size:12px;padding:8px 9px}.console{font-size:10.6px;min-height:120px}.nav{min-height:46px;font-size:13.5px}}
</style>
</head>
<body>
<div class="app"><main class="frame" id="frame"><div class="inner">
<header class="header"><div class="brand"><div class="logoBox"><img src="boostr-logo.png" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logoFallback',textContent:'B'}))"/></div><div><div class="name">BOOSTR LABS</div><div class="sub">AUDIT ENGINE</div></div></div><div class="lang" id="langPill">LANG</div></header>
<div class="progress" id="progress"><div class="pmeta"><span>DISCOVERY</span><span id="disc">0 señales</span></div><div class="track"><div class="bar" id="bar"></div></div></div>
<section class="stage" id="stage"></section>
</div></main></div>
<script>
const stage=document.getElementById("stage"),frame=document.getElementById("frame"),progress=document.getElementById("progress"),bar=document.getElementById("bar"),disc=document.getElementById("disc"),langPill=document.getElementById("langPill");
const state={lang:null,step:0,accent:"#f4f4f4",rainbow:false,answers:{},signals:0};
const TXT={es:{back:"Atrás",next:"Siguiente",start:"Iniciar Audit",copy:"Copiar resumen",restart:"Reiniciar",signals:"señales",
langTitle:"Primero, idioma.",langLead:"La experiencia completa se mantiene en el idioma que elijas.",genderTitle:"Personaliza tu Audit.",genderLead:"Esto ajusta la estética. No afecta tu diagnóstico.",colorTitle:"Elige un color.",colorLead:"Este acento acompañará tu experiencia.",introTitle:"FREE BOOSTR Audit",introLead:"BOOSTR escanea cómo funciona tu negocio hoy y detecta áreas donde podrías operar, vender o crecer mejor.",
identityTitle:"¿Qué eres hoy?",identityLead:"Selecciona solo lo que ya forma parte de tu realidad actual.",futureIdTitle:"¿Qué quieres construir después?",futureIdLead:"Aquí NO repetimos lo anterior. Elige nuevas direcciones que todavía quieres desarrollar.",
currentTitle:"¿Qué ya genera dinero?",currentLead:"Marca solo lo que ya te ha dejado dinero o clientes reales.",futureTitle:"¿Qué te gustaría monetizar?",futureLead:"Aquí NO repetimos lo que ya cobras. Elige nuevas fuentes de ingreso posibles.",assetsTitle:"¿Qué material ya tiene tu negocio?",assetsLead:"Logo, fotos, videos, página, forma de cobrar y pruebas reales. Esto nos dice qué falta antes de escalar.",
stageTitle:"¿Qué tan real es esto hoy?",stageLead:"No es para juzgar. Es para saber qué tipo de infraestructura tiene sentido.",frictionTitle:"¿Dónde se tranca?",frictionLead:"Marca las fallas más honestas. Aquí empieza el diagnóstico.",trafficTitle:"Si mañana llegan 100 personas nuevas...",trafficLead:"¿Qué pasaría con esa atención?",contactTitle:"¿Dónde revisamos tu negocio?",contactLead:"Un BOOSTR Manager te contactará pronto con el próximo paso.",finalTitle:"Audit enviado.",finalLead:"Recibimos tus señales. Pronto serás contactado por BOOSTR para revisar cómo reparar estas fallas.",
genders:[["male","👨 Masculino"],["female","👩 Femenino"],["lgbt","🌈 LGBTQ+ / Other"]],
ids:["🎤 Artista","🎛️ Productor","🥁 Beatmaker","📱 Creador","👕 Marca de ropa","💈 Barbero","💅 Beauty","🚗 Autos","🍽️ Restaurante","📸 Foto/video","🎨 Diseñador","🧰 Servicios","🚀 Founder","✨ Otro"],
money:["🎵 Música","🥁 Beats","🧾 Servicios","📅 Reservas/Bookings","📱 Contenido","📦 Productos","👕 Ropa","⭐ Club/Membresía","🧠 Consultoría","💸 Comisiones","🎓 Cursos","🌱 Nada aún"],
assets:[["🎯 Logo","Logo usable"],["🎨 Identidad visual","Colores, fuente, estilo"],["📷 Fotos","Fotos reales/producto"],["🎬 Videos","Contenido vendible"],["🌐 Página web","Página o landing actual"],["💳 Forma de cobrar","Pago online, Zelle, Stripe, etc."],["🔗 Dominio","Dominio propio"],["🧾 Portafolio","Trabajos/casos visibles"],["⭐ Testimonios","Prueba de clientes"],["📦 Catálogo","Lista clara de ofertas"]],
stages:["💼 Trabajo y esto está on the side","📈 Ya paga parte de mi vida","🏠 Ya vivo de esto","🚀 Estoy creciendo rápido","💰 Tengo dinero pero necesito estructura","❓ No estoy seguro"],
frictions:["❓ Preguntan demasiado antes de pagar","💳 Cobrar no es fácil/limpio","👀 Tengo audiencia pero vendo poco","🧩 No sé qué ofrecer","⏳ Todo depende de mí","📩 Pierdo oportunidades en DM","🎭 Mi marca no se ve como debería","📊 No sé qué está funcionando","🔁 Necesito ingreso recurrente","🎬 Necesito dirección de contenido"],
traffic:["✅ Podrían comprar sin preguntarme","💬 Me escribirían para preguntar","🌀 No entenderían qué hacer","📉 Perdería muchas oportunidades","❓ No estoy seguro"],
placeholder:"Instagram, WhatsApp, email o link principal",alerts:"Alertas iniciales detectadas",modules:"Módulos que podrían reparar esto",cta:"Para saber exactamente cómo reparar estas fallas y qué infraestructura recomendamos, espera el contacto de BOOSTR."},
en:{back:"Back",next:"Next",start:"Start Audit",copy:"Copy summary",restart:"Restart",signals:"signals",
langTitle:"First, language.",langLead:"The full experience stays in the language you choose.",genderTitle:"Personalize your Audit.",genderLead:"This adjusts the aesthetic. It does not affect your diagnosis.",colorTitle:"Choose a color.",colorLead:"This accent will follow your experience.",introTitle:"FREE BOOSTR Audit",introLead:"BOOSTR scans how your business works today and detects areas where you could operate, sell or grow better.",
identityTitle:"What are you today?",identityLead:"Select only what is already part of your current reality.",futureIdTitle:"What do you want to build next?",futureIdLead:"We do NOT repeat the previous list here. Choose new directions you still want to develop.",
currentTitle:"What already makes money?",currentLead:"Select only what has already generated money or real customers.",futureTitle:"What would you like to monetize?",futureLead:"We do NOT repeat what already makes money. Choose possible new income paths.",assetsTitle:"What material does your business already have?",assetsLead:"Logo, photos, videos, page, payment method and real proof. This tells us what is missing before scaling.",
stageTitle:"How real is this today?",stageLead:"This is not judgment. It tells us what infrastructure makes sense.",frictionTitle:"Where does it get stuck?",frictionLead:"Select the most honest weak points. This is where diagnosis starts.",trafficTitle:"If 100 new people arrive tomorrow...",trafficLead:"What would happen with that attention?",contactTitle:"Where should we review your business?",contactLead:"A BOOSTR Manager will contact you soon with the next step.",finalTitle:"Audit sent.",finalLead:"We received your signals. BOOSTR will contact you soon to review how to repair these gaps.",
genders:[["male","👨 Male"],["female","👩 Female"],["lgbt","🌈 LGBTQ+ / Other"]],
ids:["🎤 Artist","🎛️ Producer","🥁 Beatmaker","📱 Creator","👕 Clothing brand","💈 Barber","💅 Beauty","🚗 Automotive","🍽️ Restaurant","📸 Photo/video","🎨 Designer","🧰 Services","🚀 Founder","✨ Other"],
money:["🎵 Music","🥁 Beats","🧾 Services","📅 Bookings","📱 Content","📦 Products","👕 Clothing","⭐ Club/Membership","🧠 Consulting","💸 Commissions","🎓 Courses","🌱 Nothing yet"],
assets:[["🎯 Logo","Usable logo"],["🎨 Visual identity","Colors, font, style"],["📷 Photos","Real/product photos"],["🎬 Videos","Sellable content"],["🌐 Website","Current page/landing"],["💳 Payment method","Online pay, Zelle, Stripe, etc."],["🔗 Domain","Own domain"],["🧾 Portfolio","Visible work/cases"],["⭐ Testimonials","Client proof"],["📦 Catalog","Clear list of offers"]],
stages:["💼 I work and this is on the side","📈 It pays part of my life","🏠 I live from this","🚀 I am growing fast","💰 I have money but need structure","❓ I am not sure"],
frictions:["❓ Too many questions before paying","💳 Charging is not clean/easy","👀 Audience but low sales","🧩 I do not know what to offer","⏳ Everything depends on me","📩 Opportunities get lost in DM","🎭 My brand does not look right","📊 I do not know what works","🔁 I need recurring income","🎬 I need content direction"],
traffic:["✅ They could buy without asking","💬 They would message to ask","🌀 They would not know what to do","📉 I would lose many opportunities","❓ Not sure"],
placeholder:"Instagram, WhatsApp, email or main link",alerts:"Initial alerts detected",modules:"Modules that could repair this",cta:"To know exactly how to repair these gaps and what infrastructure we recommend, wait for BOOSTR to contact you."}};
const steps=["language","gender","color","intro","identity","futureId","current","future","assets","stage","friction","traffic","analysis","contact","final"];
function T(){return TXT[state.lang||"es"]}function update(){frame.classList.toggle("rainbow",state.rainbow);document.documentElement.style.setProperty("--accent",state.accent);document.documentElement.style.setProperty("--accentSoft",hexToRgba(state.accent,.18));progress.classList.toggle("on",state.step>=4&&steps[state.step]!="final");bar.style.width=Math.min(100,Math.max(0,(state.step-3)/(steps.length-5)*100))+"%";disc.textContent=state.signals+" "+T().signals;langPill.textContent=state.lang?(state.lang=="es"?"Español":"English"):"LANG"}
function hexToRgba(hex,a){let c=hex.replace("#",""),n=parseInt(c,16);return`rgba(${n>>16},${n>>8&255},${n&255},${a})`}
function render(){update();stage.innerHTML="";let s=steps[state.step]; if(s=="language")language(); else if(s=="gender")gender(); else if(s=="color")color(); else if(s=="intro")intro(); else if(s=="analysis")analysis(); else if(s=="contact")contact(); else if(s=="final")final(); else choice(s)}
function language(){stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${TXT.es.langTitle}</h2><p class="lead">${TXT.es.langLead}</p><div class="langGrid"><button class="langBtn" onclick="state.lang='es';state.step++;render()">Español</button><button class="langBtn" onclick="state.lang='en';state.step++;render()">English</button></div>`}
function gender(){stage.innerHTML=`<div class="kicker">PERSONALIZE</div><h2>${T().genderTitle}</h2><p class="lead">${T().genderLead}</p><div class="options">${T().genders.map(g=>`<button class="opt long" data-v="${g[0]}" onclick="one(this)">${g[1]}</button>`).join("")}</div>`;nav()}
function color(){let colors=["#f4f4f4","#ff7aa8","#79c7ff","#58ff91","#b98cff","#ffb66b","#ff5050","#ffe76b"];stage.innerHTML=`<div class="kicker">VISUAL MODE</div><h2>${T().colorTitle}</h2><p class="lead">${T().colorLead}</p><div class="options">${colors.map(c=>`<button class="opt" data-v="${c}" onclick="one(this)"><span class="colorDot" style="background:${c}"></span></button>`).join("")}</div>`;nav()}
function intro(){stage.innerHTML=`<div class="kicker">BOOSTR LABS</div><h1>${T().introTitle}</h1><p class="lead">${T().introLead}</p>`;typeConsole(["INITIALIZING BOOSTR AUDIT ENGINE...","BUILDING DISCOVERY PATH...","CALIBRATING BUSINESS SCAN...","WARNING: WE MAY BOOST YOUR BUSINESS."],()=>nav(false,T().start))}
function filtered(key,arr){if(key=="futureId"){let prev=state.answers.identity||[];return arr.filter(x=>!prev.includes(x))} if(key=="future"){let prev=state.answers.current||[];return arr.filter(x=>!prev.includes(x))} return arr}
function choice(key){let title=T()[key+"Title"],lead=T()[key+"Lead"],arr= key=="identity"||key=="futureId"?T().ids:key=="current"||key=="future"?T().money:key=="assets"?T().assets:key=="stage"?T().stages:key=="friction"?T().frictions:T().traffic; arr=filtered(key,arr);stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${title}</h2><p class="lead">${lead}</p>`; if(key=="assets"){stage.innerHTML+=`<div class="assetGrid">${arr.map(a=>`<div class="asset" data-v="${a[0]}" onclick="tog(this)"><b>${a[0]}</b><small>${a[1]}</small></div>`).join("")}</div>`}else{let multi=!["stage","traffic"].includes(key);stage.innerHTML+=`<div class="options">${arr.map(x=>`<button class="opt ${x.length>25?'long':''}" data-v="${x.replace(/"/g,'&quot;')}" onclick="${multi?'tog':'one'}(this)">${x}</button>`).join("")}</div>`}nav()}
function analysis(){stage.innerHTML=`<div class="kicker">CMD CONSOLE</div><h2>${state.lang=="es"?"Cruzando señales.":"Crossing signals."}</h2><p class="lead">${state.lang=="es"?"El sistema compara tu realidad actual con tu potencial posible.":"The system compares your current reality with possible potential."}</p>`;typeConsole(["READING CURRENT BUSINESS STATE...","COMPARING FUTURE MONETIZATION PATHS...","CHECKING BRAND MATERIAL...","DETECTING BOTTLENECKS...","BUILDING REPAIR PREVIEW..."],()=>nav())}
function contact(){stage.innerHTML=`<div class="kicker">HUMAN REVIEW</div><h2>${T().contactTitle}</h2><p class="lead">${T().contactLead}</p><textarea class="textarea" id="free" placeholder="${T().placeholder}">${state.answers.contact||""}</textarea>`;nav()}
function final(){let r=results();stage.innerHTML=`<div class="kicker">BOOSTR AUDIT</div><h2>${T().finalTitle}</h2><p class="lead">${T().finalLead}</p><div class="stats"><div class="stat"><b>${state.signals}</b><span>${T().signals}</span></div><div class="stat"><b>${Object.keys(state.answers).length}</b><span>${state.lang=="es"?"bloques leídos":"blocks read"}</span></div></div><div class="alert"><b>${T().alerts}</b>${r.alerts.map(x=>`<div class="line"><span>${x[0]}</span><span>${x[1]}</span></div>`).join("")}</div><div class="modules">${r.mods.map(m=>`<span class="mod">${m}</span>`).join("")}</div><div class="cta"><b>${state.lang=="es"?"Serás contactado pronto.":"You will be contacted soon."}</b> ${T().cta}</div>`;typeConsole(["AUDIT STATUS: COMPLETE","ALERTS: DETECTED","REPAIR PREVIEW: LOCKED","HUMAN REVIEW: REQUIRED"],()=>{let a=document.createElement("div");a.className="actions";a.innerHTML=`<button class="nav" onclick="location.reload()">${T().restart}</button><button class="nav next" onclick="copy()">${T().copy}</button>`;stage.append(a)})}
function nav(back=true,label){let a=document.createElement("div");a.className="actions";a.innerHTML=`<button class="nav" ${state.step==0||!back?"disabled":""} onclick="state.step--;render()">${T().back}</button><button class="nav next" onclick="next()">${label||T().next}</button>`;stage.append(a)}
function next(){collect();if(state.step<steps.length-1){state.step++;render()}}
function collect(){let key=steps[state.step];if(key=="contact"){state.answers.contact=document.getElementById("free").value;return}let vals=[...stage.querySelectorAll(".sel")].map(x=>x.dataset.v);if(key=="gender"){state.answers.gender=vals[0]||"";state.rainbow=vals[0]=="lgbt";return}if(key=="color"){if(vals[0])state.accent=vals[0];state.answers.color=vals[0]||state.accent;return}if(["identity","futureId","current","future","assets","friction"].includes(key)){state.answers[key]=vals;if(vals.length)state.signals=Math.min(24,state.signals+Math.max(1,Math.ceil(vals.length/2)));return}if(["stage","traffic"].includes(key)){state.answers[key]=vals[0]||"";if(vals.length)state.signals=Math.min(24,state.signals+1)}}
function tog(el){el.classList.toggle("sel")}function one(el){[...el.parentElement.children].forEach(x=>x.classList.remove("sel"));el.classList.add("sel")}
function typeConsole(lines,done){let c=document.createElement("div");c.className="console typed";stage.append(c);let i=0,j=0,out="";function tick(){if(i>=lines.length){c.classList.remove("typed");done&&setTimeout(done,500);return}let line=lines[i];if(j<line.length){out+=line[j++];c.innerHTML=out.replace(/\n/g,"<br>").replace(/WARNING:/g,'<span class="warn">WARNING:</span>');setTimeout(tick,45+Math.random()*45)}else{out+="\n";i++;j=0;setTimeout(tick,420)}}tick()}
function add(arr,emoji,text){arr.push([emoji,text])}
function results(){let a=state.answers, al=[],mods=new Set(["BOOSTR Review"]);let fr=(a.friction||[]).join(" "),fu=(a.future||[]).join(" "),assets=a.assets||[],traffic=a.traffic||"";if(fr.includes("Preguntan")||fr.includes("questions")||fr.includes("DM")){add(al,"💬",state.lang=="es"?"Tu venta depende demasiado de conversaciones manuales.":"Your sale depends too much on manual conversations.");mods.add("Smart Link");mods.add("Deep Links")}if(fr.includes("cobrar")||fr.includes("Charging")){add(al,"💳",state.lang=="es"?"El cobro puede estar agregando fricción antes del cierre.":"Payment may be adding friction before close.");mods.add("Payment Link")}if(fr.includes("audiencia")||fr.includes("Audience")){add(al,"👀",state.lang=="es"?"Hay atención, pero no necesariamente conversión.":"There is attention, but not necessarily conversion.");mods.add("Conversion CTA")}if(fu.includes("Club")||fr.includes("recurrente")||fr.includes("recurring")){add(al,"⭐",state.lang=="es"?"Existe posible oportunidad de ingreso recurrente.":"There may be a recurring income opportunity.");mods.add("BOOSTR Club")}if(!assets.some(x=>x.includes("Logo"))||!assets.some(x=>x.includes("Identidad")||x.includes("Visual"))){add(al,"🎨",state.lang=="es"?"La marca puede necesitar material visual más claro antes de escalar.":"The brand may need clearer visual material before scaling.");mods.add("Brand Assets")}if(fu.includes("Ropa")||fu.includes("Clothing")){add(al,"👕",state.lang=="es"?"El potencial de producto necesita inventario y CTAs directos.":"Product potential may need inventory and direct CTAs.");mods.add("Partner Inventory")}if(traffic.includes("perder")||traffic.includes("lose")||traffic.includes("No entender")){add(al,"⚠️",state.lang=="es"?"Si llega tráfico nuevo, parte de esa atención podría perderse.":"If new traffic arrives, part of that attention could be lost.");mods.add("Lead Capture")}while(al.length<3){add(al,"🧩",state.lang=="es"?"Hay señales suficientes para revisión personalizada.":"There are enough signals for personalized review.");mods.add("Custom OS")}return{alerts:al.slice(0,5),mods:[...mods].slice(0,8)}}
function copy(){navigator.clipboard.writeText("BOOSTR AUDIT V5\\n"+JSON.stringify(state.answers,null,2)).then(()=>alert("Copied"))}
render()
</script>

<script>
(function(){
  async function submitAuditToCloudflare(){
    try{
      if(!window.state || window.__boostrAuditSubmitted) return;
      window.__boostrAuditSubmitted=true;
      const payload={
        source:'boostr-audit',
        formKind:'audit',
        language:state.lang||'es',
        signals:state.signals||0,
        answers:state.answers||{},
        pageUrl:location.href,
        submittedAt:new Date().toISOString(),
        contact:String((state.answers||{}).contact||'').trim()
      };
      const res=await fetch('/api/audit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await res.json().catch(()=>({ok:false}));
      const box=document.createElement('div');
      box.className='cta';
      box.innerHTML=data.ok?'<b>BOOSTR received this Audit.</b> Your submission is logged for Manager review.': '<b>Audit completed.</b> If submission status is unclear, screenshot this page or contact BOOSTR.';
      const stage=document.getElementById('stage');
      if(stage && !document.querySelector('[data-audit-submit-status]')){box.setAttribute('data-audit-submit-status','1');stage.append(box)}
    }catch(e){
      console.warn('BOOSTR Audit submit failed',e);
    }
  }
  const wait=setInterval(function(){
    if(typeof window.final==='function'){
      clearInterval(wait);
      const oldFinal=window.final;
      window.final=function(){ oldFinal(); setTimeout(submitAuditToCloudflare,700); };
    }
  },100);
})();
</script>
