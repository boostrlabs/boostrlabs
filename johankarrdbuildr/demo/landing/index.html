<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Café del Mar</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden}body{font-family:Arial,sans-serif;background:linear-gradient(142deg,#0a203d 0%,#2b4e72 57%,#a8b3b5 100%);color:#feedb9}.nav{position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:24px;background:rgba(6,32,64,.18);padding:5px 8px;border-radius:999px}.nav a{font:900 10px/1 Arial;color:#feedb9;text-decoration:underline;text-transform:uppercase}.page{position:fixed;inset:0;display:grid;place-items:center;opacity:0;pointer-events:none;transform:scale(.99);filter:blur(10px);transition:1.5s}.page.active{opacity:1;pointer-events:auto;transform:none;filter:blur(0)}.panel{width:240px;max-height:86vh;overflow:hidden;border-radius:18px;background:#062040;padding:13px;display:grid;gap:8px;place-items:center;box-shadow:0 20px 34px rgba(0,0,0,.42)}img{display:block;max-width:100%;height:auto}.brand{width:190px}.shot{border-radius:8px}.title{font:1000 32px/.85 Arial;text-align:center;text-transform:uppercase;color:#feedb9}.gallery{display:grid;grid-template-columns:1fr 1fr;gap:7px}.gallery img{aspect-ratio:1/1;object-fit:cover;border-radius:6px}.links{width:190px;background:#feedb9;color:#061f3d;border-radius:7px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.links a{color:#061f3d;text-align:center;font:900 8px Arial;text-decoration:none;text-transform:uppercase}.powered{position:fixed;bottom:10px;left:0;right:0;text-align:center;color:rgba(255,255,255,.42);font:10px Arial}</style></head><body><nav class="nav"><a href="#menu">Menu</a><a href="#contact">Contacto</a><a href="#gallery">Gallery</a></nav><section class="page" id="home"><div class="panel"><img class="brand" src="/assets/johankarrd/cafedelmar/logofull.png"><img class="shot" src="/assets/johankarrd/cafedelmar/image04.jpg"><img class="shot" src="/assets/johankarrd/cafedelmar/image16.jpg"></div></section><section class="page" id="menu"><div class="panel"><div class="title">Drinks</div><img class="shot" src="/assets/johankarrd/cafedelmar/image06.jpg"><div class="title">Hot<br>Drinks</div><img class="shot" src="/assets/johankarrd/cafedelmar/image18.jpg"><div class="title">Favorites</div><img class="shot" src="/assets/johankarrd/cafedelmar/image09.jpg"></div></section><section class="page" id="contact"><div class="panel"><img class="brand" src="/assets/johankarrd/cafedelmar/logofull.png"><div class="links"><a href="mailto:">Mail</a><a href="#">Insta</a><a href="#">Order</a><a href="#">Tiktok</a></div></div></section><section class="page" id="gallery"><div class="panel"><img class="brand" src="/assets/johankarrd/cafedelmar/image01.png"><div class="gallery"><img src="/assets/johankarrd/cafedelmar/3299c2ea.jpg"><img src="/assets/johankarrd/cafedelmar/2791d0e1.jpg"><img src="/assets/johankarrd/cafedelmar/46493ee7.jpg"><img src="/assets/johankarrd/cafedelmar/image17.jpg"><img src="/assets/johankarrd/cafedelmar/image21.jpg"><img src="/assets/johankarrd/cafedelmar/image18.jpg"></div></div></section><div class="powered">Powered by BOOSTR Labs</div><script>const ids=['home','menu','contact','gallery'];function show(){let id=location.hash.slice(1)||'home';if(!ids.includes(id))id='home';document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===id));}addEventListener('hashchange',show);show();</script></body></html>
